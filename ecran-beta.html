<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><meta name="theme-color" content="#07111f"><title>Écurie — Écran bêta</title><style>*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 20% 10%,#234866,#07111f 55%);color:white;font-family:Montserrat,system-ui,sans-serif;display:grid;place-items:center;user-select:none}.screen{text-align:center;width:min(920px,90vw)}.pill{display:inline-block;border:1px solid #73d6a0;border-radius:999px;padding:8px 16px;color:#73d6a0;font-weight:800;letter-spacing:.16em}.clock{font-size:clamp(5rem,20vw,13rem);font-weight:800;line-height:1;margin:.2em 0}.date{font-size:clamp(1.4rem,4vw,2.8rem)}.spaces{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:35px}.space{background:#ffffff12;border:1px solid #ffffff25;border-radius:22px;padding:22px}.space strong{display:block;font-size:1.25rem}.space span{color:#aebfd0}.hint{margin-top:40px;color:#7f93a9;font-size:.85rem}@media(max-width:650px){.spaces{grid-template-columns:1fr}}</style></head><body><main class="screen"><span class="pill">BÊTA · ÉCURIE</span><div id="clock" class="clock"></div><div id="date" class="date"></div><section id="spaces" class="spaces"><div class="space">Chargement…</div></section><p class="hint">Touchez deux fois pour ouvrir le planning</p></main><script>const API='https://ecurie-notifications-beta.damiensiri-pro.workers.dev';function tick(){const d=new Date();clock.textContent=d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});date.textContent=d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'})}async function load(){try{const r=await fetch(API+'/api/statuses',{cache:'no-store'}),data=await r.json();spaces.innerHTML=data.slice(0,6).map(s=>`<div class="space"><strong>${String(s.espace||s.name||'Espace')}</strong><span>${String(s.statut_auto||s.status||s.statut_manuel||'')}</span></div>`).join('')||'<div class="space">Informations indisponibles</div>'}catch(e){spaces.innerHTML='<div class="space">Connexion en cours…</div>'}}let last=0;document.addEventListener('pointerup',()=>{const now=Date.now();if(now-last<450)location.href='planning-beta.html';last=now});tick();setInterval(tick,1000);load();setInterval(load,30000);</script></body></html>
