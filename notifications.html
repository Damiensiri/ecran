<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alertes</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">

<style>

/* ================= BASE ================= */

body{
  margin:0;
  font-family:'Montserrat',sans-serif;
  background:#f4f4f4;
  color:#000;
  transition:background .3s ease,color .3s ease;
}

/* ================= HEADER ================= */

.sub-header{
  position:relative;
  background:#f4f4f4;
  height:70px;
  transition:background .3s ease;
}

.back-btn{
  position:absolute;
  left:12px;
  top:50%;
  transform:translateY(-50%);
  width:42px;
  height:42px;
  border-radius:50%;
  border:none;
  background:white;
  box-shadow:0 3px 8px rgba(0,0,0,0.15);
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}

.back-btn img{
  width:22px;
  height:22px;
}

.sub-title{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  margin:0;
  font-size:20px;
  font-weight:700;
  color:#181E3B;
}

/* ================= DATE ================= */

#lastUpdate{
  text-align:center;
  font-size:14px;
  color:#666;
  margin-bottom:6px;
}

/* ================= ACTIONS ================= */

#actions{
  text-align:center;
  margin:6px 0 14px;
}

#markAllBtn{
  background:#f0f0f0;
  color:#181E3B;
  border:1px solid #ccc;
  padding:6px 40px;
  border-radius:30px;
  font-size:13px;
  cursor:pointer;
}

/* ================= LOADER ================= */

#loader{
  position:fixed;
  inset:0;
  background:white;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.spinner{
  width:40px;
  height:40px;
  border:4px solid #ddd;
  border-top:4px solid #1f5c8f;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  to{transform:rotate(360deg);}
}

/* ================= CARDS ================= */

.card{
  background:white;
  margin:15px;
  padding:15px;
  border-radius:12px;
  box-shadow:0 3px 8px rgba(0,0,0,0.08);
  cursor:pointer;
  transition:background .3s ease, box-shadow .3s ease;
}

.card.lu{
  opacity:0.55;
  background:#f0f0f0;
}

.card-time{
  color:red;
  font-weight:bold;
}

.card-category{
  font-size:13px;
  color:#888;
  margin-top:4px;
}

.card-title{
  font-weight:bold;
  margin-top:6px;
  font-size:18px;
  color:#1f5c8f;
}

.pin{
  margin-top:6px;
  font-size:12px;
  color:#d35400;
}

/* ================= DARK MODE ================= */

@media (prefers-color-scheme: dark){

  body{
    background:#0f1115;
    color:#ffffff;
  }

  .sub-header{
    background:#0f1115;
  }

  .sub-title{
    color:#ffffff;
  }

  .back-btn{
    background:#1c1f26;
    box-shadow:0 12px 30px rgba(0,0,0,0.6);
  }

  .back-btn img{
    filter:brightness(0) invert(1);
  }

  #lastUpdate{
    color:#aaaaaa;
  }

  #markAllBtn{
    background:#1c1f26;
    color:#ffffff;
    border:1px solid #333;
  }

  #loader{
    background:#0f1115;
  }

  .card{
    background:#1c1f26;
    box-shadow:0 20px 50px rgba(0,0,0,0.7);
  }

  .card.lu{
    background:#252a33;
    opacity:0.6;
  }

  .card-category{
    color:#aaaaaa;
  }

  .card-title{
    color:#5da9ff;
  }

}

</style>
</head>

<body>

<header class="sub-header">
  <button class="back-btn" onclick="goHome()">
    <img src="image/back.svg">
  </button>
  <h1 class="sub-title">ALERTES</h1>
</header>

<div id="loader"><div class="spinner"></div></div>

<div id="lastUpdate"></div>

<div id="actions">
  <button id="markAllBtn" onclick="marquerToutLu()">
    Tout marquer comme lu
  </button>
</div>

<div id="notifications"></div>
