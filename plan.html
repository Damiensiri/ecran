<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plan interactif</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
margin:0;
background:#f4f6fb;
font-family:'Montserrat',sans-serif;
color:#000;
overflow-x:hidden;
transition:background .3s ease,color .3s ease;
}

/* PAGE */

.page{
min-height:100vh;
transform:translateX(100%);
transition:transform .35s ease;
}

.page.active{
transform:translateX(0);
}

.page.exit{
transform:translateX(100%);
}

/* HEADER */

header{
position:relative;
height:76px;
padding-top:8px;
}

#backBtn{
position:absolute;
left:18px;
top:50%;

transform:translateY(-50%);

width:46px;
height:46px;

border-radius:50%;

background:rgba(255,255,255,0.82);

display:flex;
align-items:center;
justify-content:center;

backdrop-filter:blur(16px);
-webkit-backdrop-filter:blur(16px);

border:1px solid rgba(255,255,255,0.45);

box-shadow:
0 8px 22px rgba(0,0,0,0.08),
inset 0 1px 1px rgba(255,255,255,0.7);

cursor:pointer;

transition:all .2s ease;
}

#backBtn:active{
transform:translateY(-50%) scale(.94);
}

#backBtn img{
width:22px;
}

header h1{
position:absolute;
left:50%;
top:50%;

transform:translate(-50%,-50%);

margin:0;

font-size:18px;
font-weight:700;
letter-spacing:.5px;
}

/* MAP */

#mapWrapper{
position:relative;
padding:20px;
}

#map{
width:100%;
display:block;

border-radius:30px;

box-shadow:
0 20px 60px rgba(0,0,0,0.14);
}

/* PREMIUM MINI BUTTONS */

.plan-btn{
position:absolute;

width:42px;
height:42px;

border-radius:14px;

background:rgba(255,255,255,0.72);

backdrop-filter:blur(14px);
-webkit-backdrop-filter:blur(14px);

border:1px solid rgba(255,255,255,0.45);

display:flex;
align-items:center;
justify-content:center;

cursor:pointer;

box-shadow:
0 8px 18px rgba(0,0,0,0.14),
0 2px 4px rgba(0,0,0,0.06),
inset 0 1px 1px rgba(255,255,255,0.5);

transition:
transform .18s ease,
background .18s ease,
box-shadow .18s ease,
opacity .3s ease;

opacity:.92;
}

.plan-btn:hover{
transform:scale(1.08);

background:rgba(255,255,255,0.82);

box-shadow:
0 12px 24px rgba(0,0,0,0.18),
0 4px 8px rgba(0,0,0,0.08);
}

.plan-btn:active{
transform:scale(.94);
}

.plan-btn img{
width:22px;

filter:
drop-shadow(0 1px 2px rgba(0,0,0,0.12));
}

/* breathing animation */

.plan-btn{
animation:floaty 4s ease-in-out infinite;
}

#btn-carriere{ animation-delay:0s; }
#btn-beudot{ animation-delay:.8s; }
#btn-manege{ animation-delay:1.6s; }
#btn-grande{ animation-delay:2.4s; }
#btn-maison{ animation-delay:3.2s; }

@keyframes floaty{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-2px);
}

100%{
transform:translateY(0px);
}

}

/* positions */

#btn-carriere{
top:20%;
left:25%;
}

#btn-beudot{
top:20%;
left:55%;
}

#btn-manege{
top:35%;
left:38%;
}

#btn-grande{
top:38%;
left:69%;
}

#btn-maison{
top:55%;
left:60%;
}

/* LEGEND */

.legend{
padding:4px 22px 30px;
font-size:15px;
}

.legend-item{
display:flex;
align-items:center;
gap:12px;

margin-bottom:16px;

font-weight:500;
}

.legend-item img{
width:22px;
}

/* PANEL */

#panel{
position:fixed;

left:0;
bottom:0;

width:100%;
height:50%;

background:
linear-gradient(
180deg,
rgba(255,255,255,0.95),
rgba(255,255,255,0.90)
);

backdrop-filter:blur(24px);
-webkit-backdrop-filter:blur(24px);

border-radius:28px 28px 0 0;

transform:translateY(110%);
opacity:0;

transition:
transform .35s ease,
opacity .2s ease;

padding:24px;

box-sizing:border-box;

box-shadow:
0 -20px 50px rgba(0,0,0,0.12);
}

#panel.active{
transform:translateY(0);
opacity:1;
}

/* PANEL ICON */

#panelIcon{
position:absolute;

top:-32px;
left:50%;

transform:translateX(-50%);

width:66px;
height:66px;

border-radius:50%;

background:
linear-gradient(
145deg,
rgba(255,255,255,0.95),
rgba(255,255,255,0.82)
);

display:flex;
align-items:center;
justify-content:center;

backdrop-filter:blur(18px);

box-shadow:
0 12px 35px rgba(0,0,0,0.18);
}

#panelIcon img{
width:30px;
position:absolute;
z-index:2;
}

/* HALO */

.halo{
position:absolute;
width:74px;
height:74px;
transform:rotate(-90deg);
}

.halo circle{
fill:none;
stroke-width:3;
stroke-linecap:round;
stroke-dasharray:188;
stroke-dashoffset:188;
}

/* CONTENT */

#panelHeader{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:8px;
}

#panelTitle{
font-size:22px;
font-weight:700;
}

#closePanel{
font-size:24px;
cursor:pointer;
opacity:.7;
transition:opacity .2s ease;
}

#closePanel:hover{
opacity:1;
}

.row{
margin-top:16px;
}

.label{
font-size:12px;
font-weight:700;
letter-spacing:.4px;
text-transform:uppercase;
color:#8b8b8b;
margin-bottom:6px;
}

.value{
font-size:14px;
font-weight:500;
line-height:1.7;
}

#statut{
font-size:18px;
font-weight:700;
}

#horaire{
font-size:14px;
font-weight:600;
}

.optionText{
font-size:13px;
margin-right:16px;
}

#info{
margin-top:6px;
line-height:1.8;
font-size:14px;
font-weight:550;
}

.scrollable{
max-height:160px;
overflow-y:auto;
padding-right:6px;
}

/* BUTTON */

#reserveBox{
display:none;

margin-top:24px;

background:
linear-gradient(
135deg,
#2563EB,
#4F46E5
);

color:white;

padding:15px;

border-radius:18px;

text-align:center;
font-weight:700;

cursor:pointer;

box-shadow:
0 14px 35px rgba(37,99,235,0.30);

transition:all .2s ease;
}

#reserveBox:hover{
transform:translateY(-2px);
}

#reserveBox:active{
transform:scale(.98);
}

/* DARK MODE */

@media (prefers-color-scheme: dark){

body{
background:#0d1016;
color:white;
}

header h1{
color:white;
}

#backBtn{
background:rgba(24,28,36,0.76);

border:1px solid rgba(255,255,255,0.08);

box-shadow:
0 10px 28px rgba(0,0,0,0.45);
}

#backBtn img{
filter:brightness(0) invert(1);
}

#map{
filter:
brightness(.93)
contrast(.98);

box-shadow:
0 24px 70px rgba(0,0,0,0.55);
}

.plan-btn{
background:rgba(28,32,40,0.72);

border:1px solid rgba(255,255,255,0.06);

box-shadow:
0 10px 24px rgba(0,0,0,0.45),
inset 0 1px 1px rgba(255,255,255,0.05);
}

.plan-btn:hover{
background:rgba(38,43,52,0.88);
}

#panel{
background:
linear-gradient(
180deg,
rgba(24,28,36,0.96),
rgba(24,28,36,0.92)
);

box-shadow:
0 -20px 50px rgba(0,0,0,0.5);
}

#panelIcon{
background:
linear-gradient(
145deg,
rgba(38,43,52,0.95),
rgba(24,28,36,0.88)
);
}

.label{
color:#9da3ae;
}

.value{
color:#ececec;
}

.legend{
color:#ddd;
}

#reserveBox{
background:
linear-gradient(
135deg,
#2563EB,
#4338CA
);
}

}

</style>
</head>

<body>

<div class="page" id="page">

<header>

<div id="backBtn" onclick="goBack()">
<img src="image/back.svg">
</div>

<h1>PLAN INTERACTIF</h1>

</header>

<div id="mapWrapper">

<img id="map" src="image/plan.png">

<div class="plan-btn" id="btn-carriere" onclick="openSpace('carriere')">
<img id="icon-carriere">
</div>

<div class="plan-btn" id="btn-beudot" onclick="openSpace('beudot')">
<img id="icon-beudot">
</div>

<div class="plan-btn" id="btn-manege" onclick="openSpace('manege')">
<img id="icon-manege">
</div>

<div class="plan-btn" id="btn-grande" onclick="openSpace('grande-voie')">
<img id="icon-grande-voie">
</div>

<div class="plan-btn" id="btn-maison" onclick="openSpace('maison')">
<img id="icon-maison">
</div>

</div>

<div class="legend">

<div class="legend-item">
<img src="image/ouvert.png">
Ouvert
</div>

<div class="legend-item">
<img src="image/prevision.png">
Prévision d'ouverture
</div>

<div class="legend-item">
<img src="image/ferme.png">
Fermé
</div>

<div class="legend-item">
<img src="image/horsservice.png">
Hors service
</div>

</div>

<div id="panel">

<div id="panelIcon">

<svg class="halo">
<circle id="haloCircle" cx="33" cy="33" r="30"/>
</svg>

<img id="panelIconImg">

</div>

<div id="panelHeader">

<div id="panelTitle">---</div>

<div id="closePanel">✕</div>

</div>

<div class="row">

<div class="label">Statut</div>

<div class="value" id="statut">---</div>

</div>

<div class="row">

<div class="label">Horaires</div>

<div class="value" id="horaire">---</div>

</div>

<div class="row" id="optionsRow">

<div class="label">Activités possibles</div>

<div>
<span class="optionText" id="liberte"></span>
<span class="optionText" id="longe"></span>
</div>

</div>

<div class="row">

<div class="label">Infos</div>

<div class="value scrollable" id="info"></div>

</div>

<div id="reserveBox" onclick="goReserve()">
Réserver
</div>

</div>

</div>

<script>

window.addEventListener("DOMContentLoaded",()=>{

requestAnimationFrame(()=>{
document.getElementById("page").classList.add("active");
});

});

const SHEET_URL="https://script.google.com/macros/s/AKfycbzWEB8PPqSQ4rinnTbh4414U3QPX836XtPOPBmKr0Bw2W4mRFWAl7Chv6WKHOjrcWoZew/exec?sheet=statuts";

const ICONS={
"ouvert":"image/ouvert.png",
"ferme":"image/ferme.png",
"prevision":"image/prevision.png",
"hors-service":"image/horsservice.png"
};

let DATA=[];

const panel=document.getElementById("panel");
const panelTitle=document.getElementById("panelTitle");
const statut=document.getElementById("statut");
const horaire=document.getElementById("horaire");
const info=document.getElementById("info");
const liberte=document.getElementById("liberte");
const longe=document.getElementById("longe");
const optionsRow=document.getElementById("optionsRow");
const reserveBox=document.getElementById("reserveBox");
const closePanel=document.getElementById("closePanel");
const haloCircle=document.getElementById("haloCircle");
const panelIconImg=document.getElementById("panelIconImg");

function setPanelIcon(espace){

if(espace==="carriere" || espace==="manege"){
panelIconImg.src="image/travail.svg";
}else{
panelIconImg.src="image/paddock.svg";
}

}

function loadData(){

fetch(SHEET_URL+"&t="+Date.now(),{cache:"no-store"})
.then(r=>r.json())
.then(d=>{

DATA=d;

localStorage.setItem("statuts",JSON.stringify(d));

renderIcons(d);

});

}

function renderIcons(data){

data.forEach(e=>{

const icon=ICONS[(e.statut_auto||"").toLowerCase().trim()];

const el=document.getElementById("icon-"+e.espace);

if(el && icon) el.src=icon;

});

}

const cache=localStorage.getItem("statuts");

if(cache){

try{

DATA=JSON.parse(cache);

renderIcons(DATA);

}catch(e){}

}

loadData();

setInterval(loadData,10000);

function openSpace(espace){

setPanelIcon(espace);

const e=DATA.find(x=>x.espace===espace);

if(!e) return;

panelTitle.innerText=formatTitle(e.espace);

function formatTitle(t){

const map={
"carriere":"Carrière",
"manege":"Manège",
"maison":"Maison",
"grande-voie":"Grande voie",
"beudot":"Beudot"
};

return map[t]||t;

}

if(e.statut_auto==="ouvert"){
statut.innerText="Ouvert";
statut.style.color="green";
}

if(e.statut_auto==="prevision"){
statut.innerText="Ouverture prévue";
statut.style.color="#E88B00";
}

if(e.statut_auto==="ferme"){
statut.innerText="Fermé";
statut.style.color="red";
}

if(e.statut_auto==="hors-service"){
statut.innerText="Hors service";
statut.style.color="gray";
}

info.innerText=e.info||"Aucune info";

/* halo */

let color="green";

if(e.statut_auto==="ferme") color="red";
if(e.statut_auto==="prevision") color="#E88B00";
if(e.statut_auto==="hors-service") color="gray";

haloCircle.style.stroke=color;

/* animation */

haloCircle.style.transition="none";
haloCircle.style.strokeDashoffset="188";

setTimeout(()=>{

haloCircle.style.transition="stroke-dashoffset 0.9s ease";
haloCircle.style.strokeDashoffset="0";

},50);

/* horaires */

if(e.horaire_special && e.horaire_special.trim() !== ""){

horaire.innerHTML=`<span style="color:#E88B00;font-weight:700">${e.horaire_special}</span>`;

}else{

horaire.innerText=e.horaire_affiche||"---";

}

/* options */

let show=false;

if(e.liberte){

liberte.innerHTML=`Liberté : <span style="color:${e.liberte==="oui"?"green":"red"};font-weight:700">${e.liberte.toUpperCase()}</span>`;

show=true;

}

if(e.longe){

longe.innerHTML=`Longe : <span style="color:${e.longe==="oui"?"green":"red"};font-weight:700">${e.longe.toUpperCase()}</span>`;

show=true;

}

optionsRow.style.display=show?"block":"none";

/* réservation */

if(
(espace==="maison"||espace==="grande-voie"||espace==="beudot")
&&
(e.statut_auto==="ouvert"||e.statut_auto==="prevision")
){
reserveBox.style.display="block";
}else{
reserveBox.style.display="none";
}

panel.classList.add("active");

}

closePanel.onclick=()=>panel.classList.remove("active");

function goBack(){

const page=document.getElementById("page");

page.classList.remove("active");
page.classList.add("exit");

setTimeout(()=>{
location.href="index.html";
},300);

}

function goReserve(){
location.href="planningpaddock.html";
}

</script>

</body>
</html>
