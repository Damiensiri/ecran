<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plan interactif</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>

/* ================= VARIABLES ================= */

:root{
  --bg:#f4f4f4;
  --text:#000;
  --panel:#ffffff;
  --shadow:0 6px 18px rgba(0,0,0,0.08);
  --reserve:#E88B00;
}

@media (prefers-color-scheme: dark){
  :root{
    --bg:#0f1115;
    --text:#ffffff;
    --panel:#1c1f26;
    --shadow:0 18px 45px rgba(0,0,0,0.6);
    --reserve:#c87400;
  }

  #backBtn img{
    filter:brightness(0) invert(1);
  }

  /* image mieux intégrée sans halo */
  #map{
    filter:brightness(0.9) contrast(0.95) saturate(0.95);
    box-shadow:
      0 35px 80px rgba(0,0,0,0.8),
      0 0 0 1px rgba(255,255,255,0.04);
  }
}

/* ================= BASE ================= */

body{
  margin:0;
  background:var(--bg);
  font-family:'Montserrat',sans-serif;
  color:var(--text);
  transition:background .3s ease,color .3s ease;
}

/* ===== ANIMATION ===== */

.page{
  min-height:100vh;
  transform:translateX(100%);
  transition:transform .35s ease;
}

.page.active{ transform:translateX(0); }
.page.exit{ transform:translateX(100%); }

/* ===== HEADER ===== */

header{
  position:relative;
  height:70px;
}

#backBtn{
  position:absolute;
  left:15px;
  top:50%;
  transform:translateY(-50%);
  width:42px;
  height:42px;
  border-radius:50%;
  background:var(--panel);
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:var(--shadow);
  cursor:pointer;
}

#backBtn img{ width:22px; }

header h1{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  margin:0;
  font-size:18px;
  font-weight:700;
}

/* ===== PLAN ===== */

#mapWrapper{
  position:relative;
  padding:10px;
}

#map{
  width:100%;
  border-radius:22px;
  transition:filter .3s ease, box-shadow .3s ease;
}

/* ===== BOUTONS ===== */

.plan-btn{
  position:absolute;
  width:48px;
  height:48px;
  background:#1e2c88;
  border-radius:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.plan-btn img{
  width:26px;
  height:26px;
  object-fit:contain;
}

/* positions */
#btn-carriere{top:20%;left:25%;}
#btn-beudot{top:20%;left:55%;}
#btn-manege{top:35%;left:38%;}
#btn-grande{top:38%;left:69%;}
#btn-maison{top:55%;left:60%;}

/* ===== LEGENDE ===== */

.legend{
  padding:20px;
  font-size:15px;
}

.legend-item{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:15px;
}

.legend-item img{ width:22px; }

/* ===== PANEL ===== */

#panel{
  position:fixed;
  left:0;
  bottom:0;
  width:100%;
  height:50%;
  background:var(--panel);
  border-radius:20px 20px 0 0;
  transform:translateY(100%);
  transition:0.3s;
  padding:20px;
  box-sizing:border-box;
  box-shadow:var(--shadow);
}

#panel.active{ transform:translateY(0); }

#panelHeader{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

#panelTitle{
  font-size:20px;
  font-weight:700;
}

#closePanel{
  font-size:22px;
  cursor:pointer;
}

.row{ margin-top:14px; }

.label{
  font-size:12px;
  color:#888;
}

.value{
  font-size:14px;
  font-weight:500;
}

#statut{
  font-size:18px;
  font-weight:700;
}

#horaire{
  font-size:14px;
  font-weight:500;
}

.optionText{
  font-size:13px;
  margin-right:15px;
}

#info{
  margin-top:8px;
  line-height:1.7;
  font-size:14px;
  font-weight:550;
}

.scrollable{
  max-height:160px;
  overflow-y:auto;
}

/* ===== BOUTON RESERVER ===== */

#reserveBox{
  display:none;
  margin-top:20px;
  background:var(--reserve);
  color:white;
  padding:12px;
  border-radius:12px;
  text-align:center;
  font-weight:600;
  cursor:pointer;
  box-shadow:var(--shadow);
}

</style>
</head>
<body>

<!-- TON HTML ET TON JS RESTENT STRICTEMENT IDENTIQUES ICI -->

</body>
</html>
