<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plan interactif</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#f4f4f4;
font-family:'Montserrat',sans-serif;
color:#000;
transition:.3s;
}

/* PAGE */

.page{
min-height:100vh;
transform:translateX(100%);
transition:.35s;
}

.page.active{transform:translateX(0);}
.page.exit{transform:translateX(100%);}

/* HEADER */

header{
position:relative;
height:70px;
}

#backBtn{
position:absolute;
left:15px;
top:50%;
transform:translateY(-50%);
width:42px;
height:42px;
border-radius:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 3px 8px rgba(0,0,0,0.15);
cursor:pointer;
}

#backBtn img{width:22px;}

header h1{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
margin:0;
font-size:18px;
font-weight:700;
}

/* PLAN */

#mapWrapper{
position:relative;
padding:10px;
}

#map{
width:100%;
border-radius:20px;
}

/* BOUTONS */

.plan-btn{
position:absolute;
width:48px;
height:48px;
background:#1e2c88;
border-radius:14px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.plan-btn img{
width:26px;
height:26px;
}

/* positions */

#btn-carriere{top:20%;left:25%;}
#btn-beudot{top:20%;left:55%;}
#btn-manege{top:35%;left:38%;}
#btn-grande-voie{top:38%;left:69%;}
#btn-maison{top:55%;left:60%;}

/* LEGENDE */

.legend{
padding:20px;
font-size:15px;
}

.legend-item{
display:flex;
align-items:center;
gap:10px;
margin-bottom:15px;
}

.legend-item img{width:22px;}

/* PANEL */

#panel{
position:fixed;
left:0;
bottom:0;
width:100%;
height:50%;
background:white;
border-radius:20px 20px 0 0;
transform:translateY(100%);
transition:.3s;
padding:20px;
box-sizing:border-box;
}

#panel.active{transform:translateY(0);}

/* CERCLE */

#panelIcon{
position:absolute;
top:-32px;
left:50%;
transform:translateX(-50%) scale(.7);
width:64px;
height:64px;
border-radius:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 10px 25px rgba(0,0,0,0.35);
transition:.35s cubic-bezier(.34,1.56,.64,1);
}

#panel.active #panelIcon{
transform:translateX(-50%) scale(1);
}

#panelIcon img{
width:30px;
}

/* ARC */

#panelIcon::before{
content:"";
position:absolute;
inset:-5px;
border-radius:50%;
background:conic-gradient(green 0deg 70deg, transparent 70deg 360deg);
mask: radial-gradient(farthest-side, transparent calc(100% - 4px), black calc(100% - 4px));
-webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 4px), black calc(100% - 4px));
animation:spin 3s linear infinite;
}

@keyframes spin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

/* COULEURS */

.ring-open::before{
background:conic-gradient(green 0deg 70deg, transparent 70deg 360deg);
}

.ring-prevision::before{
background:conic-gradient(#E88B00 0deg 70deg, transparent 70deg 360deg);
}

.ring-ferme::before{
background:conic-gradient(red 0deg 70deg, transparent 70deg 360deg);
}

.ring-hors::before{
background:conic-gradient(gray 0deg 70deg, transparent 70deg 360deg);
}

/* PANEL */

#panelHeader{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:20px;
}

#panelTitle{
font-size:20px;
font-weight:700;
}

#closePanel{
font-size:22px;
cursor:pointer;
}

.row{margin-top:14px;}

.label{
font-size:12px;
color:#888;
}

.value{
font-size:14px;
font-weight:500;
}

#statut{
font-size:18px;
font-weight:700;
}

/* DARK MODE */

@media(prefers-color-scheme:dark){

body{
background:#0f1115;
color:white;
}

#panel{
background:#1c1f26;
}

#panelIcon{
background:#1c1f26;
}

#backBtn{
background:#1c1f26;
}

#backBtn img{
filter:brightness(0) invert(1);
}

}

</style>
</head>

<body>

<div class="page" id="page">

<header>
<div id="backBtn" onclick="goBack()">
<img src="image/back.svg">
</div>
<h1>PLAN INTERACTIF</h1>
</header>

<div id="mapWrapper">

<img id="map" src="image/plan.png">

<div class="plan-btn" id="btn-carriere" onclick="openSpace('carriere')"><img id="icon-carriere"></div>
<div class="plan-btn" id="btn-beudot" onclick="openSpace('beudot')"><img id="icon-beudot"></div>
<div class="plan-btn" id="btn-manege" onclick="openSpace('manege')"><img id="icon-manege"></div>
<div class="plan-btn" id="btn-grande-voie" onclick="openSpace('grande-voie')"><img id="icon-grande-voie"></div>
<div class="plan-btn" id="btn-maison" onclick="openSpace('maison')"><img id="icon-maison"></div>

</div>

<div class="legend">
<div class="legend-item"><img src="image/ouvert.png"> Ouvert</div>
<div class="legend-item"><img src="image/prevision.png"> Prévision</div>
<div class="legend-item"><img src="image/ferme.png"> Fermé</div>
<div class="legend-item"><img src="image/horsservice.png"> Hors service</div>
</div>

<div id="panel">

<div id="panelIcon">
<img id="panelIconImg">
</div>

<div id="panelHeader">
<div id="panelTitle">---</div>
<div id="closePanel">✕</div>
</div>

<div class="row">
<div class="label">Statut</div>
<div class="value" id="statut">---</div>
</div>

</div>

</div>

<script>

window.addEventListener("DOMContentLoaded",()=>{
requestAnimationFrame(()=>{
document.getElementById("page").classList.add("active");
});
});

const SHEET_URL="https://script.google.com/macros/s/AKfycbzWEB8PPqSQ4rinnTbh4414U3QPX836XtPOPBmKr0Bw2W4mRFWAl7Chv6WKHOjrcWoZew/exec?sheet=statuts";

let DATA=[];

const panel=document.getElementById("panel");
const statut=document.getElementById("statut");
const panelIcon=document.getElementById("panelIcon");
const panelIconImg=document.getElementById("panelIconImg");
const panelTitle=document.getElementById("panelTitle");

function loadData(){

fetch(SHEET_URL)
.then(r=>r.json())
.then(d=>{
DATA=d;
});

}

loadData();
setInterval(loadData,10000);

function openSpace(espace){

const e=DATA.find(x=>x.espace===espace);
if(!e)return;

panelTitle.innerText=e.espace;

panelIcon.classList.remove("ring-open","ring-prevision","ring-ferme","ring-hors");

if(espace==="carriere"||espace==="manege"){
panelIconImg.src="image/travail.svg";
}else{
panelIconImg.src="image/paddock.svg";
}

if(e.statut_auto==="ouvert"){
statut.innerText="Ouvert";
panelIcon.classList.add("ring-open");
}

if(e.statut_auto==="prevision"){
statut.innerText="Prévision";
panelIcon.classList.add("ring-prevision");
}

if(e.statut_auto==="ferme"){
statut.innerText="Fermé";
panelIcon.classList.add("ring-ferme");
}

if(e.statut_auto==="hors-service"){
statut.innerText="Hors service";
panelIcon.classList.add("ring-hors");
}

panel.classList.add("active");

}

document.getElementById("closePanel").onclick=()=>panel.classList.remove("active");

function goBack(){
const page=document.getElementById("page");
page.classList.remove("active");
page.classList.add("exit");
setTimeout(()=>{location.href="index.html"},300);
}

</script>

</body>
</html>
