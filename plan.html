<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plan interactif</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#f4f4f4;
font-family:'Montserrat',sans-serif;
color:#000;
transition:background .3s ease,color .3s ease;
}

/* PAGE */

.page{
min-height:100vh;
transform:translateX(100%);
transition:transform .35s ease;
}

.page.active{transform:translateX(0);}
.page.exit{transform:translateX(100%);}

/* HEADER */

header{
position:relative;
height:70px;
}

#backBtn{
position:absolute;
left:15px;
top:50%;
transform:translateY(-50%);
width:42px;
height:42px;
border-radius:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 3px 8px rgba(0,0,0,0.15);
cursor:pointer;
}

#backBtn img{width:22px;}

header h1{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
margin:0;
font-size:18px;
font-weight:700;
}

/* PLAN */

#mapWrapper{
position:relative;
padding:10px;
}

#map{
width:100%;
border-radius:20px;
}

/* BOUTONS */

.plan-btn{
position:absolute;
width:48px;
height:48px;
background:#1e2c88;
border-radius:14px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.plan-btn img{
width:26px;
height:26px;
object-fit:contain;
}

#btn-carriere{top:20%;left:25%;}
#btn-beudot{top:20%;left:55%;}
#btn-manege{top:35%;left:38%;}
#btn-grande-voie{top:38%;left:69%;}
#btn-maison{top:55%;left:60%;}

/* LEGENDE */

.legend{
padding:20px;
font-size:15px;
}

.legend-item{
display:flex;
align-items:center;
gap:10px;
margin-bottom:15px;
}

.legend-item img{width:22px;}

/* PANEL */

#panel{
position:fixed;
left:0;
bottom:0;
width:100%;
height:50%;
background:#ffffff;
border-radius:20px 20px 0 0;
transform:translateY(100%);
transition:.3s;
padding:20px;
box-sizing:border-box;
}

#panel.active{transform:translateY(0);}

/* CERCLE */

#panelIcon{
position:absolute;
top:-32px;
left:50%;
transform:translateX(-50%) scale(.7);
width:64px;
height:64px;
border-radius:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 10px 25px rgba(0,0,0,0.35);
transition:transform .35s cubic-bezier(.34,1.56,.64,1);
}

#panel.active #panelIcon{
transform:translateX(-50%) scale(1);
}

#panelIcon::before{
content:"";
position:absolute;
inset:-4px;
border-radius:50%;
border:4px solid transparent;
animation:spinRing 4s linear infinite;
}

@keyframes spinRing{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

#panelIcon img{
width:30px;
height:30px;
}

/* COULEURS ANNEAU */

.ring-open::before{
border-top-color:green;
}

.ring-prevision::before{
border-top-color:#E88B00;
}

.ring-ferme::before{
border-top-color:red;
}

.ring-hors::before{
border-top-color:gray;
}

/* PANEL CONTENT */

#panelHeader{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:20px;
}

#panelTitle{
font-size:20px;
font-weight:700;
}

#closePanel{
font-size:22px;
cursor:pointer;
}

.row{margin-top:14px;}

.label{
font-size:12px;
color:#888;
}

.value{
font-size:14px;
font-weight:500;
}

#statut{
font-size:18px;
font-weight:700;
}

#horaire{
font-size:14px;
font-weight:500;
}

.optionText{
font-size:13px;
margin-right:15px;
}

#info{
margin-top:8px;
line-height:1.7;
font-size:14px;
font-weight:550;
}

.scrollable{
max-height:160px;
overflow-y:auto;
}

#reserveBox{
display:none;
margin-top:20px;
background:#E88B00;
color:white;
padding:12px;
border-radius:12px;
text-align:center;
font-weight:600;
cursor:pointer;
}

/* DARK MODE */

@media(prefers-color-scheme:dark){

body{
background:#0f1115;
color:white;
}

header h1{color:white;}

#backBtn{
background:#1c1f26;
box-shadow:0 12px 30px rgba(0,0,0,0.6);
}

#backBtn img{
filter:brightness(0) invert(1);
}

#panel{
background:#1c1f26;
box-shadow:0 25px 60px rgba(0,0,0,0.75);
}

#panelIcon{
background:#1c1f26;
}

.label{color:#9aa0a6;}
.value{color:#e5e5e5;}
.legend{color:#ddd;}

}

</style>
</head>

<body>

<div class="page" id="page">

<header>
<div id="backBtn" onclick="goBack()">
<img src="image/back.svg">
</div>
<h1>PLAN INTERACTIF</h1>
</header>

<div id="mapWrapper">

<img id="map" src="image/plan.png">

<div class="plan-btn" id="btn-carriere" onclick="openSpace('carriere')"><img id="icon-carriere"></div>
<div class="plan-btn" id="btn-beudot" onclick="openSpace('beudot')"><img id="icon-beudot"></div>
<div class="plan-btn" id="btn-manege" onclick="openSpace('manege')"><img id="icon-manege"></div>
<div class="plan-btn" id="btn-grande-voie" onclick="openSpace('grande-voie')"><img id="icon-grande-voie"></div>
<div class="plan-btn" id="btn-maison" onclick="openSpace('maison')"><img id="icon-maison"></div>

</div>

<div class="legend">
<div class="legend-item"><img src="image/ouvert.png"> Ouvert</div>
<div class="legend-item"><img src="image/prevision.png"> Prévision d'ouverture</div>
<div class="legend-item"><img src="image/ferme.png"> Fermé</div>
<div class="legend-item"><img src="image/horsservice.png"> Hors service</div>
</div>

<div id="panel">

<div id="panelIcon">
<img id="panelIconImg">
</div>

<div id="panelHeader">
<div id="panelTitle">---</div>
<div id="closePanel">✕</div>
</div>

<div class="row">
<div class="label">Statut</div>
<div class="value" id="statut">---</div>
</div>

<div class="row">
<div class="label">Horaires</div>
<div class="value" id="horaire">---</div>
</div>

<div class="row" id="optionsRow">
<div class="label">Activités possibles</div>
<div>
<span class="optionText" id="liberte"></span>
<span class="optionText" id="longe"></span>
</div>
</div>

<div class="row">
<div class="label">Infos</div>
<div class="value scrollable" id="info"></div>
</div>

<div id="reserveBox" onclick="goReserve()">Réserver</div>

</div>

</div>

<script>

window.addEventListener("DOMContentLoaded",()=>{
requestAnimationFrame(()=>{
document.getElementById("page").classList.add("active");
});
});

const SHEET_URL="https://script.google.com/macros/s/AKfycbzWEB8PPqSQ4rinnTbh4414U3QPX836XtPOPBmKr0Bw2W4mRFWAl7Chv6WKHOjrcWoZew/exec?sheet=statuts";

let DATA=[];

const panelTitle=document.getElementById("panelTitle");
const statut=document.getElementById("statut");
const horaire=document.getElementById("horaire");
const info=document.getElementById("info");
const liberte=document.getElementById("liberte");
const longe=document.getElementById("longe");
const optionsRow=document.getElementById("optionsRow");
const reserveBox=document.getElementById("reserveBox");
const panel=document.getElementById("panel");
const panelIcon=document.getElementById("panelIcon");
const panelIconImg=document.getElementById("panelIconImg");

function loadData(){

fetch(SHEET_URL+"&t="+Date.now())
.then(r=>r.json())
.then(d=>{
DATA=d;
renderIcons(d);
});

}

function renderIcons(data){

data.forEach(e=>{
const el=document.getElementById("icon-"+e.espace);
if(!el)return;

const icon={
ouvert:"image/ouvert.png",
ferme:"image/ferme.png",
prevision:"image/prevision.png",
"hors-service":"image/horsservice.png"
}[e.statut_auto];

if(icon)el.src=icon;

});

}

loadData();
setInterval(loadData,10000);

function openSpace(espace){

const e=DATA.find(x=>x.espace===espace);
if(!e)return;

panelTitle.innerText=e.espace;

panelIcon.classList.remove("ring-open","ring-prevision","ring-ferme","ring-hors");

if(espace==="carriere"||espace==="manege"){
panelIconImg.src="image/travail.svg";
}else{
panelIconImg.src="image/paddock.svg";
}

if(e.statut_auto==="ouvert"){
statut.innerText="Ouvert";
statut.style.color="green";
panelIcon.classList.add("ring-open");
}

if(e.statut_auto==="prevision"){
statut.innerText="Ouverture prévue";
statut.style.color="#E88B00";
panelIcon.classList.add("ring-prevision");
}

if(e.statut_auto==="ferme"){
statut.innerText="Fermé";
statut.style.color="red";
panelIcon.classList.add("ring-ferme");
}

if(e.statut_auto==="hors-service"){
statut.innerText="Hors service";
statut.style.color="gray";
panelIcon.classList.add("ring-hors");
}

panel.classList.add("active");

}

document.getElementById("closePanel").onclick=()=>panel.classList.remove("active");

function goBack(){
const page=document.getElementById("page");
page.classList.remove("active");
page.classList.add("exit");
setTimeout(()=>{location.href="index.html";},300);
}

function goReserve(){
location.href="planningpaddock.html";
}

</script>

</body>
</html>
