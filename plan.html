<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plan interactif</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>

/* BASE */

body{
margin:0;
background:#f4f4f4;
font-family:'Montserrat',sans-serif;
color:#000;
}

:root{
--haloColor:#2ecc71;
}

/* PAGE ANIMATION */

.page{
min-height:100vh;
transform:translateX(100%);
transition:transform .35s ease;
}

.page.active{
transform:translateX(0);
}

/* HEADER */

header{
position:relative;
height:70px;
}

#backBtn{
position:absolute;
left:15px;
top:50%;
transform:translateY(-50%);
width:42px;
height:42px;
border-radius:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 3px 8px rgba(0,0,0,0.15);
cursor:pointer;
}

#backBtn img{
width:22px;
}

header h1{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
margin:0;
font-size:18px;
font-weight:700;
}

/* PLAN */

#mapWrapper{
position:relative;
padding:10px;
}

#map{
width:100%;
border-radius:20px;
}

/* BOUTONS */

.plan-btn{
position:absolute;
width:48px;
height:48px;
background:#1e2c88;
border-radius:14px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.plan-btn img{
width:26px;
}

/* positions */

#btn-carriere{top:20%;left:25%;}
#btn-beudot{top:20%;left:55%;}
#btn-manege{top:35%;left:38%;}
#btn-grande{top:38%;left:69%;}
#btn-maison{top:55%;left:60%;}

/* LEGENDE */

.legend{
padding:20px;
font-size:15px;
}

.legend-item{
display:flex;
align-items:center;
gap:10px;
margin-bottom:15px;
}

.legend-item img{
width:22px;
}

/* PANEL */

#panel{
position:fixed;
left:0;
bottom:0;
width:100%;
height:50%;
background:white;
border-radius:20px 20px 0 0;

transform:translateY(110%);
opacity:0;

transition:transform .35s ease, opacity .2s ease;

padding:20px;
box-sizing:border-box;
}

#panel.active{
transform:translateY(0);
opacity:1;
}

/* ICON CERCLE */

#panelIcon{
position:absolute;
top:-30px;
left:50%;
transform:translateX(-50%);
width:60px;
height:60px;
border-radius:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 8px 25px rgba(0,0,0,0.25);

opacity:0;
transition:opacity .25s ease .15s;
}

#panel.active #panelIcon{
opacity:1;
}

/* HALO */

#panelIcon::before{
content:"";
position:absolute;
inset:-3px;
border-radius:50%;

background:conic-gradient(
var(--haloColor) 0deg,
transparent 0deg
);

-webkit-mask:
radial-gradient(farthest-side, transparent calc(100% - 3px), black calc(100% - 3px));
mask:
radial-gradient(farthest-side, transparent calc(100% - 3px), black calc(100% - 3px));

animation:haloFill .8s ease forwards;
}

#panelIcon img{
width:30px;
}

/* HALO ANIMATION */

@keyframes haloFill{
0%{
background:conic-gradient(var(--haloColor) 0deg, transparent 0deg);
}
100%{
background:conic-gradient(var(--haloColor) 360deg, transparent 360deg);
}
}

/* PANEL CONTENT */

#panelHeader{
display:flex;
justify-content:space-between;
align-items:center;
}

#panelTitle{
font-size:20px;
font-weight:700;
}

#closePanel{
font-size:22px;
cursor:pointer;
}

.row{
margin-top:14px;
}

.label{
font-size:12px;
color:#888;
}

.value{
font-size:14px;
font-weight:500;
}

#statut{
font-size:18px;
font-weight:700;
}

#reserveBox{
display:none;
margin-top:20px;
background:#E88B00;
color:white;
padding:12px;
border-radius:12px;
text-align:center;
font-weight:600;
cursor:pointer;
}

</style>
</head>

<body>

<div class="page" id="page">

<header>
<div id="backBtn" onclick="goBack()">
<img src="image/back.svg">
</div>
<h1>PLAN INTERACTIF</h1>
</header>

<div id="mapWrapper">

<img id="map" src="image/plan.png">

<div class="plan-btn" id="btn-carriere" onclick="openSpace('carriere')">
<img id="icon-carriere">
</div>

<div class="plan-btn" id="btn-beudot" onclick="openSpace('beudot')">
<img id="icon-beudot">
</div>

<div class="plan-btn" id="btn-manege" onclick="openSpace('manege')">
<img id="icon-manege">
</div>

<div class="plan-btn" id="btn-grande" onclick="openSpace('grande-voie')">
<img id="icon-grande-voie">
</div>

<div class="plan-btn" id="btn-maison" onclick="openSpace('maison')">
<img id="icon-maison">
</div>

</div>

<div class="legend">

<div class="legend-item">
<img src="image/ouvert.png"> Ouvert
</div>

<div class="legend-item">
<img src="image/prevision.png"> Prévision d'ouverture
</div>

<div class="legend-item">
<img src="image/ferme.png"> Fermé
</div>

<div class="legend-item">
<img src="image/horsservice.png"> Hors service
</div>

</div>

<div id="panel">

<div id="panelIcon">
<img id="panelIconImg">
</div>

<div id="panelHeader">
<div id="panelTitle">---</div>
<div id="closePanel">✕</div>
</div>

<div class="row">
<div class="label">Statut</div>
<div class="value" id="statut">---</div>
</div>

<div class="row">
<div class="label">Horaires</div>
<div class="value" id="horaire">---</div>
</div>

<div class="row">
<div class="label">Infos</div>
<div class="value" id="info"></div>
</div>

<div id="reserveBox" onclick="goReserve()">
Réserver
</div>

</div>

</div>

<script>

window.addEventListener("DOMContentLoaded",()=>{
requestAnimationFrame(()=>{
document.getElementById("page").classList.add("active");
});
});

const SHEET_URL="https://script.google.com/macros/s/AKfycbzWEB8PPqSQ4rinnTbh4414U3QPX836XtPOPBmKr0Bw2W4mRFWAl7Chv6WKHOjrcWoZew/exec?sheet=statuts";

let DATA=[];

const panel=document.getElementById("panel");
const panelTitle=document.getElementById("panelTitle");
const statut=document.getElementById("statut");
const horaire=document.getElementById("horaire");
const info=document.getElementById("info");

function setPanelIcon(espace){

if(espace==="carriere"||espace==="manege"){
panelIconImg.src="image/travail.svg";
}else{
panelIconImg.src="image/paddock.svg";
}

}

function loadData(){

fetch(SHEET_URL+"&t="+Date.now())
.then(r=>r.json())
.then(d=>{
DATA=d;
renderIcons(d);
});

}

function renderIcons(data){

data.forEach(e=>{

const el=document.getElementById("icon-"+e.espace);

if(!el) return;

if(e.statut_auto==="ouvert") el.src="image/ouvert.png";
if(e.statut_auto==="ferme") el.src="image/ferme.png";
if(e.statut_auto==="prevision") el.src="image/prevision.png";
if(e.statut_auto==="hors-service") el.src="image/horsservice.png";

});

}

loadData();
setInterval(loadData,10000);

function openSpace(espace){

setPanelIcon(espace);

const e=DATA.find(x=>x.espace===espace);
if(!e) return;

panelTitle.innerText=e.espace;

statut.innerText=e.statut_auto;

info.innerText=e.info||"Aucune info";

document.documentElement.style.setProperty('--haloColor',
e.statut_auto==="ferme"?"red":
e.statut_auto==="prevision"?"#E88B00":
e.statut_auto==="hors-service"?"gray":"green"
);

panel.classList.add("active");

}

closePanel.onclick=()=>panel.classList.remove("active");

function goBack(){
location.href="index.html";
}

function goReserve(){
location.href="planningpaddock.html";
}

</script>

</body>
</html>
