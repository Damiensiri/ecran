<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plan interactif</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#f4f4f4;
font-family:'Montserrat',sans-serif;
color:#000;
transition:background .3s ease,color .3s ease;
}

/* PAGE ANIMATION */

.page{
min-height:100vh;
transform:translateX(100%);
transition:.35s;
}

.page.active{transform:translateX(0);}
.page.exit{transform:translateX(100%);}

/* HEADER */

header{
position:relative;
height:70px;
}

#backBtn{
position:absolute;
left:15px;
top:50%;
transform:translateY(-50%);
width:42px;
height:42px;
border-radius:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 3px 8px rgba(0,0,0,0.15);
cursor:pointer;
}

#backBtn img{width:22px}

header h1{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
margin:0;
font-size:18px;
font-weight:700;
}

/* MAP */

#mapWrapper{
position:relative;
padding:10px;
}

#map{
width:100%;
border-radius:20px;
}

/* MAP BUTTONS */

.plan-btn{
position:absolute;
width:48px;
height:48px;
background:#1e2c88;
border-radius:14px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.plan-btn img{
width:26px;
height:26px;
object-fit:contain;
}

/* positions */

#btn-carriere{top:20%;left:25%;}
#btn-beudot{top:20%;left:55%;}
#btn-manege{top:35%;left:38%;}
#btn-grande{top:38%;left:69%;}
#btn-maison{top:55%;left:60%;}

/* LEGEND */

.legend{
padding:20px;
font-size:15px;
}

.legend-item{
display:flex;
align-items:center;
gap:10px;
margin-bottom:15px;
}

.legend-item img{width:22px}

/* PANEL */

#panel{
position:fixed;
left:0;
bottom:0;
width:100%;
height:50%;
background:#ffffff;
border-radius:20px 20px 0 0;
transform:translateY(100%);
transition:.3s;
padding:20px;
box-sizing:border-box;
}

#panel.active{transform:translateY(0)}

/* ICON */

#panelIcon{
position:absolute;
top:-30px;
left:50%;
transform:translateX(-50%);
width:60px;
height:60px;
border-radius:50%;
background:#ffffff;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 8px 25px rgba(0,0,0,0.25);
}

#panelIcon img{
width:30px;
position:relative;
z-index:2;
}

/* HALO */

#panelHalo{
position:absolute;
inset:-6px;
border-radius:50%;
background:conic-gradient(var(--haloColor) 0deg, transparent 0deg);
mask: radial-gradient(farthest-side, transparent calc(100% - 4px), black calc(100% - 4px));
-webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 4px), black calc(100% - 4px));
z-index:1;
}

#panelIcon.halo-anim #panelHalo{
animation:haloLoader 1.2s ease forwards;
}

/* HALO ANIMATION */

:root{
--haloColor:#2ecc71;
}

@keyframes haloLoader{
from{
background:conic-gradient(var(--haloColor) 0deg, transparent 0deg);
}
to{
background:conic-gradient(var(--haloColor) 360deg, transparent 360deg);
}
}

/* PANEL CONTENT */

#panelHeader{
display:flex;
justify-content:space-between;
align-items:center;
}

#panelTitle{
font-size:20px;
font-weight:700;
}

#closePanel{
font-size:22px;
cursor:pointer;
}

.row{margin-top:14px}

.label{
font-size:12px;
color:#888;
}

.value{
font-size:14px;
font-weight:500;
}

#statut{
font-size:18px;
font-weight:700;
}

#horaire{
font-size:14px;
font-weight:500;
}

.optionText{
font-size:13px;
margin-right:15px;
}

#info{
margin-top:8px;
line-height:1.7;
font-size:14px;
font-weight:550;
}

.scrollable{
max-height:160px;
overflow-y:auto;
}

#reserveBox{
display:none;
margin-top:20px;
background:#E88B00;
color:white;
padding:12px;
border-radius:12px;
text-align:center;
font-weight:600;
cursor:pointer;
}

/* DARK MODE */

@media(prefers-color-scheme:dark){

body{background:#0f1115;color:white}

#panel{background:#1c1f26}

#panelIcon{background:#1c1f26}

#backBtn{
background:#1c1f26;
box-shadow:0 12px 30px rgba(0,0,0,0.6);
}

#backBtn img{
filter:brightness(0) invert(1);
}

}

</style>
</head>

<body>

<div class="page" id="page">

<header>
<div id="backBtn" onclick="goBack()">
<img src="image/back.svg">
</div>
<h1>PLAN INTERACTIF</h1>
</header>

<div id="mapWrapper">

<img id="map" src="image/plan.png">

<div class="plan-btn" id="btn-carriere" onclick="openSpace('carriere')">
<img id="icon-carriere">
</div>

<div class="plan-btn" id="btn-beudot" onclick="openSpace('beudot')">
<img id="icon-beudot">
</div>

<div class="plan-btn" id="btn-manege" onclick="openSpace('manege')">
<img id="icon-manege">
</div>

<div class="plan-btn" id="btn-grande" onclick="openSpace('grande-voie')">
<img id="icon-grande-voie">
</div>

<div class="plan-btn" id="btn-maison" onclick="openSpace('maison')">
<img id="icon-maison">
</div>

</div>

<div class="legend">
<div class="legend-item"><img src="image/ouvert.png"> Ouvert</div>
<div class="legend-item"><img src="image/prevision.png"> Prévision d'ouverture</div>
<div class="legend-item"><img src="image/ferme.png"> Fermé</div>
<div class="legend-item"><img src="image/horsservice.png"> Hors service</div>
</div>

<div id="panel">

<div id="panelIcon">
<div id="panelHalo"></div>
<img id="panelIconImg">
</div>

<div id="panelHeader">
<div id="panelTitle">---</div>
<div id="closePanel">✕</div>
</div>

<div class="row">
<div class="label">Statut</div>
<div class="value" id="statut">---</div>
</div>

<div class="row">
<div class="label">Horaires</div>
<div class="value" id="horaire">---</div>
</div>

<div class="row" id="optionsRow">
<div class="label">Activités possibles</div>
<div>
<span class="optionText" id="liberte"></span>
<span class="optionText" id="longe"></span>
</div>
</div>

<div class="row">
<div class="label">Infos</div>
<div class="value scrollable" id="info"></div>
</div>

<div id="reserveBox" onclick="goReserve()">Réserver</div>

</div>

</div>

<script>

/* ICON TYPE */

function setPanelIcon(espace){

if(espace==="carriere" || espace==="manege"){
panelIconImg.src="image/travail.svg"
}else{
panelIconImg.src="image/paddock.svg"
}

}

/* PAGE OPEN */

window.addEventListener("DOMContentLoaded",()=>{
requestAnimationFrame(()=>{
page.classList.add("active")
})
})

/* PANEL */

const panelIcon=document.getElementById("panelIcon")

function startHalo(){

panelIcon.classList.remove("halo-anim")
panelIcon.offsetHeight
panelIcon.classList.add("halo-anim")

}

/* (le reste de ton JS reste identique) */

</script>

</body>
</html>
