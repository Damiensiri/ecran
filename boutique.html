<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Services</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Montserrat',sans-serif;
background:#f4f4f4;
color:#000;
transition:.3s;
}

/* HEADER */

header{
position:relative;
height:70px;
}

#backBtn{
position:absolute;
left:15px;
top:50%;
transform:translateY(-50%);
width:42px;
height:42px;
border-radius:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 3px 8px rgba(0,0,0,0.15);
cursor:pointer;
}

#backBtn img{
width:22px;
}

header h1{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
font-size:18px;
margin:0;
}

/* PRODUITS */

#products{
padding:10px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:12px;
}

.product{
background:white;
border-radius:16px;
padding:10px;
box-shadow:0 5px 12px rgba(0,0,0,0.12);
display:flex;
flex-direction:column;
}

.product img{
width:100%;
border-radius:12px;
}

.name{
font-weight:700;
margin-top:6px;
}

.price{
font-weight:600;
margin:4px 0;
}

.qty{
display:flex;
justify-content:space-between;
align-items:center;
}

.qty button{
border:none;
background:#181E3B;
color:white;
width:26px;
height:26px;
border-radius:6px;
cursor:pointer;
}

.add{
margin-top:6px;
padding:8px;
background:#181E3B;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

/* PANIER FLOTTANT */

#cartBtn{
position:fixed;
bottom:20px;
right:20px;
background:#181E3B;
color:white;
padding:14px 18px;
border-radius:30px;
border:none;
font-weight:700;
box-shadow:0 10px 25px rgba(0,0,0,0.35);
cursor:pointer;
z-index:100;
}

/* PANIER */

#cart{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
border-radius:20px 20px 0 0;
box-shadow:0 -5px 20px rgba(0,0,0,0.3);
padding:16px;
display:none;
max-height:80vh;
overflow:auto;
}

.cartHeader{
display:flex;
justify-content:space-between;
align-items:center;
}

.closeCart{
font-size:20px;
width:36px;
height:36px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
background:#181E3B;
color:white;
border:none;
cursor:pointer;
}

.cartItem{
display:flex;
justify-content:space-between;
margin:8px 0;
}

.checkout{
margin-top:10px;
padding:12px;
width:100%;
background:#181E3B;
color:white;
border:none;
border-radius:12px;
font-weight:700;
cursor:pointer;
}

/* FORM */

input{
width:100%;
padding:10px;
margin-top:8px;
border-radius:10px;
border:none;
background:#f4f4f4;
}

/* DARK MODE */

@media(prefers-color-scheme:dark){

body{
background:#0f1115;
color:white;
}

.product{
background:#1c1f26;
}

#cart{
background:#1c1f26;
}

#backBtn{
background:#1c1f26;
}

#backBtn img{
filter:brightness(0) invert(1);
}

input{
background:#252a33;
color:white;
}

}

</style>
</head>

<body>

<header>

<div id="backBtn" onclick="location.href='index.html'">
<img src="image/back.svg">
</div>

<h1>SERVICES</h1>

</header>

<div id="products"></div>

<button id="cartBtn" onclick="toggleCart()">🛒 0</button>

<div id="cart">

<div class="cartHeader">
<h3>Votre panier</h3>
<button class="closeCart" onclick="toggleCart()">✕</button>
</div>

<div id="cartItems"></div>

<input id="clientNom" placeholder="Nom">
<input id="clientPrenom" placeholder="Prénom">
<input id="clientEmail" placeholder="Email">

<button class="checkout" onclick="checkout()">Commander</button>

</div>

<script>

/* PRODUITS DEMO */

const products=[
{ id:1, name:"Coaching CSO", price:30, img:"https://picsum.photos/300?1"},
{ id:2, name:"Travail cheval", price:45, img:"https://picsum.photos/300?2"},
{ id:3, name:"Laverie couverture", price:25, img:"https://picsum.photos/300?3"}
]

let cart=JSON.parse(localStorage.getItem("cart")||"[]")

/* RENDER PRODUITS */

function renderProducts(){

const container=document.getElementById("products")

container.innerHTML=""

products.forEach(p=>{

let el=document.createElement("div")
el.className="product"

el.innerHTML=`

<img src="${p.img}">

<div class="name">${p.name}</div>
<div class="price">${p.price}€</div>

<button class="add" onclick="addToCart(${p.id})">
Ajouter
</button>

`

container.appendChild(el)

})

}

/* PANIER */

function addToCart(id){

let p=products.find(x=>x.id===id)

let item=cart.find(x=>x.id===id)

if(item){

item.qty++

}else{

cart.push({id:id,name:p.name,price:p.price,qty:1})

}

saveCart()

}

/* SAVE */

function saveCart(){

localStorage.setItem("cart",JSON.stringify(cart))

updateCart()

}

/* UPDATE */

function updateCart(){

document.getElementById("cartBtn").innerText="🛒 "+cart.length

const list=document.getElementById("cartItems")

list.innerHTML=""

cart.forEach(i=>{

let row=document.createElement("div")

row.className="cartItem"

row.innerHTML=`
${i.name} x${i.qty}
<span>${i.price*i.qty}€</span>
`

list.appendChild(row)

})

}

/* OUVRIR PANIER */

function toggleCart(){

let cartEl=document.getElementById("cart")

cartEl.style.display=cartEl.style.display==="block"?"none":"block"

}

/* COMMANDER */

function checkout(){

let nom=document.getElementById("clientNom").value.trim()
let prenom=document.getElementById("clientPrenom").value.trim()
let email=document.getElementById("clientEmail").value.trim()

if(!nom || !prenom || !email){

alert("Veuillez remplir Nom, Prénom et Email")
return

}

let orders=JSON.parse(localStorage.getItem("orders")||"[]")

orders.push({

date:new Date().toISOString(),
nom,
prenom,
email,
items:cart

})

localStorage.setItem("orders",JSON.stringify(orders))

cart=[]
localStorage.removeItem("cart")

updateCart()

alert("Commande envoyée")

toggleCart()

}

/* INIT */

renderProducts()
updateCart()

</script>

</body>
</html>
