<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Services</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>

/* BASE */
body{
margin:0;
font-family:'Montserrat',sans-serif;
background:#f4f4f4;
}

/* HEADER */
header{position:relative;height:70px;}

#backBtn{
position:absolute;left:15px;top:50%;transform:translateY(-50%);
width:42px;height:42px;border-radius:50%;
background:white;display:flex;align-items:center;justify-content:center;
box-shadow:0 3px 8px rgba(0,0,0,0.15);cursor:pointer;
}

#backBtn img{width:22px;}

header h1{
position:absolute;left:50%;top:50%;
transform:translate(-50%,-50%);
margin:0;font-size:18px;font-weight:700;
}

/* GRID */
#products{
padding:10px 10px 120px;
display:grid;gap:16px;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
}

.card{
background:white;border-radius:16px;overflow:hidden;
box-shadow:0 8px 20px rgba(0,0,0,0.12);
}

.imgBox{height:140px;}
.imgBox img{width:100%;height:100%;object-fit:cover;}

.content{padding:14px;}

.bottom{display:flex;justify-content:space-between;align-items:center;}

button{
background:#181E3B;color:white;border:none;
padding:8px 12px;border-radius:10px;cursor:pointer;
}

/* PANIER */
#cartBtn{
position:fixed;bottom:20px;right:20px;
background:#181E3B;color:white;
padding:12px 16px;border-radius:30px;
box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

#cartPanel{
position:fixed;right:0;top:0;width:320px;height:100%;
background:white;padding:20px;
transform:translateX(100%);
transition:.35s;
overflow:auto;
}

#cartPanel.open{transform:translateX(0);}

.cartItem{display:flex;justify-content:space-between;margin-bottom:10px;}

#cartPanel input{
width:100%;padding:10px;margin-bottom:10px;
border-radius:8px;border:none;background:#f4f4f4;
}

.checkoutBtn{
width:100%;padding:16px;margin-top:20px;
border-radius:12px;font-weight:700;
}

/* ANIMATIONS */
.flyImg{
position:fixed;
z-index:9999;
pointer-events:none;
border-radius:12px;
transition:all .7s cubic-bezier(.2,.8,.2,1);
}

@keyframes pulse{
0%{transform:scale(1)}
40%{transform:scale(1.25)}
100%{transform:scale(1)}
}

.pulse{animation:pulse .4s;}

</style>
</head>

<body>

<header>
<div id="backBtn" onclick="location.href='index.html'">
<img src="image/back.svg">
</div>
<h1>SERVICES</h1>
</header>

<div id="products"></div>

<button id="cartBtn" onclick="toggleCart()">🛒 <span id="count">0</span></button>

<div id="cartPanel">

<h2>Panier</h2>

<div id="cartItems"></div>
<p>Total : <b><span id="total">0</span> €</b></p>

<hr>

<input id="clientNom" placeholder="Nom *">
<input id="clientPrenom" placeholder="Prénom *">
<input id="clientEmail" placeholder="Email *">

<button class="checkoutBtn" onclick="checkout()">Commander</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>

emailjs.init("03cdce-AcdCC03k_v")

let cart=[]

/* PRODUITS (remplaçables par ton Sheet après) */
let products=[
{name:"Foin",price:5,img:"https://picsum.photos/200?1"},
{name:"Granulés",price:12,img:"https://picsum.photos/200?2"},
{name:"Carottes",price:3,img:"https://picsum.photos/200?3"}
]

products.forEach(p=>{
let card=document.createElement("div")
card.className="card"
card.innerHTML=`
<div class="imgBox"><img src="${p.img}"></div>
<div class="content">
<b>${p.name}</b><br>${p.price} €
<div class="bottom">
<button onclick="addCart('${p.name}',${p.price},this)">Ajouter</button>
</div>
</div>`
document.getElementById("products").appendChild(card)
})

function addCart(name,price,btn){

/* ANIMATION IMAGE */
let img = btn.closest(".card").querySelector("img")
let rect = img.getBoundingClientRect()
let cartBtn = document.getElementById("cartBtn")
let cartRect = cartBtn.getBoundingClientRect()

let fly = img.cloneNode(true)
fly.classList.add("flyImg")

fly.style.left = rect.left+"px"
fly.style.top = rect.top+"px"
fly.style.width = rect.width+"px"
fly.style.height = rect.height+"px"

document.body.appendChild(fly)

setTimeout(()=>{
fly.style.left = cartRect.left+"px"
fly.style.top = cartRect.top+"px"
fly.style.width = "20px"
fly.style.height = "20px"
fly.style.opacity="0.3"
},10)

setTimeout(()=>fly.remove(),700)

/* PANIER */
let item=cart.find(i=>i.name===name)
if(item){item.qty++}else{cart.push({name,price,qty:1})}

updateCart()

/* PULSE */
cartBtn.classList.add("pulse")
setTimeout(()=>cartBtn.classList.remove("pulse"),400)
}

function updateCart(){
let total=0,count=0,html=""

cart.forEach((i,idx)=>{
total+=i.price*i.qty
count+=i.qty

html+=`
<div class="cartItem">
<div>${i.name} x${i.qty}</div>
<div>${i.price*i.qty}€</div>
</div>`
})

document.getElementById("cartItems").innerHTML=html
document.getElementById("total").innerText=total
document.getElementById("count").innerText=count
}

function toggleCart(){
document.getElementById("cartPanel").classList.toggle("open")
}

function checkout(){

let nom=clientNom.value.trim()
let prenom=clientPrenom.value.trim()
let email=clientEmail.value.trim()

if(!nom||!prenom||!email||cart.length===0){
alert("Champs requis ou panier vide")
return
}

let orderId=Date.now()
let dateISO=new Date().toISOString()
let total=cart.reduce((a,b)=>a+b.price*b.qty,0)

let commandeText=cart.map(i=>`${i.name} x${i.qty}`).join(" | ")

/* GOOGLE FORM */
fetch("https://docs.google.com/forms/d/e/1FAIpQLSd7FyCadHVREHz5A_Y3tGIANItJppc-xx2hEtopxd90lU50Hw/formResponse",{
method:"POST",
mode:"no-cors",
body:new URLSearchParams({
"entry.1196863567":nom,
"entry.1084486832":prenom,
"entry.322695866":email,
"entry.1740027870":commandeText,
"entry.99574245":total,
"entry.1184215130":orderId,
"entry.489600561":dateISO,
"entry.1098731878":"En attente"
})
})

/* EMAIL */
emailjs.send("service_mkpsbdf","template_ftv15rb",{
nom,prenom,email,commande:commandeText,total
})

.then(()=>{
alert("Commande envoyée ✅")

cart=[]
updateCart()

clientNom.value=""
clientPrenom.value=""
clientEmail.value=""

location.href="mes-commandes.html"
})
.catch(()=>{
alert("Commande enregistrée mais mail KO")
})

}

</script>

</body>
</html>
