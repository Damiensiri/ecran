<!-- SEULE MODIF META -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">

<style>

/* AJOUT IMPORTANT INPUT (anti zoom) */
#cartPanel input{
font-size:16px;
}

/* FIX BOUTON FANTÔME */
#featured{
pointer-events:none;
transform-origin:top center;
}

#featured button{
pointer-events:auto;
}

/* GRID FIX */
#products{
align-items:start;
}

</style>

<script>

/* 🔥 FIX SCROLL SAFARI */
const featured=document.getElementById("featured")

window.addEventListener("scroll",()=>{

if(!featured) return

let scroll=window.scrollY

let scale=1-(scroll/700)
if(scale<0.85) scale=0.85

let opacity=1-(scroll/500)
if(opacity<0.35) opacity=0.35

/* 👇 LA LIGNE QUI CHANGE TOUT */
featured.style.transform=`translateZ(0) scale(${scale})`

featured.style.opacity=opacity

})

</script>
