<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Services</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>

/* ================= BASE ================= */

body{
margin:0;
font-family:'Montserrat',sans-serif;
background:#f4f4f4;
color:#000;
transition:.3s;
}

/* ===== SLIDE ANIMATION ===== */

body{
transform:translateX(100%);
animation:slideIn .35s ease forwards;
}

@keyframes slideIn{
to{transform:translateX(0)}
}

body.slide-out{
animation:slideOut .35s ease forwards;
}

@keyframes slideOut{
to{transform:translateX(100%)}
}

/* ================= HEADER ================= */

header{
position:relative;
height:70px;
}

#backBtn{
position:absolute;
left:15px;
top:50%;
transform:translateY(-50%);
width:42px;
height:42px;
border-radius:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 3px 8px rgba(0,0,0,0.15);
cursor:pointer;
}

#backBtn img{
width:22px;
}

header h1{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
margin:0;
font-size:18px;
font-weight:700;
}

/* ================= GRID ================= */

#products{
padding:10px;
display:grid;
gap:16px;
}

/* ================= CARD ================= */

.card{

background:white;
border-radius:16px;
overflow:hidden;

box-shadow:0 8px 20px rgba(0,0,0,0.12);

}

.imgBox{
height:160px;
position:relative;
}

.imgBox img{
width:100%;
height:100%;
object-fit:cover;
}

.badge{

position:absolute;
top:10px;
left:10px;

background:#ff4757;
color:white;

font-size:12px;
padding:4px 10px;
border-radius:20px;

}

.content{
padding:14px;
}

.title{
font-weight:700;
font-size:18px;
}

.desc{
font-size:14px;
opacity:.7;
margin:6px 0;
}

.bottom{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:8px;
}

.price{
font-weight:700;
font-size:18px;
}

button{

background:#181E3B;
color:white;
border:none;
padding:8px 12px;
border-radius:10px;
cursor:pointer;

}

/* ================= PANIER ================= */

#cartBtn{

position:fixed;
bottom:20px;
right:20px;

background:#181E3B;
color:white;

padding:12px 16px;

border:none;
border-radius:30px;

box-shadow:0 8px 20px rgba(0,0,0,0.3);

cursor:pointer;

}

#cartPanel{

position:fixed;
right:-320px;
top:0;

width:300px;
height:100%;

background:white;

padding:20px;

transition:.3s;

overflow:auto;

}

#cartPanel.open{
right:0;
}

.cartItem{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

/* ================= DARK MODE ================= */

@media (prefers-color-scheme: dark){

body{
background:#0f1115;
color:white;
}

#backBtn{
background:#1c1f26;
box-shadow:0 12px 30px rgba(0,0,0,0.6);
}

#backBtn img{
filter:brightness(0) invert(1);
}

.card{
background:#1c1f26;
box-shadow:0 20px 50px rgba(0,0,0,0.75);
}

#cartPanel{
background:#1c1f26;
}

}

</style>
</head>

<body>

<header>

<div id="backBtn" onclick="goBack()">
<img src="https://img.icons8.com/ios-filled/50/000000/left.png">
</div>

<h1 id="title">SERVICES</h1>

</header>

<div id="products"></div>

<button id="cartBtn" onclick="toggleCart()">
🛒 <span id="count">0</span>
</button>

<div id="cartPanel">

<h2>Panier</h2>

<div id="cartItems"></div>

<p>Total : <span id="total">0</span> €</p>

<button onclick="checkout()">Commander</button>

</div>

<script>

/* ================= CONFIG ================= */

const SHOW_CATEGORIES=false

/* ================= FAKE DATA ================= */

const data=[

{
categorie:"coaching",
nom:"Coaching CSO",
description:"Séance 45 minutes",
prix:30,
image:"https://res.cloudinary.com/demo/image/upload/sample.jpg",
badge:"Nouveau"
},

{
categorie:"coaching",
nom:"Travail du cheval",
description:"Travail monté ou longe",
prix:25,
image:"https://res.cloudinary.com/demo/image/upload/sample.jpg",
badge:""
},

{
categorie:"laverie",
nom:"Machine 6kg",
description:"Lavage simple",
prix:8,
image:"https://res.cloudinary.com/demo/image/upload/sample.jpg",
badge:""
}

]

/* ================= URL CATEGORY ================= */

const params=new URLSearchParams(window.location.search)
const category=params.get("cat")

/* ================= PANIER ================= */

let cart=[]

renderProducts()

function renderProducts(){

const container=document.getElementById("products")

data.forEach(p=>{

if(category && p.categorie!==category) return

let card=document.createElement("div")
card.className="card"

card.innerHTML=`

<div class="imgBox">

<img src="${p.image}">

${p.badge?`<div class="badge">${p.badge}</div>`:""}

</div>

<div class="content">

<div class="title">${p.nom}</div>

<div class="desc">${p.description}</div>

<div class="bottom">

<div class="price">${p.prix} €</div>

<button onclick="addCart('${p.nom}',${p.prix})">
Ajouter
</button>

</div>

</div>

`

container.appendChild(card)

})

}

/* ================= PANIER ================= */

function addCart(name,price){

cart.push({name,price})

updateCart()

}

function updateCart(){

document.getElementById("count").innerText=cart.length

let html=""
let total=0

cart.forEach((item,i)=>{

html+=`

<div class="cartItem">

${item.name} ${item.price}€

<button onclick="removeItem(${i})">X</button>

</div>

`

total+=item.price

})

document.getElementById("cartItems").innerHTML=html
document.getElementById("total").innerText=total

}

function removeItem(i){

cart.splice(i,1)

updateCart()

}

/* ================= PANIER UI ================= */

function toggleCart(){
document.getElementById("cartPanel").classList.toggle("open")
}

/* ================= COMMANDE ================= */

function checkout(){

alert("Commande envoyée (EmailJS plus tard)")

}

/* ================= NAV ================= */

function goBack(){

document.body.classList.add("slide-out")

setTimeout(()=>{

location.href="index.html"

},350)

}

</script>

</body>
</html>
