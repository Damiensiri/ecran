<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">

<title>Laverie</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Montserrat',sans-serif;
background:#0f1115;
color:white;
}

/* HEADER */
header{
position:relative;
height:70px;
}

#backBtn{
position:absolute;
left:15px;
top:50%;
transform:translateY(-50%);
width:42px;height:42px;
border-radius:50%;
background:#1c1f26;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

header h1{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
margin:0;
}

/* FEATURED */
#featured{
margin:10px;
border-radius:18px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

#featured img{
width:100%;
height:180px;
object-fit:cover;
}

#featuredContent{
padding:16px;
background:#1c1f26;
}

/* GRID */
#products{
padding:10px;
padding-bottom:120px;
display:grid;
gap:16px;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
}

/* CARD */
.card{
background:#1c1f26;
border-radius:16px;
overflow:hidden;
}

.imgBox{height:140px;}
.imgBox img{width:100%;height:100%;object-fit:cover;}

.content{padding:14px;}

.title{font-weight:700;font-size:18px;}
.desc{opacity:.7;font-size:14px;}

.bottom{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:10px;
}

/* BUTTON */
button{
background:#2e43b8;
color:white;
border:none;
padding:10px 14px;
border-radius:12px;
cursor:pointer;
}

/* CART */
#cartBtn{
position:fixed;
bottom:20px;
right:20px;
background:#2e43b8;
padding:12px 16px;
border-radius:30px;
z-index:100;
}

#cartPanel{
position:fixed;
right:0;
top:0;
width:320px;
height:100%;
background:#1c1f26;
padding:20px;
transform:translateX(100%);
transition:.3s;
z-index:200;
overflow:auto;
}

#cartPanel.open{transform:translateX(0);}

.cartItem{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

.qty{display:flex;gap:6px;}

#cartPanel input{
width:100%;
padding:12px;
margin-bottom:10px;
border-radius:8px;
border:none;
background:#252a33;
color:white;
font-size:16px;
}

/* ANIMATION */
.flyImg{
position:fixed;
z-index:9999;
pointer-events:none;
border-radius:12px;
transition:all .6s cubic-bezier(.2,.8,.2,1);
}

</style>
</head>

<body>

<header>
<div id="backBtn" onclick="location.href='index.html'">←</div>
<h1>LAVERIE</h1>
</header>

<div id="featured"></div>
<div id="products"></div>

<button id="cartBtn" onclick="toggleCart()">🛒 <span id="count">0</span></button>

<div id="cartPanel">
<h2>Panier</h2>

<div id="cartItems"></div>
<p>Total : <b><span id="total">0</span> €</b></p>

<input id="clientNom" placeholder="Nom *">
<input id="clientPrenom" placeholder="Prénom *">
<input id="clientEmail" placeholder="Email *">

<button onclick="checkout()">Commander</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>

emailjs.init("03cdce-AcdCC03k_v")

const SHEET_URL="https://opensheet.elk.sh/1ka6djXZhsDBbF77OVgH5wjqQwLpMUUPbMl1RD_rssXI/laverie"

let cart=[]

fetch(SHEET_URL)
.then(r=>r.json())
.then(data=>{

data.filter(p=>p.actif==="TRUE").forEach(p=>{

let html=`
<div class="card">
<div class="imgBox"><img src="${p.image}"></div>

<div class="content">
<div class="title">${p.nom}</div>
<div class="desc">${p.description}</div>

<div class="bottom">
<div>${p.prix} €</div>

<button data-name="${encodeURIComponent(p.nom)}"
data-price="${p.prix}">
Ajouter</button>

</div>
</div>
</div>
`

products.innerHTML+=html

})

/* 🔥 LISTENER PROPRE (PLUS JAMAIS DE BUG) */
document.querySelectorAll("#products button").forEach(btn=>{
btn.addEventListener("click",()=>addCart(btn))
})

})

function addCart(btn){

let name=decodeURIComponent(btn.dataset.name)
let price=Number(btn.dataset.price)

/* animation */
let img=btn.closest(".card").querySelector("img")

let rect=img.getBoundingClientRect()
let cartRect=cartBtn.getBoundingClientRect()

let fly=img.cloneNode(true)
fly.classList.add("flyImg")

fly.style.left=rect.left+"px"
fly.style.top=rect.top+"px"
fly.style.width=rect.width+"px"

document.body.appendChild(fly)

setTimeout(()=>{
fly.style.left=cartRect.left+"px"
fly.style.top=cartRect.top+"px"
fly.style.width="20px"
fly.style.opacity="0.3"
},10)

setTimeout(()=>fly.remove(),600)

/* panier */
let item=cart.find(i=>i.name===name)
if(item){item.qty++}else{cart.push({name,price,qty:1})}

updateCart()
}

function updateCart(){

count.innerText=cart.reduce((a,b)=>a+b.qty,0)

let total=0
cartItems.innerHTML=""

cart.forEach((i,index)=>{

total+=i.price*i.qty

cartItems.innerHTML+=`
<div class="cartItem">
${i.name}
<div class="qty">
<button onclick="changeQty(${index},-1)">-</button>
${i.qty}
<button onclick="changeQty(${index},1)">+</button>
</div>
</div>
`

})

document.getElementById("total").innerText=total
}

function changeQty(i,v){
cart[i].qty+=v
if(cart[i].qty<=0) cart.splice(i,1)
updateCart()
}

function toggleCart(){
cartPanel.classList.toggle("open")
}

function checkout(){

let nom=clientNom.value.trim()
let prenom=clientPrenom.value.trim()
let email=clientEmail.value.trim()

if(!nom || !prenom || !email){
alert("Remplis les champs")
return
}

let total=cart.reduce((a,b)=>a+(b.price*b.qty),0)

emailjs.send("service_mkpsbdf","template_ftv15rb",{nom,prenom,email,total})

fetch("https://docs.google.com/forms/d/e/1FAIpQLSd7FyCadHVREHz5A_Y3tGIANItJppc-xx2hEtopxd90lU50Hw/formResponse",{
method:"POST",
mode:"no-cors",
body:new URLSearchParams({
"entry.1196863567":nom,
"entry.1084486832":prenom,
"entry.322695866":email,
"entry.1740027870":"commande",
"entry.99574245":total
})
})

alert("Commande envoyée ✅")

cart=[]
updateCart()

}

</script>

</body>
</html>
