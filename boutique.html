<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Services</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>

/* ===== BASE ===== */

body{
margin:0;
font-family:'Montserrat',sans-serif;
background:#f4f4f4;
color:#000;
transition:.3s;
}

/* ===== HEADER ===== */

header{
position:relative;
height:70px;
}

#backBtn{
position:absolute;
left:15px;
top:50%;
transform:translateY(-50%);
width:42px;
height:42px;
border-radius:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 3px 8px rgba(0,0,0,0.15);
cursor:pointer;
}

#backBtn img{width:22px}

header h1{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
margin:0;
font-size:18px;
font-weight:700;
}

/* ===== FEATURED ===== */

#featured{
margin:10px;
border-radius:18px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

#featured img{
width:100%;
height:180px;
object-fit:cover;
}

#featuredContent{
padding:16px;
background:white;
}

/* ===== GRID ===== */

#products{
padding:10px;
display:grid;
gap:16px;
}

.card{
background:white;
border-radius:16px;
overflow:hidden;
box-shadow:0 8px 20px rgba(0,0,0,0.12);
}

.imgBox{
height:140px;
position:relative;
}

.imgBox img{
width:100%;
height:100%;
object-fit:cover;
}

.badge{
position:absolute;
top:10px;
left:10px;
background:#ff4757;
color:white;
padding:4px 10px;
border-radius:20px;
font-size:12px;
}

.content{
padding:14px;
}

.title{
font-weight:700;
font-size:18px;
}

.desc{
font-size:14px;
opacity:.7;
margin:6px 0;
}

.bottom{
display:flex;
justify-content:space-between;
align-items:center;
}

.price{
font-weight:700;
font-size:18px;
}

button{
background:#181E3B;
color:white;
border:none;
padding:8px 12px;
border-radius:10px;
cursor:pointer;
}

/* ===== PANIER ===== */

#cartBtn{
position:fixed;
bottom:20px;
right:20px;
background:#181E3B;
color:white;
padding:12px 16px;
border:none;
border-radius:30px;
box-shadow:0 8px 20px rgba(0,0,0,0.3);
cursor:pointer;
}

#cartPanel{
position:fixed;
right:-340px;
top:0;
width:320px;
height:100%;
background:white;
padding:20px;
transition:.3s;
overflow:auto;
}

#cartPanel.open{
right:0;
}

.cartItem{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.qty{
display:flex;
gap:6px;
}

.qty button{
padding:4px 8px;
}

/* ===== ADD ANIMATION ===== */

.fly{
position:fixed;
background:#2ecc71;
color:white;
padding:6px 10px;
border-radius:20px;
animation:fly .8s forwards;
}

@keyframes fly{
to{
transform:translateY(-100px) scale(.5);
opacity:0;
}
}

/* ===== DARK MODE ===== */

@media(prefers-color-scheme:dark){

body{
background:#0f1115;
color:white;
}

#backBtn{
background:#1c1f26;
}

.card{
background:#1c1f26;
box-shadow:0 20px 50px rgba(0,0,0,0.7);
}

#featuredContent{
background:#1c1f26;
}

#cartPanel{
background:#1c1f26;
}

}

</style>
</head>

<body>

<header>

<div id="backBtn">
<img src="https://img.icons8.com/ios-filled/50/000000/left.png">
</div>

<h1>SERVICES</h1>

</header>

<div id="featured"></div>

<div id="products"></div>

<button id="cartBtn" onclick="toggleCart()">
🛒 <span id="count">0</span>
</button>

<div id="cartPanel">

<h2>Panier</h2>

<div id="cartItems"></div>

<p>Total : <span id="total">0</span> €</p>

<button onclick="checkout()">Commander</button>

</div>

<script>

/* ===== FAKE DATA ===== */

const products=[

{
nom:"Coaching CSO",
description:"Séance 45 minutes",
prix:30,
image:"https://res.cloudinary.com/demo/image/upload/sample.jpg",
badge:"Nouveau",
featured:true
},

{
nom:"Travail cheval",
description:"Travail monté",
prix:25,
image:"https://res.cloudinary.com/demo/image/upload/sample.jpg",
badge:""
},

{
nom:"Préparation concours",
description:"Coaching concours",
prix:40,
image:"https://res.cloudinary.com/demo/image/upload/sample.jpg",
badge:"Populaire"
}

]

/* ===== PANIER ===== */

let cart=[]

render()

function render(){

products.forEach(p=>{

if(p.featured){
renderFeatured(p)
}else{
renderCard(p)
}

})

}

function renderFeatured(p){

const el=document.getElementById("featured")

el.innerHTML=`

<img src="${p.image}">

<div id="featuredContent">

<h2>${p.nom}</h2>

<p>${p.description}</p>

<b>${p.prix} €</b>

<button onclick="addCart('${p.nom}',${p.prix})">
Ajouter
</button>

</div>

`

}

function renderCard(p){

const container=document.getElementById("products")

let card=document.createElement("div")
card.className="card"

card.innerHTML=`

<div class="imgBox">

<img src="${p.image}">

${p.badge?`<div class="badge">${p.badge}</div>`:""}

</div>

<div class="content">

<div class="title">${p.nom}</div>

<div class="desc">${p.description}</div>

<div class="bottom">

<div class="price">${p.prix} €</div>

<button onclick="addCart('${p.nom}',${p.prix})">
Ajouter
</button>

</div>

</div>

`

container.appendChild(card)

}

/* ===== PANIER ===== */

function addCart(name,price){

let item=cart.find(i=>i.name===name)

if(item){
item.qty++
}else{
cart.push({name,price,qty:1})
}

updateCart()

}

function updateCart(){

document.getElementById("count").innerText=
cart.reduce((a,b)=>a+b.qty,0)

let html=""
let total=0

cart.forEach((item,i)=>{

html+=`

<div class="cartItem">

<div>

${item.name}<br>
${item.price}€

</div>

<div class="qty">

<button onclick="changeQty(${i},-1)">-</button>

${item.qty}

<button onclick="changeQty(${i},1)">+</button>

</div>

</div>

`

total+=item.price*item.qty

})

document.getElementById("cartItems").innerHTML=html
document.getElementById("total").innerText=total

}

function changeQty(i,v){

cart[i].qty+=v

if(cart[i].qty<=0){
cart.splice(i,1)
}

updateCart()

}

/* ===== PANIER UI ===== */

function toggleCart(){
document.getElementById("cartPanel").classList.toggle("open")
}

/* ===== COMMANDE ===== */

function checkout(){

let txt="Commande :\n\n"

cart.forEach(i=>{
txt+=`${i.name} x${i.qty}\n`
})

alert(txt)

}

</script>

</body>
</html>
