<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>

emailjs.init("03cdce-AcdCC03k_v")

const SHEET_URL="https://opensheet.elk.sh/1ka6djXZhsDBbF77OVgH5wjqQwLpMUUPbMl1RD_rssXI/service"

let cart = JSON.parse(localStorage.getItem("cart") || "[]")
let products=[]

/* ===== LOAD PRODUITS ===== */

fetch(SHEET_URL)
.then(r=>r.json())
.then(data=>{

products=data
.filter(p=>p.actif==="TRUE")
.sort((a,b)=>Number(a.rang)-Number(b.rang))

render()
updateCart()

})

/* ===== RENDER ===== */

function render(){

document.getElementById("products").innerHTML=""

products.forEach(p=>{

if(p.featured==="TRUE"){

document.getElementById("featured").innerHTML=`

<img src="${p.image}">

<div id="featuredContent">

<h2>${p.nom}</h2>
<p>${p.description}</p>
<b>${p.prix} €</b>

<br><br>

<button onclick="addCart('${p.nom}',${p.prix},this)">Ajouter</button>

</div>
`

}else{

let card=document.createElement("div")
card.className="card"

card.innerHTML=`

<div class="imgBox">

<img src="${p.image}">

${p.badge?`<div class="badge">${p.badge}</div>`:""}

</div>

<div class="content">

<div class="title">${p.nom}</div>
<div class="desc">${p.description}</div>

<div class="bottom">

<div class="price">${p.prix} €</div>

<button onclick="addCart('${p.nom}',${p.prix},this)">Ajouter</button>

</div>

</div>
`

document.getElementById("products").appendChild(card)

}

})

}

/* ===== ADD CART (AVEC ANIMATION 🔥) ===== */

function addCart(name,price,btn){

if(btn){

let original=btn.innerText
btn.innerText="✓ Ajouté"

setTimeout(()=>{
btn.innerText=original
},1000)

/* 🔥 ANIMATION IMAGE */
let img = btn.closest(".card, #featuredContent")?.querySelector("img")

if(img){

let rect = img.getBoundingClientRect()
let cartBtn = document.getElementById("cartBtn")
let cartRect = cartBtn.getBoundingClientRect()

let fly = img.cloneNode(true)

fly.classList.add("flyImg")

fly.style.left = rect.left+"px"
fly.style.top = rect.top+"px"
fly.style.width = rect.width+"px"
fly.style.height = rect.height+"px"

document.body.appendChild(fly)

setTimeout(()=>{
fly.style.left = cartRect.left+"px"
fly.style.top = cartRect.top+"px"
fly.style.width = "20px"
fly.style.height = "20px"
fly.style.opacity="0.3"
},10)

setTimeout(()=>{
fly.remove()
},700)

}

}

/* PANIER */
let item=cart.find(i=>i.name===name)

if(item){
item.qty++
}else{
cart.push({name,price,qty:1})
}

updateCart()

let cartBtn=document.getElementById("cartBtn")
cartBtn.classList.add("pulse")

setTimeout(()=>{
cartBtn.classList.remove("pulse")
},400)

}

/* ===== PANIER ===== */

function updateCart(){

localStorage.setItem("cart", JSON.stringify(cart))

let count=cart.reduce((a,b)=>a+b.qty,0)
document.getElementById("count").innerText=count

let html=""
let total=0

cart.forEach((item,i)=>{

html+=`
<div class="cartItem">
<div>${item.name}<br>${item.price}€</div>
<div class="qty">
<button onclick="changeQty(${i},-1)">-</button>
${item.qty}
<button onclick="changeQty(${i},1)">+</button>
</div>
</div>
`

total+=item.price*item.qty

})

document.getElementById("cartItems").innerHTML=html
document.getElementById("total").innerText=total

}

function changeQty(i,v){

cart[i].qty+=v

if(cart[i].qty<=0){
cart.splice(i,1)
}

updateCart()

}

function toggleCart(){
document.getElementById("cartPanel").classList.toggle("open")
}

/* ===== CHECKOUT ===== */

function checkout(){

let nom=document.getElementById("clientNom").value.trim()
let prenom=document.getElementById("clientPrenom").value.trim()
let email=document.getElementById("clientEmail").value.trim()

if(!nom || !prenom || !email || cart.length===0){
alert("Champs requis ou panier vide")
return
}

let orderId = Date.now()
let dateISO = new Date().toISOString()

let total=cart.reduce((a,b)=>a+b.price*b.qty,0)

let commandeText = cart.map(i =>
`${i.name} x${i.qty} (${i.price}€)`
).join(" | ")

/* 🔥 GOOGLE FORM */
fetch("https://docs.google.com/forms/d/e/1FAIpQLSd7FyCadHVREHz5A_Y3tGIANItJppc-xx2hEtopxd90lU50Hw/formResponse",{
method:"POST",
mode:"no-cors",
body:new URLSearchParams({
"entry.1196863567": nom,
"entry.1084486832": prenom,
"entry.322695866": email,
"entry.1740027870": commandeText,
"entry.99574245": total,
"entry.1184215130": orderId,
"entry.489600561": dateISO,
"entry.1098731878": "En attente",
"entry.484692587": ""
})
})

/* 🔥 EMAIL */
emailjs.send("service_mkpsbdf","template_ftv15rb",{
nom:nom,
prenom:prenom,
email:email,
commande:commandeText,
total:total
})

.then(()=>{

let orders = JSON.parse(localStorage.getItem("orders") || "[]")

orders.push({
id: orderId,
date: dateISO,
items:[...cart],
total: total
})

localStorage.setItem("orders", JSON.stringify(orders))

cart=[]
updateCart()

document.getElementById("clientNom").value=""
document.getElementById("clientPrenom").value=""
document.getElementById("clientEmail").value=""

window.location.href="mes-commandes.html"

})
.catch(()=>{
alert("Commande enregistrée mais mail KO")
})

}

</script>
