<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Services</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>

/* BASE */

body{
margin:0;
font-family:'Montserrat',sans-serif;
background:#f4f4f4;
color:#000;
transition:.3s;
}

/* HEADER */

header{
position:relative;
height:70px;
}

#backBtn{
position:absolute;
left:15px;
top:50%;
transform:translateY(-50%);
width:42px;
height:42px;
border-radius:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 3px 8px rgba(0,0,0,0.15);
cursor:pointer;
}

#backBtn img{
width:22px;
height:22px;
}

header h1{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
margin:0;
font-size:18px;
font-weight:700;
}

/* FEATURED */

#featured{

margin:10px;
border-radius:18px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.2);

transition:transform .35s ease,opacity .35s ease;

}

#featured img{
width:100%;
height:180px;
object-fit:cover;
}

#featuredContent{
padding:16px;
background:white;
}

/* GRID */

#products{
padding:10px;
padding-bottom:120px;
display:grid;
gap:16px;
}

.card{
background:white;
border-radius:16px;
overflow:hidden;
box-shadow:0 8px 20px rgba(0,0,0,0.12);
}

.imgBox{
height:140px;
position:relative;
}

.imgBox img{
width:100%;
height:100%;
object-fit:cover;
}

.badge{
position:absolute;
top:10px;
left:10px;
background:#ff4757;
color:white;
padding:4px 10px;
border-radius:20px;
font-size:12px;
}

.content{
padding:14px;
}

.title{
font-weight:700;
font-size:18px;
}

.desc{
font-size:14px;
opacity:.7;
margin:6px 0;
}

.bottom{
display:flex;
justify-content:space-between;
align-items:center;
}

.price{
font-weight:700;
font-size:18px;
}

button{
background:#181E3B;
color:white;
border:none;
padding:8px 12px;
border-radius:10px;
cursor:pointer;
}

/* PANIER */

#cartBtn{
position:fixed;
bottom:20px;
right:20px;
background:#181E3B;
color:white;
padding:12px 16px;
border:none;
border-radius:30px;
box-shadow:0 8px 20px rgba(0,0,0,0.3);
cursor:pointer;
z-index:100;
}

#cartPanel{
position:fixed;
right:-340px;
top:0;
width:320px;
height:100%;
background:white;
padding:20px;
transition:.3s;
overflow:auto;
}

#cartPanel.open{
right:0;
}

.cartItem{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.qty{
display:flex;
gap:6px;
}

.qty button{
padding:4px 8px;
}

/* INPUT */

#cartPanel input{

width:100%;
padding:10px;
margin-bottom:10px;

border-radius:8px;
border:none;
background:#f4f4f4;

}

/* ANIMATIONS */

@keyframes cartPulse{

0%{transform:scale(1)}
40%{transform:scale(1.25)}
100%{transform:scale(1)}

}

.pulse{
animation:cartPulse .4s ease;
}

.countPop{

animation:countPop .3s ease;

}

@keyframes countPop{

0%{transform:scale(1)}
50%{transform:scale(1.4)}
100%{transform:scale(1)}

}

.added{
background:#2ecc71 !important;
}

/* DARK MODE */

@media(prefers-color-scheme:dark){

body{
background:#0f1115;
color:white;
}

#backBtn{
background:#1c1f26;
box-shadow:0 12px 30px rgba(0,0,0,0.6);
}

#backBtn img{
filter:brightness(0) invert(1);
}

.card{
background:#1c1f26;
box-shadow:0 20px 50px rgba(0,0,0,0.75);
}

#featuredContent{
background:#1c1f26;
}

#cartPanel{
background:#1c1f26;
}

#cartPanel input{
background:#252a33;
color:white;
}

}

</style>
</head>

<body>

<header>

<div id="backBtn">
<img src="https://img.icons8.com/ios-filled/50/000000/left.png">
</div>

<h1>SERVICES</h1>

</header>

<div id="featured"></div>

<div id="products"></div>

<button id="cartBtn" onclick="toggleCart()">
🛒 <span id="count">0</span>
</button>

<div id="cartPanel">

<div style="display:flex;justify-content:space-between;align-items:center">

<h2>Panier</h2>

<button onclick="toggleCart()">✕</button>

</div>

<div id="cartItems"></div>

<p>Total : <b><span id="total">0</span> €</b></p>

<hr>

<input id="clientNom" placeholder="Nom *">
<input id="clientPrenom" placeholder="Prénom *">
<input id="clientEmail" placeholder="Email *">

<button onclick="checkout()">Commander</button>

</div>

<script>

/* FAKE DATA */

const products=[

{
nom:"Coaching CSO",
description:"Séance 45 minutes",
prix:30,
image:"https://res.cloudinary.com/demo/image/upload/sample.jpg",
badge:"Nouveau",
featured:true
},

{
nom:"Travail cheval",
description:"Travail monté",
prix:25,
image:"https://res.cloudinary.com/demo/image/upload/sample.jpg",
badge:""
},

{
nom:"Préparation concours",
description:"Coaching concours",
prix:40,
image:"https://res.cloudinary.com/demo/image/upload/sample.jpg",
badge:"Populaire"
}

]

/* PANIER */

let cart = JSON.parse(localStorage.getItem("cart") || "[]")

render()

updateCart()

function render(){

products.forEach(p=>{

if(p.featured){

document.getElementById("featured").innerHTML=`

<img src="${p.image}">

<div id="featuredContent">

<h2>${p.nom}</h2>

<p>${p.description}</p>

<b>${p.prix} €</b>

<br><br>

<button onclick="addCart('${p.nom}',${p.prix},this)">
Ajouter
</button>

</div>

`

}else{

let card=document.createElement("div")

card.className="card"

card.innerHTML=`

<div class="imgBox">

<img src="${p.image}">

${p.badge?`<div class="badge">${p.badge}</div>`:""}

</div>

<div class="content">

<div class="title">${p.nom}</div>

<div class="desc">${p.description}</div>

<div class="bottom">

<div class="price">${p.prix} €</div>

<button onclick="addCart('${p.nom}',${p.prix},this)">
Ajouter
</button>

</div>

</div>

`

document.getElementById("products").appendChild(card)

}

})

}

/* AJOUT PANIER */

function addCart(name,price,btn){

let item=cart.find(i=>i.name===name)

if(item){

item.qty++

}else{

cart.push({name,price,qty:1})

}

updateCart()

if(btn){

let original=btn.innerText

btn.innerText="✓ Ajouté"

btn.classList.add("added")

setTimeout(()=>{

btn.innerText="Ajouter"
btn.classList.remove("added")

},900)

}

let cartBtn=document.getElementById("cartBtn")

cartBtn.classList.add("pulse")

setTimeout(()=>{

cartBtn.classList.remove("pulse")

},400)

}

/* UPDATE PANIER */

function updateCart(){

localStorage.setItem("cart", JSON.stringify(cart))

let count=cart.reduce((a,b)=>a+b.qty,0)

let el=document.getElementById("count")

if(el.innerText!=count){

el.classList.add("countPop")

setTimeout(()=>{

el.classList.remove("countPop")

},300)

}

el.innerText=count

let html=""
let total=0

cart.forEach((item,i)=>{

html+=`

<div class="cartItem">

<div>

${item.name}<br>
${item.price}€

</div>

<div class="qty">

<button onclick="changeQty(${i},-1)">-</button>

${item.qty}

<button onclick="changeQty(${i},1)">+</button>

</div>

</div>

`

total+=item.price*item.qty

})

document.getElementById("cartItems").innerHTML=html

document.getElementById("total").innerText=total

}

function changeQty(i,v){

cart[i].qty+=v

if(cart[i].qty<=0){
cart.splice(i,1)
}

updateCart()

}

function toggleCart(){

document.getElementById("cartPanel").classList.toggle("open")

}

/* EMAILJS READY */

function checkout(){

let nom=document.getElementById("clientNom").value.trim()
let prenom=document.getElementById("clientPrenom").value.trim()
let email=document.getElementById("clientEmail").value.trim()

if(!nom || !prenom || !email){

alert("Veuillez remplir Nom, Prénom et Email")

return

}

alert("Commande envoyée (EmailJS à connecter)")

}

/* SCROLL FEATURED */

window.addEventListener("scroll",()=>{

let featured=document.getElementById("featured")

if(!featured) return

let scroll=window.scrollY

let scale=1-(scroll/800)

if(scale<0.85) scale=0.85

featured.style.transform="scale("+scale+")"

let opacity=1-(scroll/600)

if(opacity<0.4) opacity=0.4

featured.style.opacity=opacity

})

</script>

</body>
</html>
