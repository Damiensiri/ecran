<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Paddocks</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Montserrat',sans-serif;
background:#0f1115;
color:white;
}

header{
text-align:center;
padding:15px;
font-size:22px;
font-weight:700;
}

/* onglets paddocks */

.tabs{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:10px;
}

.tab{
background:#1c1f26;
padding:8px 14px;
border-radius:10px;
cursor:pointer;
}

.tab.active{
background:#2e7d32;
}

/* card */

.card{
background:#1c1f26;
margin:12px;
padding:16px;
border-radius:16px;
}

/* ligne jour */

.dayRow{
display:flex;
flex-direction:column;
margin-bottom:14px;
border-bottom:1px solid #333;
padding-bottom:12px;
}

.dayTitle{
font-weight:700;
margin-bottom:6px;
}

.row{
display:flex;
align-items:center;
gap:8px;
}

select{
background:#252a33;
color:white;
border:none;
padding:6px;
border-radius:6px;
}

.closed{
background:#c0392b;
padding:4px 8px;
border-radius:6px;
cursor:pointer;
font-size:12px;
}

.closed.off{
background:#2e7d32;
}

/* durée */

.durations{
display:flex;
gap:12px;
margin-top:10px;
}

button{
margin-top:16px;
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#2e7d32;
color:white;
font-weight:700;
cursor:pointer;
}

</style>
</head>

<body>

<header>ADMIN PADDOCKS</header>

<div class="tabs">

<div class="tab active" onclick="switchTab('maison')">Maison</div>
<div class="tab" onclick="switchTab('grande')">Grande voie</div>
<div class="tab" onclick="switchTab('beudot')">Beudot</div>

</div>

<div class="card">

<div id="days"></div>

<div class="durations">

<label>
<input type="checkbox" id="d60" checked>
60 min
</label>

<label>
<input type="checkbox" id="d90">
90 min
</label>

</div>

<button onclick="save()">Sauvegarder</button>

</div>

<script>

let paddock="maison"

const days=[
"lundi",
"mardi",
"mercredi",
"jeudi",
"vendredi",
"samedi",
"dimanche"
]

function hourOptions(){

let html=""

for(let h=6;h<=22;h++){

let hh=String(h).padStart(2,"0")

html+=`<option value="${hh}:00">${hh}:00</option>`

}

return html

}

function build(){

const container=document.getElementById("days")

container.innerHTML=""

days.forEach(day=>{

container.innerHTML+=`

<div class="dayRow">

<div class="dayTitle">${day.toUpperCase()}</div>

<div class="row">

<div class="closed off" onclick="toggleClosed(this)">Ouvert</div>

<select>
${hourOptions()}
</select>

<span>→</span>

<select>
${hourOptions()}
</select>

</div>

</div>

`

})

}

function toggleClosed(btn){

if(btn.classList.contains("off")){

btn.classList.remove("off")
btn.innerText="Fermé"

}else{

btn.classList.add("off")
btn.innerText="Ouvert"

}

}

function switchTab(name){

paddock=name

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))

event.target.classList.add("active")

build()

}

function save(){

const data={}

data.paddock=paddock

data.durations=[]

if(document.getElementById("d60").checked) data.durations.push(60)
if(document.getElementById("d90").checked) data.durations.push(90)

alert("Sauvegarde Firebase ici plus tard")

console.log(data)

}

build()

</script>

</body>
</html>
