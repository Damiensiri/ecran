<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Ecurie DS">
<meta name="theme-color" content="#f4f4f4">

<style>

/* ================= VARIABLES ================= */

:root{
  --bg:#f4f4f4;
  --header-bg:#f4f4f4;
  --text:#181E3B;
  --card-bg:#ffffff;
  --section-bg:#181E3B;
  --section-text:#ffffff;
  --shadow:0 6px 18px rgba(0,0,0,0.08);
}

@media (prefers-color-scheme: dark){
  :root{
    --bg:#0f1115;
    --header-bg:#0f1115;
    --text:#ffffff;
    --card-bg:#1c1f26;
    --section-bg:#ffffff;
    --section-text:#000000;
    --shadow:0 10px 30px rgba(0,0,0,0.6);
  }

  .header-left img{
    filter:brightness(0) invert(1)
            drop-shadow(0 0 6px rgba(255,255,255,0.5));
  }
}

/* ================= BASE ================= */

body{
  margin:0;
  font-family:'Montserrat',sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow-y:auto;
  transition:background .3s ease,color .3s ease;
}

/* ================= HEADER ================= */

header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:70px;
  background:var(--header-bg);
  z-index:1000;
  display:flex;
  align-items:center;
  justify-content:center;
}

.header-left{
  position:absolute;
  left:12px;
}

.header-left img{
  height:40px;
}

header h1{
  margin:0;
  font-size:20px;
  font-weight:700;
  color:var(--text);
}

/* ================= BELL ================= */

#bellBox{
  position:absolute;
  right:12px;
  font-size:22px;
  cursor:pointer;
}

#bellBadge{
  position:absolute;
  top:-6px;
  right:-6px;
  background:red;
  color:white;
  width:16px;
  height:16px;
  font-size:10px;
  border-radius:50%;
  display:none;
  align-items:center;
  justify-content:center;
}

/* ================= CONTENT ================= */

.page-content{
  margin-top:70px;
}

##welcome{
  text-align:center;
  font-size:36px;
  font-weight:700;
  margin:10px 0 16px; /* espace premium sous BIENVENUE */
}

/* ================= STATUT PREMIUM ================= */

#alert-wrapper{
  width:100%;
  text-align:center;
  margin-bottom:18px; /* respiration premium */
}

#alert-box{
  display:none;
  font-size:15px;
  font-weight:600;
}

#alert-box small{
  font-size:9px;
  font-weight:500;
  opacity:0.65;
  margin-left:6px;
}

/* ================= SECTIONS ================= */

.section-title{
  background:var(--section-bg);
  color:var(--section-text);
  display:inline-block;
  padding:6px 14px;
  margin:20px 15px 10px;
  border-radius:6px;
  font-size:14px;
  letter-spacing:0.5px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  padding:0 15px;
}

.card{
  background:var(--card-bg);
  border-radius:22px;
  padding:22px;
  text-align:center;
  box-shadow:var(--shadow);
  cursor:pointer;
  transition:transform .15s ease;
}

.card:hover{
  transform:translateY(-3px);
}

.card img{
  width:55px;
  margin-bottom:12px;
}

.card div{
  font-size:16px;
  font-weight:700;
}

.list-btn{
  background:var(--card-bg);
  margin:12px 15px;
  padding:18px;
  border-radius:22px;
  display:flex;
  align-items:center;
  gap:12px;
  box-shadow:var(--shadow);
  font-weight:700;
  cursor:pointer;
  transition:transform .15s ease;
}

.list-btn:hover{
  transform:translateY(-2px);
}

.list-btn img{
  width:26px;
}

<header>
  <div class="header-left">
    <img src="image/logo.png">
  </div>

  <h1>ECURIE DAMIEN SIRI</h1>

  <div id="bellBox" onclick="go('notifications.html')">
    🔔
    <span id="bellBadge"></span>
  </div>

<div class="page-content">

<div id="welcome">BIENVENUE</div>

<div id="alert-wrapper">
  <div id="alert-box"></div>
</div>

<div class="section-title">ESPACES</div>

<div class="grid">
  <div class="card" onclick="go('travail.html')"><img src="image/travail.svg"><div>TRAVAIL</div></div>
  <div class="card" onclick="go('paddocks.html')"><img src="image/paddock.svg"><div>PADDOCK</div></div>
</div>

<div class="list-btn" onclick="go('plan.html')"><img src="image/plan.svg"> PLAN INTERACTIF</div>

<div class="section-title">PRATIQUE</div>

<div class="grid">
  <div class="card" onclick="go('horaires.html')"><img src="image/time.svg"><div>HORAIRES</div></div>
  <div class="card" onclick="go('meteo.html')"><img src="image/meteo.svg"><div>MÉTÉO</div></div>
</div>

</div>

<script>
function go(url){ window.location.href=url; }
function openExternal(url){ window.open(url,"_blank"); }
</script>

<script>

/* ===== BANDEAU + STATUT ===== */

const SHEET_URL="https://opensheet.elk.sh/1-VbRioKfM6JHU-Oep0pa6H3S0VVuvYLyUMXTdSdRbzI/statuts";
const HORAIRES_URL="https://opensheet.elk.sh/1-VbRioKfM6JHU-Oep0pa6H3S0VVuvYLyUMXTdSdRbzI/horaires";
const ESPACE="accueil";

function getTodayName(){
  return ["dimanche","lundi","mardi","mercredi","jeudi","vendredi","samedi"][new Date().getDay()];
}

function parseTime(str){
  const parts=str.split(":");
  return {h:parseInt(parts[0]), m:parseInt(parts[1])};
}

function isNowBetween(open, close){
  const now=new Date();
  const openTime=new Date();
  openTime.setHours(open.h,open.m,0,0);
  const closeTime=new Date();
  closeTime.setHours(close.h,close.m,0,0);
  return now>=openTime && now<=closeTime;
}

function loadAlertAndStatus(){

  const box=document.getElementById("alert-box");
  box.innerHTML="";
  box.style.display="none";

  fetch(SHEET_URL,{cache:"no-store"})
  .then(r=>r.json())
  .then(data=>{
    const row=data.find(e=>e.espace===ESPACE);

    if(row && row.alerte && row.alerte.trim()!==""){
      box.style.display="block";
      box.style.color="#E88B00";
      box.textContent=row.alerte;
      return;
    }

    fetch(HORAIRES_URL,{cache:"no-store"})
    .then(r=>r.json())
    .then(data=>{

      const today=getTodayName();
      const row=data.find(r=>r.jour?.toLowerCase()===today);
      if(!row||!row.ouvert||!row.ferme) return;

      const open=parseTime(row.ouvert);
      const close=parseTime(row.ferme);

      box.style.display="block";

      if(isNowBetween(open,close)){
        box.style.color="#2e7d32";
        box.innerHTML=`Écuries ouvertes<small>${row.ouvert.substring(0,5)} – ${row.ferme.substring(0,5)}</small>`;
      }else{
        box.style.color="#c0392b";
        box.innerHTML=`Écuries fermées<small>${row.ouvert.substring(0,5)} – ${row.ferme.substring(0,5)}</small>`;
      }

    });
  });
}

loadAlertAndStatus();
setInterval(loadAlertAndStatus,60000);

</script>
