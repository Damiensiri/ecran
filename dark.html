<style>

/* ================= VARIABLES ================= */

:root{
  --bg:#f4f4f4;
  --header-bg:#f4f4f4;
  --text:#181E3B;
  --card-bg:#ffffff;
  --section-bg:#181E3B;
  --section-text:#ffffff;

}

@media (prefers-color-scheme: dark){

    --bg:#0f1115;

    --text:#ffffff;
    --card-bg:#1c1f26;
    --section-bg:#ffffff;
    --section-text:#000000;

/* ================= BASE ================= */

  font-family:'Montserrat',sans-serif;
  background:var(--bg);
  color:var(--text);
  transition:background .3s ease,color .3s ease;
}

.page-content{

/* ================= HEADER ================= */

  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:70px;
  background:var(--header-bg);
  z-index:1000;
  display:flex;
  align-items:center;
  justify-content:center;
}

.header-left{
  position:absolute;
  left:12px;
}

.header-left img{
  height:40px;
}

header h1{
  margin:0;

}

/* ================= BELL ================= */

  right:12px;

}

#bellBadge{

  right:-6px;

  font-size:10px;

  display:none;

  justify-content:center;

/* ================= WELCOME ================= */

/* ================= STATUS DISCRET ================= */

  font-size:15px;
  font-weight:600;
  margin-top:4px;
  align-items:center;
  gap:8px;

.status-dot{
  width:9px;
  height:9px;
  border-radius:50%;
}

#alert-box small{
  font-size:12px;
  opacity:0.75;
  margin-left:4px;
}

/* ================= SECTIONS ================= */

.section-title{
  background:var(--section-bg);
  color:var(--section-text);
  display:inline-block;
  padding:6px 14px;
  margin:20px 15px 10px;
  border-radius:6px;

.grid{
  display:grid;

.card img{

.card div{

<script>

</script>

<script>

/* ===== STATUS OUVERTURE ===== */

const SHEET_ID="1-VbRioKfM6JHU-Oep0pa6H3S0VVuvYLyUMXTdSdRbzI";
const STATUTS_URL=`https://opensheet.elk.sh/${SHEET_ID}/statuts`;
const HORAIRES_URL=`https://opensheet.elk.sh/${SHEET_ID}/horaires`;

function getTodayName(){
  return ["dimanche","lundi","mardi","mercredi","jeudi","vendredi","samedi"][new Date().getDay()];
}

function toMin(t){
  const p=t.split(":");
  return parseInt(p[0])*60+parseInt(p[1]);
}

function isOpen(open,close){
  const now=new Date();
  const m=now.getHours()*60+now.getMinutes();
  return m>=toMin(open)&&m<=toMin(close);
}

async function loadOpening(){

  const box=document.getElementById("alert-box");
  box.innerHTML="";
  box.style.display="none";

  try{

    const [sRes,hRes]=await Promise.all([
      fetch(STATUTS_URL,{cache:"no-store"}),
      fetch(HORAIRES_URL,{cache:"no-store"})
    ]);

    const statuts=await sRes.json();
    const horaires=await hRes.json();

    const accueil=statuts.find(e=>e.espace==="accueil");

    if(accueil && accueil.alerte && accueil.alerte.trim()!==""){
      return; // bandeau spécial prioritaire
    }

    const today=getTodayName();
    const row=horaires.find(h=>h.jour?.toLowerCase()===today);
    if(!row) return;

    const open=isOpen(row.ouverture,row.fermeture);

    box.style.display="flex";

    const dot=document.createElement("div");
    dot.className="status-dot";
    dot.style.background=open?"#1DB954":"#e53935";

    const main=document.createElement("span");
    main.textContent=open?"Écuries ouvertes":"Écuries fermées";
    main.style.color=open?"#1DB954":"#e53935";

    const sub=document.createElement("small");
    sub.textContent=open?
      `(jusqu'à ${row.fermeture})`:
      `(ouvre à ${row.ouverture})`;

    box.appendChild(dot);
    box.appendChild(main);
    box.appendChild(sub);

  }catch(e){
    box.style.display="none";
  }
}

loadOpening();
setInterval(loadOpening,60000);

</script>

<script>

/* ===== CLOCHE (INTACTE) ===== */

const API_URL="https://script.googleusercontent.com/macros/echo?user_content_key=AY5xjrRY09nECq5kqJEPaFCkMRnR4qbM-Z9y5KOMgVdlakJAA_L1FlwHMDN84Nstw8qXhqpt9QHGCeU6Sr6aLk3y7hSeA-1vr_eBBQYFwVL111h-CJZc8JxRQKvcu3XE7Gg-OXbXE8Vkp1PlAMHAkhJduQw6bxUswIvR7b1rA8txQ2Rtyl25eNxQWvtBet3bytcH6RpMKvJdyZcSioOtKa5sYL4uRI4FOoFrfUzX5P_pjpK-cAN8Bdf6otVcK4myQl66GohjWiPVOyCuofXOq8M4lQkmsxucwQ&lib=MfQh9XKIUpdlMRcOJ4l9JImAGFOlNCMp3";

const STORAGE_KEY="alerts_lues";

function getLues(){
  try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||[];}
  catch(e){return [];}
}

function parseDateFR(str){
  if(!str)return null;
  if(str.includes("-")){
    const p=str.split("-");
    return new Date(p[0],p[1]-1,p[2],0,0,0);
  }
  if(str.includes("/")){
    const p=str.split("/");
    return new Date(p[2],p[1]-1,p[0],0,0,0);
  }
  return null;
}

async function updateBell(){
  const badge=document.getElementById("bellBadge");
  try{
    const res=await fetch(API_URL,{cache:"no-store"});
    const data=await res.json();
    const today=new Date();today.setHours(0,0,0,0);
    const lues=getLues().map(String);
    let count=0;

    data.filter(n=>{
      if(n.epingle==="oui")return true;
      if(n.active!=="oui")return false;
      if(!n.expire){
        const d=parseDateFR(n.date);
        if(!d)return true;
        return d>=today;
      }
      const exp=parseDateFR(n.expire);
      if(!exp)return true;
      return exp>=today;
    }).forEach(n=>{
      if(!lues.includes(String(n.id)))count++;
    });

    badge.style.display=count>0?"flex":"none";
    badge.textContent=count;

  }catch(e){
    badge.style.display="none";
  }
}

updateBell();
setInterval(updateBell,60000);

</script>
