<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ecurie Damien Siri</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="image/icon-192x192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Ecurie DS">
<meta name="theme-color" content="#f4f4f4">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">

<style>

/* ================= VARIABLES ================= */

:root{
  --bg:#f4f4f4;
  --header-bg:#f4f4f4;
  --text:#181E3B;
  --card-bg:#ffffff;
  --section-bg:#181E3B;
  --section-text:#ffffff;
  --shadow:0 6px 18px rgba(0,0,0,0.08);
}

@media (prefers-color-scheme: dark){
  :root{
    --bg:#0f1115;
    --header-bg:#0f1115;
    --text:#ffffff;
    --card-bg:#1c1f26;
    --section-bg:#ffffff;
    --section-text:#000000;
    --shadow:0 10px 30px rgba(0,0,0,0.6);
  }

  .header-left img{
    filter:
      brightness(0) invert(1)
      drop-shadow(0 0 6px rgba(255,255,255,0.5));
  }
}

/* ================= BASE ================= */

body{
  margin:0;
  font-family:'Montserrat',sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow-y:auto;

  /* ===== HIDE SCROLLBAR (affichage uniquement) ===== */
  -ms-overflow-style:none;   /* IE / ancien Edge */
  scrollbar-width:none;      /* Firefox */
}

body::-webkit-scrollbar{
  display:none;              /* Chrome / Safari */
}

/* ================= HEADER ================= */

header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:70px;
  background:var(--header-bg);
  z-index:1000;
  display:flex;
  align-items:center;
  justify-content:center;
}

.header-left{
  position:absolute;
  left:12px;
}

.header-left img{
  height:40px;
}

header h1{
  margin:0;
  font-size:20px;
  font-weight:700;
}

/* ================= BELL ================= */

#bellBox{
  position:absolute;
  right:12px;
  font-size:22px;
  cursor:pointer;
}

#bellBadge{
  position:absolute;
  top:-6px;
  right:-6px;
  background:red;
  color:white;
  width:16px;
  height:16px;
  font-size:10px;
  border-radius:50%;
  display:none;
  align-items:center;
  justify-content:center;
}

/* ================= CONTENT ================= */

.page-content{
  margin-top:70px;
}

/* ================= TITLES ================= */

#welcome{
  text-align:center;
  font-size:36px;
  font-weight:700;
  margin:18px 0 16px;
}

/* ===== STATUT HORAIRES ===== */

#opening-status{
  text-align:center;
  margin-bottom:16px;
  display:none;
  font-size:15px;
  font-weight:600;
}

/* ================= BANDEAU ================= */

#alert-wrapper{
  width:100%;
  display:flex;
  justify-content:center;
  overflow:hidden;
}

#alert-box{
  width:100%;
  height:27px;
  background:#E88B00;
  display:none;
  align-items:center;
  gap:8px;
  padding:0 12px;
  box-sizing:border-box;
  color:white;
  font-size:14px;
  font-weight:500;
  transform:translateY(-100%);
  opacity:0;
  transition:transform .4s ease, opacity .4s ease;
}

#alert-box.show{
  transform:translateY(0);
  opacity:1;
}

/* ================= SECTIONS ================= */

.section-title{
  background:var(--section-bg);
  color:var(--section-text);
  display:inline-block;
  padding:6px 14px;
  margin:20px 15px 10px;
  border-radius:6px;
  font-size:14px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  padding:0 15px;
}

.card{
  background:var(--card-bg);
  border-radius:22px;
  padding:22px;
  text-align:center;
  box-shadow:var(--shadow);
  cursor:pointer;
}

.card img{
  width:55px;
  margin-bottom:12px;
}

.card div{
  font-size:16px;
  font-weight:700;
}

.list-btn{
  background:var(--card-bg);
  margin:12px 15px;
  padding:18px;
  border-radius:22px;
  display:flex;
  align-items:center;
  gap:12px;
  box-shadow:var(--shadow);
  font-weight:700;
  cursor:pointer;
}

.list-btn img{
  width:26px;
}

</style>
</head>
