<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ecurie Damien Siri</title>

<link rel="manifest" href="manifest.json">

<link rel="apple-touch-icon" href="image/icon-192x192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Ecurie DS">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">

<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>

<style>

/* ===== BASE ===== */
body{
  margin:0;
  font-family:'Montserrat',sans-serif;
  background:#f4f4f4;
  overflow-y:auto;
  transition:background .3s ease,color .3s ease;
}

/* ===== HEADER ===== */
header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:70px;
  background:#f4f4f4;
  z-index:1000;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:background .3s ease;
}

.header-left{
  position:absolute;
  left:12px;
}

.header-left img{
  height:40px;
}

header h1{
  margin:0;
  font-size:20px;
  font-weight:700;
  color:#181E3B;
  transition:color .3s ease;
}

/* ===== CLOCHE ===== */
#bellBox{
  position:absolute;
  right:12px;
  font-size:22px;
  cursor:pointer;
}

#bellBadge{
  position:absolute;
  top:-6px;
  right:-6px;
  background:red;
  color:white;
  width:16px;
  height:16px;
  font-size:10px;
  border-radius:50%;
  display:none;
  align-items:center;
  justify-content:center;
}

/* ===== CONTENT ===== */
.page-content{
  margin-top:70px;
}

/* ===== UI ===== */
#welcome{
  text-align:center;
  font-size:36px;
  font-weight:700;
  color:#181E3B;
  margin:4px 0 15px;
  transition:color .3s ease;
}

.section-title{
  background:#181E3B;
  color:white;
  display:inline-block;
  padding:6px 12px;
  margin:20px 15px 10px;
  border-radius:4px;
  font-size:14px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  padding:0 15px;
}

.card{
  background:white;
  border-radius:20px;
  padding:20px;
  text-align:center;
  box-shadow:0 3px 8px rgba(0,0,0,0.08);
  cursor:pointer;
  transition:background .3s ease, box-shadow .3s ease;
}

.card img{
  width:55px;
  margin-bottom:10px;
}

.card div{
  font-size:16px;
  font-weight:700;
}

.list-btn{
  background:white;
  margin:10px 15px;
  padding:18px;
  border-radius:20px;
  display:flex;
  align-items:center;
  gap:12px;
  box-shadow:0 3px 8px rgba(0,0,0,0.08);
  font-weight:700;
  cursor:pointer;
  transition:background .3s ease, box-shadow .3s ease;
}

.list-btn img{
  width:26px;
}

/* ========================================================= */
/* =================== DARK MODE AUTO ====================== */
/* ========================================================= */

@media (prefers-color-scheme: dark){

  body{
    background:#121212;
    color:#ffffff;
  }

  header{
    background:#1a1a1a;
  }

  header h1{
    color:#ffffff;
  }

  #welcome{
    color:#ffffff;
  }

  .card{
    background:#1f1f1f;
    box-shadow:0 4px 14px rgba(0,0,0,0.6);
  }

  .list-btn{
    background:#1f1f1f;
    box-shadow:0 4px 14px rgba(0,0,0,0.6);
  }

  .section-title{
    background:#2a2a2a;
  }

  /* Petit confort : logo blanc auto si besoin */
  .header-left img{
    filter:brightness(0) invert(1);
  }

}

</style>
</head>

<body>

<header>
  <div class="header-left">
    <img src="image/logo.png">
  </div>

  <h1>ECURIE DAMIEN SIRI</h1>

  <div id="bellBox" onclick="go('notifications.html')">
    🔔
    <span id="bellBadge"></span>
  </div>
</header>

<div class="page-content">

<div id="welcome">BIENVENUE</div>

<div class="section-title">ESPACES</div>

<div class="grid">
  <div class="card" onclick="go('travail.html')"><img src="image/travail.svg"><div>TRAVAIL</div></div>
  <div class="card" onclick="go('paddocks.html')"><img src="image/paddock.svg"><div>PADDOCK</div></div>
</div>

<div class="list-btn" onclick="go('plan.html')"><img src="image/plan.svg"> PLAN INTERACTIF</div>

<div class="section-title">PRATIQUE</div>

<div class="grid">
  <div class="card" onclick="go('horaires.html')"><img src="image/time.svg"><div>HORAIRES</div></div>
  <div class="card" onclick="go('meteo.html')"><img src="image/meteo.svg"><div>MÉTÉO</div></div>

  <div class="card" onclick="openExternal('https://ce-grand-rang.cavasoft.fr')"><img src="image/cavasoft.svg"><div>COURS</div></div>
  <div class="card" onclick="openExternal('https://www.ce-dugrandrang.com/book-online?category=194a368e-8a4f-4212-a33e-ae1656e4de8a')"><img src="image/service.svg"><div>SERVICES</div></div>
  <div class="card" onclick="go('concours.html')"><img src="image/concours.svg"><div>CONCOURS</div></div>
  <div class="card" onclick="openExternal('https://www.ce-dugrandrang.com/category/soins')"><img src="image/soins.svg"><div>SOINS</div></div>
</div>

<div class="section-title">AUTRES</div>

<div class="list-btn" onclick="openExternal('https://www.ce-dugrandrang.com/category/laverie')"><img src="image/laverie.svg"> LAVERIE</div>
<div class="list-btn" onclick="openExternal('tarifs.pdf')"><img src="image/tarif.svg"> TARIFS</div>

<div class="section-title">COMPTE</div>

<div class="list-btn" onclick="openExternal('https://www.ce-dugrandrang.com/profile/my/profile')"><img src="image/compte.svg"> MON COMPTE</div>
<div class="list-btn" onclick="openExternal('https://www.ce-dugrandrang.com/my-bookings')"><img src="image/reservation.svg"> MES RÉSERVATIONS</div>
<div class="list-btn" onclick="openExternal('https://www.ce-dugrandrang.com/cart-page')"><img src="image/panier.svg"> MON PANIER</div>

</div>

<script>
function go(url){ window.location.href=url; }
function openExternal(url){ window.open(url,"_blank"); }
</script>

</body>
</html>
