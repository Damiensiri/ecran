<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ecurie Damien Siri</title>

<link rel="manifest" href="manifest.json">

<link rel="apple-touch-icon" href="image/icon-192x192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Ecurie DS">
<meta name="theme-color" content="#f4f4f4">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">

<style>

/* ================= VARIABLES ================= */

:root{
  --bg:#f4f4f4;
  --header-bg:#f4f4f4;
  --text:#181E3B;
  --card-bg:#ffffff;
  --section-bg:#181E3B;
  --section-text:#ffffff;
  --shadow:0 6px 18px rgba(0,0,0,0.08);
}

@media (prefers-color-scheme: dark){
  :root{
    --bg:#0f1115;
    --header-bg:#0f1115;
    --text:#ffffff;
    --card-bg:#1c1f26;
    --section-bg:#ffffff;
    --section-text:#000000;
    --shadow:0 10px 30px rgba(0,0,0,0.6);
  }

  .header-left img{
    filter:
      brightness(0) invert(1)
      drop-shadow(0 0 6px rgba(255,255,255,0.5));
  }
}

/* ================= BASE ================= */

body{
  margin:0;
  font-family:'Montserrat',sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow-y:auto;
  transition:background .3s ease,color .3s ease;
}

/* ================= HEADER ================= */

header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:70px;
  background:var(--header-bg);
  z-index:1000;
  display:flex;
  align-items:center;
  justify-content:center;
}

.header-left{
  position:absolute;
  left:12px;
}

.header-left img{
  height:40px;
}

header h1{
  margin:0;
  font-size:20px;
  font-weight:700;
  color:var(--text);
}

/* ================= BELL ================= */

#bellBox{
  position:absolute;
  right:12px;
  font-size:22px;
  cursor:pointer;
}

#bellBadge{
  position:absolute;
  top:-6px;
  right:-6px;
  background:red;
  color:white;
  width:16px;
  height:16px;
  font-size:10px;
  border-radius:50%;
  display:none;
  align-items:center;
  justify-content:center;
}

/* ================= CONTENT ================= */

.page-content{
  margin-top:70px;
}

#welcome{
  text-align:center;
  font-size:36px;
  font-weight:700;
  margin:10px 0 10px;
}

/* ================= STATUS DISCRET ================= */

#alert-wrapper{
  width:100%;
  display:flex;
  justify-content:flex-end;
  padding:0 15px;
  box-sizing:border-box;
}

#alert-box{
  display:none;
  font-size:15px;
  font-weight:600;
  margin-top:4px;
  display:flex;
  align-items:center;
  gap:8px;
}

.status-dot{
  width:10px;
  height:10px;
  border-radius:50%;
}

#alert-box small{
  font-size:12px;
  font-weight:500;
  opacity:0.75;
}

/* ================= SECTIONS ================= */

.section-title{
  background:var(--section-bg);
  color:var(--section-text);
  display:inline-block;
  padding:6px 14px;
  margin:20px 15px 10px;
  border-radius:6px;
  font-size:14px;
}

/* ================= GRID ================= */

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  padding:0 15px;
}

/* ================= CARDS ================= */

.card{
  background:var(--card-bg);
  border-radius:22px;
  padding:22px;
  text-align:center;
  box-shadow:var(--shadow);
  cursor:pointer;
  transition:transform .15s ease;
}

.card:hover{
  transform:translateY(-3px);
}

.card img{
  width:55px;
  margin-bottom:12px;
}

.card div{
  font-size:16px;
  font-weight:700;
}

/* ================= LIST BUTTON ================= */

.list-btn{
  background:var(--card-bg);
  margin:12px 15px;
  padding:18px;
  border-radius:22px;
  display:flex;
  align-items:center;
  gap:12px;
  box-shadow:var(--shadow);
  font-weight:700;
  cursor:pointer;
}

.list-btn img{
  width:26px;
}

</style>
</head>

<body>

<header>
  <div class="header-left">
    <img src="image/logo.png">
  </div>

  <h1>ECURIE DAMIEN SIRI</h1>

  <div id="bellBox" onclick="go('notifications.html')">
    🔔
    <span id="bellBadge"></span>
  </div>
</header>

<div class="page-content">

<div id="welcome">BIENVENUE</div>

<div id="alert-wrapper">
  <div id="alert-box"></div>
</div>

<!-- CONTENU IDENTIQUE -->
<div class="section-title">ESPACES</div>
<div class="grid">
  <div class="card" onclick="go('travail.html')"><img src="image/travail.svg"><div>TRAVAIL</div></div>
  <div class="card" onclick="go('paddocks.html')"><img src="image/paddock.svg"><div>PADDOCK</div></div>
</div>

<div class="list-btn" onclick="go('plan.html')"><img src="image/plan.svg"> PLAN INTERACTIF</div>

<div class="section-title">PRATIQUE</div>
<div class="grid">
  <div class="card" onclick="go('horaires.html')"><img src="image/time.svg"><div>HORAIRES</div></div>
  <div class="card" onclick="go('meteo.html')"><img src="image/meteo.svg"><div>MÉTÉO</div></div>
</div>

</div>

<script>

/* ===== STATUS OUVERTURE DISCRET ===== */

const SHEET_ID="1-VbRioKfM6JHU-Oep0pa6H3S0VVuvYLyUMXTdSdRbzI";
const HORAIRES_URL=`https://opensheet.elk.sh/${SHEET_ID}/horaires`;

function getTodayName(){
  return ["dimanche","lundi","mardi","mercredi","jeudi","vendredi","samedi"][new Date().getDay()];
}

function timeToMinutes(t){
  const p=t.split(":");
  return parseInt(p[0])*60 + parseInt(p[1]);
}

function isOpenNow(open,close){
  const now=new Date();
  const nowMin=now.getHours()*60 + now.getMinutes();
  return nowMin>=timeToMinutes(open) && nowMin<=timeToMinutes(close);
}

async function loadOpeningState(){

  const box=document.getElementById("alert-box");
  box.innerHTML="";
  box.style.display="none";

  try{
    const res=await fetch(HORAIRES_URL,{cache:"no-store"});
    const horaires=await res.json();

    const today=getTodayName();
    const todayRow=horaires.find(h=>h.jour?.toLowerCase()===today);

    if(!todayRow) return;

    const ouvert=isOpenNow(todayRow.ouverture,todayRow.fermeture);

    box.style.display="flex";

    const dot=document.createElement("div");
    dot.className="status-dot";
    dot.style.background=ouvert?"#1DB954":"#e53935";

    const main=document.createElement("span");
    main.textContent=ouvert?"Écuries ouvertes":"Écuries fermées";
    main.style.color=ouvert?"#1DB954":"#e53935";

    const sub=document.createElement("small");
    sub.textContent=ouvert?
      `(jusqu'à ${todayRow.fermeture})`:
      `(ouvre à ${todayRow.ouverture})`;

    box.appendChild(dot);
    box.appendChild(main);
    box.appendChild(sub);

  }catch(e){
    box.style.display="none";
  }
}

loadOpeningState();
setInterval(loadOpeningState,60000);

</script>

</body>
</html>
