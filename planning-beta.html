<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><meta name="theme-color" content="#101215"><title>Planning Écurie — Bêta</title><style>:root{--bg:#101215;--panel:#181b20;--line:#303641;--text:#f5f7fb;--muted:#aab3c2;--green:#72d39f;--yellow:#ffd166}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Montserrat,system-ui,sans-serif}.app{height:100vh;padding:14px;display:grid;grid-template-rows:auto auto 1fr;gap:12px}.header,.toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px}.header h1{margin:0}.clock{font-size:2.5rem;font-weight:800}.toolbar button{min-height:46px;border:1px solid var(--line);border-radius:12px;background:#20242b;color:white;font:inherit;font-weight:800;padding:0 15px}.week{font-weight:800}.board{overflow:auto}.grid{min-width:1050px;display:grid;grid-template-columns:150px repeat(7,1fr);gap:7px}.head,.horse,.cell{border:1px solid var(--line);border-radius:12px;padding:10px}.head,.horse{font-weight:800}.cell{min-height:110px}.task{border-radius:10px;background:#253344;border-left:6px solid #8ecae6;padding:10px;margin-bottom:8px;cursor:pointer}.task.linked{box-shadow:inset 0 0 0 2px var(--yellow)}.task.done{opacity:.5;border-left-color:var(--green);text-decoration:line-through}.task.pending{animation:pulse .8s infinite alternate}@keyframes pulse{to{opacity:.55}}.empty{color:var(--muted)}dialog{background:#181b20;color:white;border:1px solid var(--line);border-radius:20px;padding:25px;max-width:500px}dialog input{width:100%;min-height:48px;background:#0b1017;color:white;border:1px solid var(--line);border-radius:12px;padding:10px;margin:10px 0}dialog button{min-height:48px;border:0;border-radius:12px;background:var(--green);font-weight:800;padding:0 18px}.error{color:#ff8585}.hint{color:var(--muted);font-size:.8rem}</style></head><body><main class="app"><header class="header"><div><small>BÊTA · D1</small><h1>Planning Écurie</h1></div><div id="clock" class="clock"></div></header><nav class="toolbar"><button id="prev">‹</button><span id="weekLabel" class="week"></span><button id="next">›</button><button id="refresh">Actualiser</button><button id="close">Masquer</button></nav><section id="board" class="board"></section></main><dialog id="setup"><h2>Autoriser cette tablette</h2><p>Collez le jeton créé dans Backstage bêta. Il restera uniquement sur cet appareil.</p><input id="token" autocomplete="off"><p id="setupError" class="error"></p><button id="saveToken">Enregistrer</button></dialog><script>
const API='https://ecurie-notifications-beta.damiensiri-pro.workers.dev',KEY='ecurie_planning_beta_device_token',$=id=>document.getElementById(id),days=['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'],labels={paddock:'Paddock',travail:'Travail',longe:'Longe',repos:'Repos',concours:'Concours',proprietaire:'Propriétaire',autre:'Autre'};let week=monday(),state={horses:[],tasks:[]},busy=new Set();function monday(d=new Date()){d=new Date(d);d.setHours(12,0,0,0);d.setDate(d.getDate()-((d.getDay()+6)%7));return d.toISOString().slice(0,10)}function shift(n){const d=new Date(week+'T12:00:00');d.setDate(d.getDate()+n);week=d.toISOString().slice(0,10)}function esc(v){return String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'})[c])}async function api(path,opt={}){const token=localStorage.getItem(KEY);if(!token){setup.showModal();throw Error('Jeton requis')}const r=await fetch(API+path,{...opt,headers:{authorization:'Bearer '+token,...(opt.body?{'content-type':'application/json'}:{})},cache:'no-store'}),d=await r.json().catch(()=>({}));if(r.status===401){localStorage.removeItem(KEY);setup.showModal()}if(!r.ok)throw Error(d.error||'Erreur réseau');return d}function taskText(t){let x=labels[t.type]||t.type;if(t.type==='paddock')x+=` · ${esc(t.paddock)} ${t.startsAt}–${t.endsAt}`;if(t.description)x+=` · ${esc(t.description)}`;return x}function render(){weekLabel.textContent='Semaine du '+new Date(week+'T12:00:00').toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'});let html='<div class="grid"><div></div>'+days.map(d=>`<div class="head">${d}</div>`).join('');for(const h of state.horses){html+=`<div class="horse">${esc(h.name)}</div>`;for(let day=0;day<7;day++){const ts=state.tasks.filter(t=>t.horseId===h.id&&t.dayIndex===day);html+=`<div class="cell">${ts.map(t=>`<div class="task ${t.completedAt?'done':''} ${t.requestId?'linked':''} ${busy.has(t.id)?'pending':''}" data-id="${t.id}"><strong>${taskText(t)}</strong>${t.requestId?'<div>🌿 Demande de mise au paddock</div>':''}</div>`).join('')}</div>`}}board.innerHTML=html||'<p class="empty">Aucun planning.</p>';board.querySelectorAll('.task:not(.done)').forEach(el=>el.onclick=()=>complete(Number(el.dataset.id)))}async function load(){try{state=await api('/api/planning?week='+week);render()}catch(e){if(e.message!=='Jeton requis')board.innerHTML=`<p class="error">${esc(e.message)}</p>`}}async function complete(id){if(busy.has(id)||!confirm('Valider définitivement cette tâche ?'))return;busy.add(id);render();try{const d=await api(`/api/planning/tasks/${id}/complete`,{method:'POST'});state.tasks=state.tasks.map(t=>t.id===id?d.task:t)}catch(e){alert(e.message)}finally{busy.delete(id);render()}}prev.onclick=()=>{shift(-7);load()};next.onclick=()=>{shift(7);load()};refresh.onclick=load;close.onclick=()=>location.href='ecran-beta.html';saveToken.onclick=async()=>{localStorage.setItem(KEY,token.value.trim());try{await load();setup.close();setupError.textContent=''}catch(e){setupError.textContent=e.message}};function tick(){clock.textContent=new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}tick();setInterval(tick,1000);if(!localStorage.getItem(KEY))setup.showModal();else load();let idle;function reset(){clearTimeout(idle);idle=setTimeout(()=>location.href='ecran-beta.html',60000)}document.addEventListener('pointerdown',reset);reset();try{const ws=new WebSocket(API.replace('https','wss')+'/api/realtime');ws.onmessage=e=>{try{if(JSON.parse(e.data).type==='planning')load()}catch{}}}catch{}
</script></body></html>
