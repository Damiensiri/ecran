<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Réservation paddock</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#f4f4f4;
font-family:'Montserrat',sans-serif;
}

.page{min-height:100vh;}

header{
position:relative;
height:70px;
}

#backBtn{
position:absolute;
left:15px;
top:50%;
transform:translateY(-50%);
width:42px;
height:42px;
border-radius:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 3px 8px rgba(0,0,0,0.15);
cursor:pointer;
}

#backBtn img{width:22px;}

header h1{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
margin:0;
font-size:18px;
font-weight:700;
}

.card{
background:white;
margin:20px;
padding:22px;
border-radius:22px;
box-shadow:0 5px 12px rgba(0,0,0,0.12);
}

label{font-weight:600;font-size:14px;}

select,input{
width:100%;
padding:12px;
margin-top:6px;
margin-bottom:16px;
border-radius:10px;
border:none;
background:#f4f4f4;
}

button{
width:100%;
padding:14px;
border-radius:12px;
border:none;
background:#181E3B;
color:white;
font-weight:700;
cursor:pointer;
margin-top:20px;
}

.dayBtn{
padding:10px;
margin-bottom:8px;
border-radius:10px;
background:#f4f4f4;
text-align:center;
cursor:pointer;
font-weight:600;
}

.dayBtn.active{
background:#181E3B;
color:white;
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
border-bottom:1px solid #eee;
}

.row.free{cursor:pointer}

.row.selected{
background:#c9d7ff;
border-left:4px solid #181E3B;
}

.freeText{color:#2ecc71;font-weight:600;}
.reservedText{color:#e74c3c;font-weight:600;}
.mineText{color:#2980b9;font-weight:700;}

.fullMessage{
text-align:center;
padding:15px;
font-weight:600;
color:#999;
}

/* BANDEAU BAS */

#sheet{
position:fixed;
bottom:-100%;
left:0;
width:100%;
background:white;
border-radius:25px 25px 0 0;
box-shadow:0 -10px 40px rgba(0,0,0,0.25);
transition:0.35s;
z-index:999;
}

#sheet.show{
bottom:0;
}

.sheetContent{
padding:25px;
}

.sheetBtn{
margin-top:10px;
width:100%;
padding:14px;
border:none;
border-radius:12px;
font-weight:600;
cursor:pointer;
}

.sheetNew{
background:#181E3B;
color:white;
}

.sheetFinish{
background:#2ecc71;
color:white;
}

</style>
</head>

<body>

<div class="page">

<header>

<div id="backBtn" onclick="location.href='index.html'">
<img src="image/back.svg">
</div>

<h1 id="title">PADDOCK</h1>

</header>

<div class="card">

<label>Type</label>
<select id="type">
<option value="reservation">Réservation paddock</option>
<option value="mise">Demande mise au paddock (+5€)</option>
</select>

<div id="blocDuration">
<label>Durée</label>
<select id="duration">
<option value="60">1h</option>
<option value="90">1h30</option>
</select>
</div>

<div id="blocPaddock">
<label>Paddock</label>
<select id="paddock"></select>
</div>

<label>Jour</label>
<div id="days"></div>

<label>Prénom</label>
<input id="name">

<label>Email (optionnel)</label>
<input id="email">

<div id="planning"></div>

<button id="mainButton" onclick="book()">Réserver</button>

</div>
</div>

<!-- BANDEAU -->

<div id="sheet">

<div class="sheetContent">

<h3 id="sheetTitle"></h3>

<div id="sheetInfo"></div>

<button class="sheetBtn sheetNew" onclick="closeSheet()">
Ajouter une nouvelle réservation
</button>

<button class="sheetBtn sheetFinish" onclick="location.href='index.html'">
Terminer
</button>

</div>

</div>


<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>

emailjs.init("03cdce-AcdCC03k_v")

const firebaseConfig={
apiKey:"AIzaSyBn6Hgu-xvsWqpwJ-i4lZyI0QjKMBvOeXA",
authDomain:"ecurie-paddock.firebaseapp.com",
projectId:"ecurie-paddock",
storageBucket:"ecurie-paddock.firebasestorage.app",
messagingSenderId:"501153278739",
appId:"1:501153278739:web:824b4344c381f2a94548e6"
}

firebase.initializeApp(firebaseConfig)
const db=firebase.firestore()

function showSheet(title,info){

document.getElementById("sheetTitle").innerText = title
document.getElementById("sheetInfo").innerHTML = info

document.getElementById("sheet").classList.add("show")

}

function closeSheet(){
document.getElementById("sheet").classList.remove("show")
}

let reservations=[]
let horaires={}
let selectedDate=null
let selected=null

let myReservations=JSON.parse(localStorage.getItem("myReservations")||"[]")

async function loadData(){

const r=await db.collection("reservations").get()

reservations=[]

r.forEach(doc=>{
let data=doc.data()
data.id=doc.id
reservations.push(data)
})

generate()

}

async function book(){

let name=document.getElementById("name").value.trim()

if(!name){
alert("Prénom obligatoire")
return
}

if(!selected){
alert("Choisissez un créneau")
return
}

const doc=await db.collection("reservations").add({

name:name,
email:document.getElementById("email").value,
paddock:selected.paddock,
date:selected.date,
time:selected.time,
duration:selected.duration

})

myReservations.push(doc.id)

localStorage.setItem("myReservations",JSON.stringify(myReservations))

showSheet(
"Réservation confirmée",
`
<div>Paddock : ${selected.paddock}</div>
<div>Date : ${selected.date}</div>
<div>Heure : ${selected.time}</div>
`
)

loadData()

}

window.addEventListener("DOMContentLoaded",()=>{

loadData()

})

</script>

</body>
</html>
