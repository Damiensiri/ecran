<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Réservation paddock</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#f4f4f4;
font-family:'Montserrat',sans-serif;
transition:.3s;
}

.page{
min-height:100vh;
transform:translateX(100%);
transition:.35s;
}

.page.active{transform:translateX(0);}
.page.exit{transform:translateX(100%);}

header{
position:relative;
height:70px;
}

#backBtn{
position:absolute;
left:15px;
top:50%;
transform:translateY(-50%);
width:42px;
height:42px;
border-radius:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 3px 8px rgba(0,0,0,0.15);
cursor:pointer;
}

#backBtn img{width:22px}

header h1{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
margin:0;
font-size:18px;
font-weight:700;
cursor:pointer;
display:flex;
gap:8px;
align-items:center;
}

#adminIcon{
display:none;
font-size:18px;
}

.card{
background:white;
margin:20px;
padding:22px;
border-radius:22px;
box-shadow:0 5px 12px rgba(0,0,0,0.12);
}

label{
font-weight:600;
font-size:14px;
}

select,input{
width:100%;
padding:12px;
margin-top:6px;
margin-bottom:16px;
border-radius:10px;
border:none;
background:#f4f4f4;
}

button{
width:100%;
padding:14px;
border-radius:12px;
border:none;
background:#181E3B;
color:white;
font-weight:700;
cursor:pointer;
margin-top:20px;
}

.dayBtn{
padding:10px;
margin-bottom:8px;
border-radius:10px;
background:#f4f4f4;
text-align:center;
cursor:pointer;
font-weight:600;
}

.dayBtn.active{
background:#181E3B;
color:white;
}

.row{
display:flex;
justify-content:space-between;
padding:10px;
border-bottom:1px solid #eee;
}

.row.free{cursor:pointer}

.row.free:hover{
background:#f0f0f0;
}

.row.booked{color:#777}

.row.selected{
background:#c9d7ff;
border-left:4px solid #181E3B;
}

.freeText{
color:#2ecc71;
font-weight:600;
}

.reservedText{
color:#e74c3c;
font-weight:600;
}

.cancel{
font-size:12px;
background:#c0392b;
padding:4px 6px;
border-radius:6px;
color:white;
cursor:pointer;
}

.fullMessage{
text-align:center;
padding:15px;
font-weight:600;
color:#999;
}

@media(prefers-color-scheme:dark){

body{background:#0f1115;color:white}

.card{background:#1c1f26}

select,input{background:#252a33;color:white}

.row.free:hover{background:#252a33}

.dayBtn{background:#252a33}

.row.selected{
background:#2b3560;
border-left:4px solid #5f7cff;
}

.row.selected .freeText{
color:#00ff88;
}

.fullMessage{
color:#aaa;
}

}

</style>
</head>

<body>

<div class="page" id="page">

<header>

<div id="backBtn" onclick="goBack()">
<img src="image/back.svg">
</div>

<h1 id="title">
PADDOCK
<span id="adminIcon">🔧</span>
</h1>

</header>

<div class="card">

<label>Durée</label>
<select id="duration">
<option value="60">1h</option>
<option value="90">1h30</option>
</select>

<label>Paddock</label>
<select id="paddock">
<option value="maison">Maison</option>
<option value="grande">Grande voie</option>
<option value="beudot">Beudot</option>
</select>

<label>Jour</label>
<div id="days"></div>

<label>Prénom</label>
<input id="name">

<label>Email (optionnel)</label>
<input id="email">

<div id="planning"></div>

<button onclick="book()">Réserver</button>

</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbwudqNrwrDPIz2OWGg1h3OjCxl95V_5oiz4lPGLm-nDMepv9MBF9K_zWwqnqA9CufND/exec";

let reservations=[];
let horaires={};

let myReservations=JSON.parse(localStorage.getItem("my_reservations")||"[]");

let admin=false;
let tapCount=0;

const ADMIN_CODE="0359140";

const title=document.getElementById("title");
const adminIcon=document.getElementById("adminIcon");

title.addEventListener("click",()=>{

tapCount++;

if(tapCount===5){

if(!admin){

const code=prompt("Code admin");

if(code===ADMIN_CODE){

admin=true;
adminIcon.style.display="inline";
generate();

}

}else{

admin=false;
adminIcon.style.display="none";
generate();

}

tapCount=0;

}

setTimeout(()=>{tapCount=0},1500);

});

let selectedDate=null;
let selected=null;

/* CORRECTION HEURE GOOGLE SHEETS */

function formatTime(val){

if(!val) return "";

if(typeof val === "string" && val.includes(":") && val.length<=5){
return val;
}

const d=new Date(val);

return d.toLocaleTimeString("fr-FR",{
hour:"2-digit",
minute:"2-digit"
});

}

async function loadData(){

const r=await fetch(API+"?sheet=reservations");
reservations=await r.json();

const h=await fetch(API+"?sheet=horaires");
const horairesSheet=await h.json();

horaires={};

horairesSheet.forEach(row=>{

const p=String(row.paddock).trim().toLowerCase();
const j=String(row.jour).trim().toLowerCase();

if(!horaires[p]) horaires[p]={};

horaires[p][j]={
open:formatTime(row.open),
close:formatTime(row.close),
durations:String(row.durations).split(",").map(Number)
};

});

generate();

}

window.addEventListener("DOMContentLoaded",()=>{
document.getElementById("page").classList.add("active");
buildDays();
loadData();
});

function buildDays(){

const names=["dimanche","lundi","mardi","mercredi","jeudi","vendredi","samedi"];

const container=document.getElementById("days");
container.innerHTML="";

for(let i=0;i<3;i++){

let d=new Date();
d.setDate(d.getDate()+i);

let label=i===0?"Aujourd’hui":i===1?"Demain":"Après-demain";

let btn=document.createElement("div");
btn.className="dayBtn";

btn.innerText=
label+" - "+
names[d.getDay()].charAt(0).toUpperCase()+
names[d.getDay()].slice(1)+" "+
d.getDate();

btn.onclick=()=>{

selectedDate=d.toISOString().slice(0,10);

document.querySelectorAll(".dayBtn").forEach(b=>b.classList.remove("active"));

btn.classList.add("active");

generate();

};

container.appendChild(btn);

if(i===0){
btn.classList.add("active");
selectedDate=d.toISOString().slice(0,10);
}

}

}

function generate(){

const duration=parseInt(document.getElementById("duration").value);
const paddock=document.getElementById("paddock").value;

const todayName=["dimanche","lundi","mardi","mercredi","jeudi","vendredi","samedi"];

const d=new Date(selectedDate+"T10:00:00");
const dayName=todayName[d.getDay()].toLowerCase();

const container=document.getElementById("planning");
container.innerHTML="";

if(!horaires[paddock] || !horaires[paddock][dayName]){

container.innerHTML='<div class="fullMessage">Paddock fermé</div>';
return;

}

const config=horaires[paddock][dayName];

if(!config.durations.includes(duration)){

container.innerHTML='<div class="fullMessage">Durée non disponible</div>';
return;

}

let start=config.open.split(":");
let end=config.close.split(":");

let current=new Date(selectedDate+"T"+start[0]+":"+start[1]);
let close=new Date(selectedDate+"T"+end[0]+":"+end[1]);

let freeFound=false;

while(true){

let next=new Date(current.getTime()+duration*60000);
if(next>close) break;

let time=current.toTimeString().slice(0,5);

let r=reservations.find(r=>r.date===selectedDate && r.time===time && r.paddock===paddock);

let row=document.createElement("div");

if(!r){

freeFound=true;

row.className="row free";
row.innerHTML=`<div>${time}</div><div class="freeText">libre</div>`;

row.onclick=()=>{

selected={time,paddock,date:selectedDate,duration};

document.querySelectorAll(".row").forEach(r=>r.classList.remove("selected"));

row.classList.add("selected");

};

}else{

row.className="row booked";

let label="";

if(admin){
label=r.name;
}
else if(myReservations.includes(r.id)){
label=r.name;
}
else{
label='<span class="reservedText">réservé</span>';
}

row.innerHTML=`<div>${time}</div><div>${label}</div>`;

}

container.appendChild(row);

current=next;

}

if(!freeFound){
container.innerHTML='<div class="fullMessage">Complet aujourd’hui</div>';
}

}

setInterval(loadData,10000);

function goBack(){

const p=document.getElementById("page");

p.classList.remove("active");
p.classList.add("exit");

setTimeout(()=>{
location.href="index.html";
},300);

}

</script>

</body>
</html>
