<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Réservation paddock</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#f4f4f4;
font-family:'Montserrat',sans-serif;
}

.page{min-height:100vh;}

header{
position:relative;
height:70px;
}

#backBtn{
position:absolute;
left:15px;
top:50%;
transform:translateY(-50%);
width:42px;
height:42px;
border-radius:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 3px 8px rgba(0,0,0,0.15);
cursor:pointer;
}

#backBtn img{
width:22px;
height:22px;
}

header h1{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
margin:0;
font-size:18px;
font-weight:700;
}

.card{
background:white;
margin:20px;
padding:22px;
border-radius:22px;
box-shadow:0 5px 12px rgba(0,0,0,0.12);
}

label{font-weight:600;font-size:14px;}

select,input{
width:100%;
padding:12px;
margin-top:6px;
margin-bottom:16px;
border-radius:10px;
border:none;
background:#f4f4f4;
}

button{
width:100%;
padding:14px;
border-radius:12px;
border:none;
background:#181E3B;
color:white;
font-weight:700;
cursor:pointer;
margin-top:20px;
}

.dayBtn{
padding:10px;
margin-bottom:8px;
border-radius:10px;
background:#f4f4f4;
text-align:center;
cursor:pointer;
font-weight:600;
}

.dayBtn.active{
background:#181E3B;
color:white;
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
border-bottom:1px solid #eee;
}

.row.free{cursor:pointer}

.row.selected{
background:#c9d7ff;
border-left:4px solid #181E3B;
}

.freeText{color:#2ecc71;font-weight:600;}
.reservedText{color:#e74c3c;font-weight:600;}
.mineText{color:#2980b9;font-weight:700;}

.fullMessage{
text-align:center;
padding:15px;
font-weight:600;
color:#999;
}

@media(prefers-color-scheme:dark){

body{
background:#0f1115;
color:white;
}

.card{
background:#1c1f26;
}

select,input{
background:#252a33;
color:white;
}

.row{
border-bottom:1px solid #333;
}

.dayBtn{
background:#252a33;
}

#backBtn{
background:#1c1f26;
box-shadow:0 12px 30px rgba(0,0,0,0.6);
}

#backBtn img{
filter:brightness(0) invert(1);
}

}

</style>
</head>

<body>

<div class="page">

<header>
<div id="backBtn" onclick="location.href='index.html'">
<img src="image/back.svg">
</div>
<h1 id="title">PADDOCK</h1>
</header>

<div class="card">

<label>Type</label>
<select id="type">
<option value="reservation">Réservation paddock</option>
<option value="mise">Demande mise au paddock (+5€)</option>
</select>

<div id="blocDuration">
<label>Durée</label>
<select id="duration">
<option value="60">1h</option>
<option value="90">1h30</option>
</select>
</div>

<div id="blocPaddock">
<label>Paddock</label>
<select id="paddock"></select>
</div>

<label>Jour</label>
<div id="days"></div>

<label>Prénom</label>
<input id="name">

<label>Email (optionnel)</label>
<input id="email">

<div id="planning"></div>

<button id="mainButton" onclick="book()">Réserver</button>

</div>
</div>


<!-- POPUP CONFIRMATION -->

<div id="confirmPopup" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.45);z-index:9999;align-items:center;justify-content:center">

<div style="background:white;padding:25px;border-radius:20px;text-align:center;width:260px">

<h3>Réservation confirmée</h3>

<button onclick="location.reload()" style="width:100%;padding:12px;border:none;border-radius:12px;background:#2ecc71;color:white;font-weight:600;margin-bottom:10px">
Nouvelle réservation
</button>

<button onclick="location.href='mesreservations.html'" style="width:100%;padding:12px;border:none;border-radius:12px;background:#181E3B;color:white;font-weight:600">
Terminer
</button>

</div>
</div>


<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>

function showConfirm(){
document.getElementById("confirmPopup").style.display="flex"
}

</script>

</body>
</html>
