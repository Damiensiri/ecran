<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Réservation paddock</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#f4f4f4;
font-family:'Montserrat',sans-serif;
transition:.3s;
}

.page{
min-height:100vh;
transform:translateX(100%);
transition:.35s;
}

.page.active{transform:translateX(0);}
.page.exit{transform:translateX(100%);}

header{
position:relative;
height:70px;
}

#backBtn{
position:absolute;
left:15px;
top:50%;
transform:translateY(-50%);
width:42px;
height:42px;
border-radius:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 3px 8px rgba(0,0,0,0.15);
cursor:pointer;
}

#backBtn img{width:22px}

header h1{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
margin:0;
font-size:18px;
font-weight:700;
}

.card{
background:white;
margin:20px;
padding:22px;
border-radius:22px;
box-shadow:0 5px 12px rgba(0,0,0,0.12);
}

label{
font-weight:600;
font-size:14px;
}

select,input{
width:100%;
padding:12px;
margin-top:6px;
margin-bottom:16px;
border-radius:10px;
border:none;
background:#f4f4f4;
}

button{
width:100%;
padding:14px;
border-radius:12px;
border:none;
background:#181E3B;
color:white;
font-weight:700;
cursor:pointer;
margin-top:20px;
}

.dayBtn{
padding:10px;
margin-bottom:8px;
border-radius:10px;
background:#f4f4f4;
text-align:center;
cursor:pointer;
font-weight:600;
}

.dayBtn.active{
background:#181E3B;
color:white;
}

.row{
display:flex;
justify-content:space-between;
padding:10px;
border-bottom:1px solid #eee;
}

.row.free{cursor:pointer}

.row.selected{
background:#c9d7ff;
border-left:4px solid #181E3B;
}

.freeText{
color:#2ecc71;
font-weight:600;
}

.reservedText{
color:#e74c3c;
font-weight:600;
}

.fullMessage{
text-align:center;
padding:15px;
font-weight:600;
color:#999;
}

</style>
</head>

<body>

<div class="page" id="page">

<header>

<div id="backBtn" onclick="goBack()">
<img src="image/back.svg">
</div>

<h1>PADDOCK</h1>

</header>

<div class="card">

<label>Durée</label>
<select id="duration">
<option value="60">1h</option>
<option value="90">1h30</option>
</select>

<label>Paddock</label>
<select id="paddock">
<option value="maison">Maison</option>
<option value="grande">Grande voie</option>
<option value="beudot">Beudot</option>
</select>

<label>Jour</label>
<div id="days"></div>

<label>Prénom</label>
<input id="name">

<label>Email (optionnel)</label>
<input id="email">

<div id="planning"></div>

<button onclick="book()">Réserver</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyBn6Hgu-xvsWqpwJ-i4lZyI0QjKMBvOeXA",
authDomain:"ecurie-paddock.firebaseapp.com",
projectId:"ecurie-paddock",
storageBucket:"ecurie-paddock.firebasestorage.app",
messagingSenderId:"501153278739",
appId:"1:501153278739:web:824b4344c381f2a94548e6"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let reservations=[];
let selectedDate=null;
let selected=null;

let myReservations=JSON.parse(localStorage.getItem("my_reservations")||"[]");

let bookingLock=false;

async function loadData(){

reservations=[];

const snapshot=await getDocs(collection(db,"reservations"));

snapshot.forEach(doc=>{
reservations.push(doc.data());
});

generate();

}

function buildDays(){

const names=["dimanche","lundi","mardi","mercredi","jeudi","vendredi","samedi"];
const container=document.getElementById("days");

for(let i=0;i<3;i++){

let d=new Date();
d.setDate(d.getDate()+i);

let label=i===0?"Aujourd’hui":i===1?"Demain":"Après-demain";

let btn=document.createElement("div");
btn.className="dayBtn";

btn.innerText=
label+" - "+
names[d.getDay()].charAt(0).toUpperCase()+
names[d.getDay()].slice(1)+" "+
d.getDate();

btn.onclick=()=>{

selectedDate=
d.getFullYear()+"-"+
String(d.getMonth()+1).padStart(2,"0")+"-"+
String(d.getDate()).padStart(2,"0");

document.querySelectorAll(".dayBtn").forEach(b=>b.classList.remove("active"));

btn.classList.add("active");

generate();

};

container.appendChild(btn);

if(i===0){
btn.classList.add("active");
selectedDate=
d.getFullYear()+"-"+
String(d.getMonth()+1).padStart(2,"0")+"-"+
String(d.getDate()).padStart(2,"0");
}

}

}

function overlap(start,duration,res){

const s1=start;
const e1=start+duration;

const s2=res.timeMinutes;
const e2=s2+res.duration;

return !(e1<=s2 || s1>=e2);

}

function generate(){

const paddock=document.getElementById("paddock").value;
const duration=parseInt(document.getElementById("duration").value);

const parts=selectedDate.split("-");
const d=new Date(parts[0],parts[1]-1,parts[2]);

const container=document.getElementById("planning");
container.innerHTML="";

let startMinutes=480;
let endMinutes=1140;
let step=30;

for(let m=startMinutes; m<=endMinutes-duration; m+=step){

let time=
String(Math.floor(m/60)).padStart(2,"0")+":"+
String(m%60).padStart(2,"0");

let conflict=false;

reservations.forEach(r=>{

if(r.date===selectedDate && r.paddock===paddock){

r.timeMinutes=parseInt(r.time.split(":")[0])*60+parseInt(r.time.split(":")[1]);

if(overlap(m,duration,r)) conflict=true;

}

});

let row=document.createElement("div");

if(!conflict){

row.className="row free";
row.innerHTML=`<div>${time}</div><div class="freeText">libre</div>`;

row.onclick=()=>{

selected={time,paddock,date:selectedDate,duration};

document.querySelectorAll(".row").forEach(r=>r.classList.remove("selected"));

row.classList.add("selected");

};

}else{

row.innerHTML=`<div>${time}</div><div class="reservedText">réservé</div>`;

}

container.appendChild(row);

}

}

async function book(){

if(bookingLock) return;

let name=document.getElementById("name").value.trim();

if(!name){
alert("Prénom obligatoire");
return;
}

if(!selected){
alert("Choisissez un créneau");
return;
}

if(reservations.find(r=>r.date===selected.date && r.name===name)){
alert("Vous avez déjà une réservation ce jour");
return;
}

bookingLock=true;

await addDoc(collection(db,"reservations"),{

name:name,
email:document.getElementById("email").value,
paddock:selected.paddock,
date:selected.date,
time:selected.time,
duration:selected.duration

});

bookingLock=false;

loadData();

}

window.addEventListener("DOMContentLoaded",()=>{

document.getElementById("page").classList.add("active");

buildDays();

loadData();

});

setInterval(loadData,10000);

function goBack(){

const p=document.getElementById("page");

p.classList.remove("active");

p.classList.add("exit");

setTimeout(()=>{location.href="index.html";},300);

}

document.getElementById("duration").onchange=generate;
document.getElementById("paddock").onchange=generate;

</script>

</body>
</html>
