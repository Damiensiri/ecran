<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Réservation paddock</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#f4f4f4;
font-family:'Montserrat',sans-serif;
transition:.3s;
}

.page{
min-height:100vh;
transform:translateX(100%);
transition:.35s;
}

.page.active{transform:translateX(0);}
.page.exit{transform:translateX(100%);}

header{
position:relative;
height:70px;
}

#backBtn{
position:absolute;
left:15px;
top:50%;
transform:translateY(-50%);
width:42px;
height:42px;
border-radius:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 3px 8px rgba(0,0,0,0.15);
cursor:pointer;
}

#backBtn img{width:22px}

header h1{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
margin:0;
font-size:18px;
font-weight:700;
cursor:pointer;
display:flex;
gap:8px;
align-items:center;
}

#adminIcon{
display:none;
font-size:18px;
}

.card{
background:white;
margin:20px;
padding:22px;
border-radius:22px;
box-shadow:0 5px 12px rgba(0,0,0,0.12);
}

label{
font-weight:600;
font-size:14px;
}

select,input{
width:100%;
padding:12px;
margin-top:6px;
margin-bottom:16px;
border-radius:10px;
border:none;
background:#f4f4f4;
}

button{
width:100%;
padding:14px;
border-radius:12px;
border:none;
background:#181E3B;
color:white;
font-weight:700;
cursor:pointer;
margin-top:20px;
}

.dayBtn{
padding:10px;
margin-bottom:8px;
border-radius:10px;
background:#f4f4f4;
text-align:center;
cursor:pointer;
font-weight:600;
}

.dayBtn.active{
background:#181E3B;
color:white;
}

.row{
display:flex;
justify-content:space-between;
padding:10px;
border-bottom:1px solid #eee;
}

.row.free{cursor:pointer}

.row.selected{
background:#c9d7ff;
border-left:4px solid #181E3B;
}

.freeText{
color:#2ecc71;
font-weight:600;
}

.reservedText{
color:#e74c3c;
font-weight:600;
}

.fullMessage{
text-align:center;
padding:15px;
font-weight:600;
color:#999;
}

@media(prefers-color-scheme:dark){

body{background:#0f1115;color:white}

.card{background:#1c1f26}

select,input{background:#252a33;color:white}

.dayBtn{background:#252a33}

.row.selected{
background:#2b3560;
border-left:4px solid #5f7cff;
}

.fullMessage{
color:#aaa;
}

}

</style>
</head>

<body>

<div class="page" id="page">

<header>

<div id="backBtn" onclick="goBack()">
<img src="image/back.svg">
</div>

<h1 id="title">
PADDOCK
<span id="adminIcon">🔧</span>
</h1>

</header>

<div class="card">

<label>Durée</label>
<select id="duration">
<option value="60">1h</option>
<option value="90">1h30</option>
</select>

<label>Paddock</label>
<select id="paddock">
<option value="maison">Maison</option>
<option value="grande">Grande voie</option>
<option value="beudot">Beudot</option>
</select>

<label>Jour</label>
<div id="days"></div>

<label>Prénom</label>
<input id="name">

<label>Email (optionnel)</label>
<input id="email">

<div id="planning"></div>

<button onclick="book()">Réserver</button>

</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbwudqNrwrDPIz2OWGg1h3OjCxl95V_5oiz4lPGLm-nDMepv9MBF9K_zWwqnqA9CufND/exec";

let reservations=[];
let horaires={};
let selectedDate=null;
let selected=null;

let myReservations=JSON.parse(localStorage.getItem("my_reservations")||"[]");

/* CONVERSION HEURE GOOGLE SHEETS */

function formatTime(val){

if(!val) return "";

const d=new Date(val);

return String(d.getHours()).padStart(2,"0")+":"+
String(d.getMinutes()).padStart(2,"0");

}

/* CHARGEMENT DONNÉES */

async function loadData(){

const r=await fetch(API+"?sheet=reservations");
reservations=await r.json();

const h=await fetch(API+"?sheet=horaires");
const horairesSheet=await h.json();

horaires={};

horairesSheet.forEach(row=>{

const paddock=row.paddock.trim().toLowerCase();
const jour=row.jour.trim().toLowerCase();

if(!horaires[paddock]) horaires[paddock]={};

horaires[paddock][jour]={
open:formatTime(row.open),
close:formatTime(row.close),
durations:String(row.durations).split(",").map(Number)
};

});

generate();

}

/* CONSTRUCTION JOURS */

function buildDays(){

const names=["dimanche","lundi","mardi","mercredi","jeudi","vendredi","samedi"];
const container=document.getElementById("days");

for(let i=0;i<3;i++){

let d=new Date();
d.setDate(d.getDate()+i);

let label=i===0?"Aujourd’hui":i===1?"Demain":"Après-demain";

let btn=document.createElement("div");
btn.className="dayBtn";

btn.innerText=
label+" - "+
names[d.getDay()].charAt(0).toUpperCase()+
names[d.getDay()].slice(1)+" "+
d.getDate();

btn.onclick=()=>{

selectedDate=
d.getFullYear()+"-"+
String(d.getMonth()+1).padStart(2,"0")+"-"+
String(d.getDate()).padStart(2,"0");

document.querySelectorAll(".dayBtn").forEach(b=>b.classList.remove("active"));

btn.classList.add("active");

generate();

};

container.appendChild(btn);

if(i===0){
btn.classList.add("active");
selectedDate=
d.getFullYear()+"-"+
String(d.getMonth()+1).padStart(2,"0")+"-"+
String(d.getDate()).padStart(2,"0");
}

}

}

/* GENERATE CRENEAUX */

function generate(){

const paddock=document.getElementById("paddock").value;
const duration=parseInt(document.getElementById("duration").value);

const names=["dimanche","lundi","mardi","mercredi","jeudi","vendredi","samedi"];

const parts=selectedDate.split("-");
const d=new Date(parts[0],parts[1]-1,parts[2]);

const jour=names[d.getDay()];

const container=document.getElementById("planning");
container.innerHTML="";

if(!horaires[paddock] || !horaires[paddock][jour]){

container.innerHTML='<div class="fullMessage">Paddock fermé</div>';
return;

}

const config=horaires[paddock][jour];

if(!config.durations.includes(duration)){

container.innerHTML='<div class="fullMessage">Durée non disponible</div>';
return;

}

let start=config.open.split(":");
let end=config.close.split(":");

let current=new Date(selectedDate+"T"+start[0]+":"+start[1]);
let close=new Date(selectedDate+"T"+end[0]+":"+end[1]);

while(true){

let next=new Date(current.getTime()+duration*60000);

if(next>close) break;

let time=current.toTimeString().slice(0,5);

let r=reservations.find(r=>r.date===selectedDate && r.time===time && r.paddock===paddock);

let row=document.createElement("div");

if(!r){

row.className="row free";

row.innerHTML=`<div>${time}</div><div class="freeText">libre</div>`;

row.onclick=()=>{

selected={time,paddock,date:selectedDate,duration};

document.querySelectorAll(".row").forEach(r=>r.classList.remove("selected"));

row.classList.add("selected");

};

}else{

let label=myReservations.includes(r.id)?r.name:'<span class="reservedText">réservé</span>';

row.innerHTML=`<div>${time}</div><div>${label}</div>`;

}

container.appendChild(row);

current=next;

}

}

/* BOOK */

async function book(){

let name=document.getElementById("name").value.trim();

if(!name){alert("Prénom obligatoire");return;}

if(!selected){alert("Choisissez un créneau");return;}

const id=Date.now().toString();

await fetch(API,{
method:"POST",
body:JSON.stringify({
id,
name,
email:document.getElementById("email").value,
paddock:selected.paddock,
date:selected.date,
time:selected.time,
duration:selected.duration
})
});

myReservations.push(id);

localStorage.setItem("my_reservations",JSON.stringify(myReservations));

loadData();

}

/* INIT */

window.addEventListener("DOMContentLoaded",()=>{

document.getElementById("page").classList.add("active");

buildDays();

loadData();

});

setInterval(loadData,10000);

function goBack(){

const p=document.getElementById("page");

p.classList.remove("active");

p.classList.add("exit");

setTimeout(()=>{location.href="index.html";},300);

}

document.getElementById("duration").onchange=generate;
document.getElementById("paddock").onchange=generate;

</script>

</body>
</html>
