<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Réservation paddock</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#f4f4f4;
font-family:'Montserrat',sans-serif;
}

/* ===== ANIMATION PAGE ===== */

.page{
min-height:100vh;
transform:translateX(100%);
transition:0.35s;
}

.page.active{
transform:translateX(0);
}

.page.exit{
transform:translateX(100%);
}

header{
position:relative;
height:70px;
}

#backBtn{
position:absolute;
left:15px;
top:50%;
transform:translateY(-50%);
width:42px;
height:42px;
border-radius:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 3px 8px rgba(0,0,0,0.15);
cursor:pointer;
}

#backBtn img{
width:22px;
height:22px;
}

header h1{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
margin:0;
font-size:18px;
font-weight:700;
}

.card{
background:white;
margin:20px;
padding:22px;
border-radius:22px;
box-shadow:0 5px 12px rgba(0,0,0,0.12);
}

label{font-weight:600;font-size:14px;}

select,input{
width:100%;
padding:12px;
margin-top:6px;
margin-bottom:16px;
border-radius:10px;
border:none;
background:#f4f4f4;
}

button{
width:100%;
padding:14px;
border-radius:12px;
border:none;
background:#181E3B;
color:white;
font-weight:700;
cursor:pointer;
margin-top:20px;
}

.dayBtn{
padding:10px;
margin-bottom:8px;
border-radius:10px;
background:#f4f4f4;
text-align:center;
cursor:pointer;
font-weight:600;
}

.dayBtn.active{
background:#181E3B;
color:white;
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
border-bottom:1px solid #eee;
}

.row.free{cursor:pointer}

.row.selected{
background:#c9d7ff;
border-left:4px solid #181E3B;
}

.freeText{color:#2ecc71;font-weight:600;}
.reservedText{color:#e74c3c;font-weight:600;}
.mineText{color:#2980b9;font-weight:700;}

.fullMessage{
text-align:center;
padding:15px;
font-weight:600;
color:#999;
}

/* DARK MODE */

@media(prefers-color-scheme:dark){

body{
background:#0f1115;
color:white;
}

.card{
background:#1c1f26;
}

select,input{
background:#252a33;
color:white;
}

.row{
border-bottom:1px solid #333;
}

.dayBtn{
background:#252a33;
}

#backBtn{
background:#1c1f26;
box-shadow:0 12px 30px rgba(0,0,0,0.6);
}

#backBtn img{
filter:brightness(0) invert(1);
}

}

</style>
</head>

<body>

<div class="page" id="page">

<header>
<div id="backBtn" onclick="goBack()">
<img src="image/back.svg">
</div>
<h1 id="title">PADDOCK</h1>
</header>

<div class="card">

<label>Type</label>
<select id="type">
<option value="reservation">Réservation paddock</option>
<option value="mise">Demande mise au paddock (+5€)</option>
</select>

<div id="blocDuration">
<label>Durée</label>
<select id="duration">
<option value="60">1h</option>
<option value="90">1h30</option>
</select>
</div>

<div id="blocPaddock">
<label>Paddock</label>
<select id="paddock"></select>
</div>

<label>Jour</label>
<div id="days"></div>

<label>Prénom</label>
<input id="name">

<label>Email (optionnel)</label>
<input id="email">

<div id="planning"></div>

<button id="mainButton" onclick="book()">Réserver</button>

</div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>

/* ===== ANIMATION RETOUR ===== */

function goBack(){

const p=document.getElementById("page")

p.classList.remove("active")
p.classList.add("exit")

setTimeout(()=>{
location.href="index.html"
},300)

}

emailjs.init("03cdce-AcdCC03k_v")

const firebaseConfig={
apiKey:"AIzaSyBn6Hgu-xvsWqpwJ-i4lZyI0QjKMBvOeXA",
authDomain:"ecurie-paddock.firebaseapp.com",
projectId:"ecurie-paddock",
storageBucket:"ecurie-paddock.firebasestorage.app",
messagingSenderId:"501153278739",
appId:"1:501153278739:web:824b4344c381f2a94548e6"
}

firebase.initializeApp(firebaseConfig)
const db=firebase.firestore()

let reservations=[]
let horaires={}
let selectedDate=null
let selected=null

let adminMode=false
let tapCount=0

const title=document.getElementById("title")

title.addEventListener("click",()=>{

tapCount++

if(tapCount>=5){

if(!adminMode){

const pass=prompt("Mot de passe admin")

if(pass==="0359140"){
adminMode=true
title.innerHTML="PADDOCK 🔧"
generate()
}

}else{

adminMode=false
title.innerHTML="PADDOCK"
generate()

}

tapCount=0

}

setTimeout(()=>{tapCount=0},1200)

})

let myReservations=JSON.parse(localStorage.getItem("myReservations")||"[]")

const durationSelect=document.getElementById("duration")
const paddockSelect=document.getElementById("paddock")

function initType(){

const typeSelect=document.getElementById("type")

typeSelect.addEventListener("change",()=>{

const mise=typeSelect.value==="mise"

document.getElementById("blocDuration").style.display=mise?"none":"block"
document.getElementById("blocPaddock").style.display=mise?"none":"block"
document.getElementById("planning").style.display=mise?"none":"block"

document.getElementById("mainButton").innerText=mise?"Demander":"Réserver"

})

}

function updatePaddocks(){

const duration=durationSelect.value

paddockSelect.innerHTML=""

if(duration==="90"){

paddockSelect.innerHTML=`
<option value="grande">Grande voie</option>
<option value="beudot">Beudot</option>
`

}else{

paddockSelect.innerHTML=`
<option value="maison">Maison</option>
<option value="grande">Grande voie</option>
<option value="beudot">Beudot</option>
`

}

generate()

}

durationSelect.addEventListener("change",updatePaddocks)

async function loadData(){

const r=await db.collection("reservations").get()

reservations=[]

r.forEach(doc=>{
let data=doc.data()
data.id=doc.id
reservations.push(data)
})

const h=await db.collection("horaires").get()

horaires={}

h.forEach(doc=>{
horaires[doc.id]=doc.data()
})

generate()

}

function buildDays(){

const container=document.getElementById("days")
container.innerHTML=""

for(let i=0;i<3;i++){

let d=new Date()
d.setDate(d.getDate()+i)

let label=i===0?"Aujourd’hui":i===1?"Demain":"Après-demain"

let btn=document.createElement("div")
btn.className="dayBtn"

btn.innerText=label+" "+d.getDate()

btn.onclick=()=>{

selectedDate=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")

document.querySelectorAll(".dayBtn").forEach(b=>b.classList.remove("active"))
btn.classList.add("active")

generate()

}

container.appendChild(btn)

if(i===0){
btn.classList.add("active")
selectedDate=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")
}

}

}

/* ===== INITIALISATION ===== */

document.addEventListener("DOMContentLoaded",()=>{

document.getElementById("page").classList.add("active")

initType()
buildDays()
updatePaddocks()
loadData()

paddockSelect.onchange=generate

})

</script>

</body>
</html>
