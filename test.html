<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Centre Équestre</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;}
body{
font-family:'Montserrat',sans-serif;
background:#0f1115;
color:white;
overflow-x:hidden;
}

/* HEADER */

header{
position:fixed;
top:0;
width:100%;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
z-index:1000;
transition:0.3s;
}

header.scrolled{
background:rgba(15,17,21,0.9);
backdrop-filter:blur(10px);
}

header button{
background:#d4af37;
border:none;
padding:10px 20px;
border-radius:20px;
cursor:pointer;
}

/* HERO VIDEO */

.hero{
height:100vh;
position:relative;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.hero video{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
top:0;
left:0;
z-index:-2;
}

.hero::after{
content:"";
position:absolute;
top:0;left:0;right:0;bottom:0;
background:rgba(0,0,0,0.5);
z-index:-1;
}

.hero h1{
font-size:3rem;
margin-bottom:20px;
}

.hero button{
padding:15px 30px;
border:none;
background:#d4af37;
border-radius:30px;
cursor:pointer;
}

/* PARALLAX */

.parallax{
height:60vh;
background:url('https://images.unsplash.com/photo-1509023464722-18d996393ca8?q=80') center/cover fixed;
display:flex;
align-items:center;
justify-content:center;
font-size:2rem;
}

/* LIVE */

.live{
display:flex;
justify-content:center;
gap:20px;
padding:60px 20px;
flex-wrap:wrap;
}

.card{
background:#1c1f2b;
padding:20px;
border-radius:15px;
width:200px;
text-align:center;
transition:0.3s;
}

.card:hover{
transform:translateY(-10px) scale(1.05);
}

.card h2{
color:#d4af37;
}

/* IFRAME */

.section{
padding:80px 20px;
text-align:center;
}

.iframe-container{
max-width:900px;
margin:auto;
border-radius:20px;
overflow:hidden;
box-shadow:0 20px 60px rgba(0,0,0,0.7);
}

iframe{
width:100%;
height:600px;
border:none;
transform:translateY(-120px);
}

/* FADE */

.fade{
opacity:0;
transform:translateY(50px);
transition:1s;
}

.fade.visible{
opacity:1;
transform:translateY(0);
}

</style>
</head>

<body>

<header id="header">
  <div>🐎 Centre Équestre</div>
  <button>Réserver</button>
</header>

<!-- HERO VIDEO -->

<section class="hero">
  <video autoplay muted loop>
    <source src="https://cdn.coverr.co/videos/coverr-horse-running-1572/1080p.mp4" type="video/mp4">
  </video>

  <div>
    <h1>Vivez l’expérience équestre</h1>
    <button>Découvrir</button>
  </div>
</section>

<!-- PARALLAX -->

<section class="parallax">
  Une expérience unique
</section>

<!-- LIVE -->

<section class="live fade">
  <div class="card">
    <h2>3/5</h2>
    <p>Paddocks ouverts</p>
  </div>
  <div class="card">
    <h2>2</h2>
    <p>Activités aujourd’hui</p>
  </div>
  <div class="card">
    <h2>Top</h2>
    <p>Conditions</p>
  </div>
</section>

<!-- IFRAME -->

<section class="section fade">
  <h2>Réserver en ligne</h2>

  <div class="iframe-container">
    <iframe src="https://ce-grand-rang.cavasoft.fr"></iframe>
  </div>

  <br>

  <a href="https://ce-grand-rang.cavasoft.fr" target="_blank">
    <button>Ouvrir plein écran</button>
  </a>
</section>

<script>

/* SCROLL HEADER */

window.addEventListener("scroll", () => {
  const header = document.getElementById("header");
  if(window.scrollY > 50){
    header.classList.add("scrolled");
  } else {
    header.classList.remove("scrolled");
  }
});

/* FADE */

const faders = document.querySelectorAll('.fade');

window.addEventListener('scroll', () => {
  const trigger = window.innerHeight * 0.85;

  faders.forEach(el => {
    if(el.getBoundingClientRect().top < trigger){
      el.classList.add('visible');
    }
  });
});

</script>

</body>
</html>
