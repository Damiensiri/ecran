<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planning Chevaux</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:'Montserrat',sans-serif;
  background:#000;
  overflow:hidden;
}

/* HEADER */

header{
  height:70px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:#000;
  padding:0 20px;
  color:white;
  font-size:22px;
  font-weight:700;
}

.nav-btn{
  cursor:pointer;
  user-select:none;
  opacity:0.7;
}
.nav-btn:hover{
  opacity:1;
}

/* TABLE */

table{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
}

th, td{
  border:1px solid rgba(255,255,255,0.1);
  text-align:center;
  vertical-align:middle;
  color:white;
  font-size:16px;
  padding:8px;
  white-space:pre-line;
}

th{
  background:#111;
  height:60px;
}

td:first-child, th:first-child{
  width:220px;
  font-weight:700;
  background:#111;
}

/* COULEURS ACTIVITE */

.paddock      { background:#4CAF50; }
.travail      { background:#ff9800; }
.longe        { background:#2196F3; }
.proprietaire { background:#e53935; }
.repos        { background:#e53935; }

/* VALIDATION */

td.done{
  filter: brightness(0.6);
  position:relative;
}

td.done::after{
  content:"✔";
  position:absolute;
  top:4px;
  right:6px;
  font-size:18px;
  color:white;
  font-weight:700;
}

</style>
</head>

<body>

<header>
  <div class="nav-btn" id="prevWeek">◀</div>
  <div id="weekLabel">Semaine --</div>
  <div class="nav-btn" id="nextWeek">▶</div>
</header>

<table id="planningTable"></table>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwsRfugRPkX7opuYZU0Vlpp8XcMYEkqOvYa-r4sxxLf_0hLWzFuN9MaCWYIKfbaS-Al/exec";
const SHEET_ID = "1Vp9pNL0d-oC6UmHQyCdvHwKl3h36NASIdSJ_vg1wz38";
const TIMEOUT_LOGOUT = 60000;

const JOURS=["cheval","Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi","Dimanche"];

let currentDate = new Date();
let currentYear;
let currentWeek;

function getISOWeek(d){
  d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  let dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  let yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
  let weekNo = Math.ceil((((d - yearStart) / 86400000) + 1)/7);
  return [d.getUTCFullYear(),weekNo];
}

(function(){
  const [y,w] = getISOWeek(currentDate);
  currentYear = y;
  currentWeek = w;
})();

function sheetName(y,w){
  const ww = String(w).padStart(2,"0");
  return `Semaine_${y}-${ww}`;
}

/* Détection couleur basée UNIQUEMENT sur la première ligne */
function textClasse(txt){
  if(!txt) return "";
  const firstLine = txt.split("\n")[0].toLowerCase();

  if(firstLine.includes("paddock")) return "paddock";
  if(firstLine.includes("travail")) return "travail";
  if(firstLine.includes("longe")) return "longe";
  if(firstLine.includes("proprietaire") || firstLine.includes("propriétaire")) return "proprietaire";
  if(firstLine.includes("repos")) return "repos";
  return "";
}

async function loadWeek(year,week){
  const name = sheetName(year,week);
  const url  = `https://opensheet.elk.sh/${SHEET_ID}/${name}`;

  document.getElementById("weekLabel").innerText =
    "Semaine "+String(week).padStart(2,"0");

  try{
    const res = await fetch(url);
    const data = await res.json();
    drawTable(data,name);
  }catch(e){
    console.error("Erreur lecture sheet",e);
  }
}

function drawTable(data, sheet){

  const table = document.getElementById("planningTable");
  table.innerHTML = "";

  /* HEADER */
  const head = document.createElement("tr");

  JOURS.forEach(h=>{
    const th = document.createElement("th");
    th.innerText = h.charAt(0).toUpperCase() + h.slice(1);
    head.appendChild(th);
  });

  table.appendChild(head);

  /* LIGNES */
  data.forEach(item=>{

    if(!item.cheval) return; // sécurité minimale

    const tr = document.createElement("tr");

    JOURS.forEach(col=>{

      const td = document.createElement("td");

      if(col==="cheval"){
        td.innerText = item.cheval;
      }else{

        const value = item[col] || "";

        td.innerHTML = value.replace(/\n/g,"<br>");
        td.classList.add(textClasse(value));

        td.addEventListener("click",()=>{
          toggleDone(sheet,item.cheval,col);
        });
      }

      tr.appendChild(td);
    });

    table.appendChild(tr);
  });
}

async function toggleDone(sheet,cheval,jour){

  const payload = {
    sheet: sheet,
    cheval: cheval,
    jour: jour
  };

  await fetch(SCRIPT_URL,{
    method:"POST",
    body: JSON.stringify(payload)
  });

  loadWeek(currentYear,currentWeek);
}

document.getElementById("prevWeek").onclick = ()=>{
  currentWeek--;
  loadWeek(currentYear,currentWeek);
};

document.getElementById("nextWeek").onclick = ()=>{
  currentWeek++;
  loadWeek(currentYear,currentWeek);
};

/* AUTO LOGOUT */

let timer;
function resetTimer(){
  clearTimeout(timer);
  timer = setTimeout(()=> location.href="index.html", TIMEOUT_LOGOUT);
}
["click","mousemove","touchstart","scroll"].forEach(ev=>{
  window.addEventListener(ev,resetTimer);
});
resetTimer();

/* Double clic retour écran info */

let lastClick = 0;
document.body.addEventListener("click",()=>{
  const now = Date.now();
  if(now - lastClick < 400){
    location.href="index.html";
  }
  lastClick = now;
});

loadWeek(currentYear,currentWeek);

</script>

</body>
</html>
