<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Planning Écurie</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Montserrat',sans-serif;
background:#0f1115;
color:white;
}

/* TITRE */

.titleblock{
text-align:center;
margin-top:10px;
}

h1{
margin:0;
font-size:26px;
}

#weekLabel{
margin-top:4px;
font-size:14px;
opacity:0.9;
font-weight:600;
}

/* BARRE HAUT */

.topbar{
display:grid;
grid-template-columns:auto 1fr auto;
align-items:center;
margin:10px 0;
padding:0 10px;
}

.topbar-left{
display:flex;
gap:8px;
}

.topbar-right{
display:flex;
justify-content:flex-end;
}

.topbar button{
background:#1c1f26;
color:white;
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

.topbar button:hover{
background:#2a2f38;
}

/* WRAPPER */

.wrapper{
overflow:auto;
padding:10px;
max-height:calc(100vh - 150px);
}

/* TABLE */

table{
border-collapse:collapse;
width:100%;
min-width:900px;
}

/* JOURS GELÉS */

th{
background:#1c1f26;
padding:12px;
border:1px solid #333;
position:sticky;
top:0;
z-index:4;
}

/* CELLULES */

td{
background:#1c1f26;
border:1px solid #333;
vertical-align:top;
padding:8px;
width:140px;
}

/* COLONNE CHEVAL FIXE */

.horse{
position:sticky;
left:0;
background:#181b21;
font-weight:700;
z-index:5;
box-shadow:8px 0 12px rgba(0,0,0,0.6);
white-space:nowrap;
width:1%;
padding-right:20px;
}

/* AUJOURD'HUI */

.today{
background:#2a2f38 !important;
}

/* PASSÉ */

.past{
opacity:0.35;
}

/* TACHES */

.task{
padding:4px 6px;
margin:4px 0;
border-radius:6px;
cursor:pointer;
font-size:13px;
}

.travail{ background:#fff3b0;color:#000;}
.paddock{ background:#b7e4c7;color:#000;}
.repos{ background:#cdb4db;color:#000;}
.proprio{ background:#cdb4db;color:#000;}
.longe{ background:#bde0fe;color:#000;}
.concours{ background:#ffb703;color:#000;}

.task.done{
background:#4caf50 !important;
color:white !important;
font-weight:600;
}

</style>
</head>

<body>

<div class="titleblock">
<h1>Planning Écurie</h1>
<div id="weekLabel"></div>
</div>

<div class="topbar">

<div class="topbar-left">
<button id="viewBtn" onclick="toggleView()">Vue jour</button>
<button onclick="changeWeek(-1)">←</button>
<button onclick="changeWeek(1)">→</button>
</div>

<div></div>

<div class="topbar-right">
<button onclick="goEcran()">FERMER</button>
</div>

</div>

<div class="wrapper">
<table id="planning"></table>
</div>

<script>

/* CONFIG */

const SHEET_PLANNING="10oblXf2vLsgXWJba-hkuUlpOquFEoDHKXNJ0L1Wk_DE";
const SHEET_VALIDATIONS="1YfrSDkB9E_SNA1ojqMuoUXBJt9vd_z40Kej3oyOXV7A";

const FORM_URL="https://docs.google.com/forms/d/e/1FAIpQLSdsG-ErANYpSvtqj3QsHNuXj5tjSiK-IZB-nP__aSMz6iHV8w/formResponse";

const ENTRY_WEEK="entry.915711839";
const ENTRY_HORSE="entry.1929695140";
const ENTRY_DAY="entry.301329581";
const ENTRY_TASK="entry.450632275";

const days=["lundi","mardi","mercredi","jeudi","vendredi","samedi","dimanche"];

/* VEILLE */

let inactivityTimer;

function resetTimer(){
clearTimeout(inactivityTimer);
inactivityTimer=setTimeout(()=>{location.href="ecran.html"},60000);
}

["click","touchstart","mousemove","keydown"].forEach(evt=>{
document.addEventListener(evt,resetTimer,true);
});

resetTimer();

function goEcran(){
location.href="ecran.html";
}

/* SEMAINE */

function getWeekNumber(){
const d=new Date();
d.setHours(0,0,0,0);
d.setDate(d.getDate()+3-(d.getDay()+6)%7);
const week1=new Date(d.getFullYear(),0,4);
return 1+Math.round(((d-week1)/86400000-3+(week1.getDay()+6)%7)/7);
}

let currentWeek=getWeekNumber();

let planningData=[];
let validations=[];
let viewMode="week";

/* JOUR ACTUEL */

const todayIndex=new Date().getDay();
const dayMap=[6,0,1,2,3,4,5];
const todayColumn=dayMap[todayIndex];

/* ICONES */

function taskIcon(text){

const t=text.toLowerCase();

if(t.includes("travail")) return {icon:"🐎 ",class:"travail"};
if(t.includes("paddock")) return {icon:"🌿 ",class:"paddock"};
if(t.includes("repos")) return {icon:"😴 ",class:"repos"};
if(t.includes("concours")) return {icon:"🏆 ",class:"concours"};
if(t.includes("propriétaire")) return {icon:"👤 ",class:"proprio"};
if(t.includes("longe")) return {icon:"🪢 ",class:"longe"};

return {icon:"",class:""};

}

/* VALIDATION */

function isValidated(cheval,jour,tache){

return validations.some(v=>
String(v.Semaine)==String(currentWeek)
&& v.Cheval.toLowerCase()==cheval.toLowerCase()
&& v.Jour.toLowerCase()==jour.toLowerCase()
&& v["Tâche"].toLowerCase()==tache.toLowerCase()
);

}

/* GOOGLE FORM */

function sendToForm(cheval,jour,tache){

const data=new FormData();

data.append(ENTRY_WEEK,currentWeek);
data.append(ENTRY_HORSE,cheval);
data.append(ENTRY_DAY,jour);
data.append(ENTRY_TASK,tache);

fetch(FORM_URL,{method:"POST",mode:"no-cors",body:data});

}

/* FORMAT TACHES */

function formatTasks(tasks,cheval,jour){

if(!tasks) return "";

const list=tasks.split("/");

return list.map(t=>{

const text=t.trim();
const iconData=taskIcon(text);
let done=isValidated(cheval,jour,text);

return `<div class="task ${iconData.class} ${done?"done":""}" data-cheval="${cheval}" data-jour="${jour}" data-task="${text}">
${done?"✔ ":""}${iconData.icon}${text}
</div>`;

}).join("");

}

/* TABLEAU */

function buildPlanning(){

let html="<tr>";

html+="<th class='horse'>Cheval</th>";

days.forEach((day,i)=>{

let cls="";

if(i < todayColumn) cls="past";
if(i === todayColumn) cls="today";

html+=`<th class="${cls}">${day.toUpperCase()}</th>`;

});

html+="</tr>";

planningData.forEach(row=>{

html+="<tr>";

html+=`<td class="horse">${row.cheval}</td>`;

days.forEach((day,i)=>{

let cls="";

if(i < todayColumn) cls="past";
if(i === todayColumn) cls="today";

html+=`<td class="${cls}">
${formatTasks(row[day],row.cheval,day)}
</td>`;

});

html+="</tr>";

});

document.getElementById("planning").innerHTML=html;

addTaskEvents();

}

/* VUE JOUR */

function buildDayView(){

const day=days[todayColumn];

let html="<tr>";

html+="<th class='horse'>Cheval</th>";
html+=`<th>${day.toUpperCase()}</th>`;
html+="</tr>";

planningData.forEach(row=>{

html+="<tr>";
html+=`<td class="horse">${row.cheval}</td>`;
html+=`<td>${formatTasks(row[day],row.cheval,day)}</td>`;
html+="</tr>";

});

document.getElementById("planning").innerHTML=html;

addTaskEvents();

}

/* CLIC TACHE */

function addTaskEvents(){

document.querySelectorAll(".task").forEach(el=>{

el.onclick=()=>{

const cheval=el.dataset.cheval;
const jour=el.dataset.jour;
const task=el.dataset.task;

if(!el.classList.contains("done")){

sendToForm(cheval,jour,task);

el.classList.add("done");

if(!el.innerHTML.startsWith("✔")){
el.innerHTML="✔ "+el.innerHTML;
}

}

};

});

}

/* NAV SEMAINE */

function changeWeek(delta){
currentWeek+=delta;
loadPlanning();
}

/* VUE */

function toggleView(){

const btn=document.getElementById("viewBtn");

if(viewMode==="week"){
viewMode="day";
btn.innerText="Vue semaine";
buildDayView();
}else{
viewMode="week";
btn.innerText="Vue jour";
buildPlanning();
}

}

/* DATES SEMAINE */

function getWeekDates(year,week){

const simple=new Date(year,0,1+(week-1)*7);
const dow=simple.getDay();

let ISOweekStart=new Date(simple);

if(dow<=4)
ISOweekStart.setDate(simple.getDate()-simple.getDay()+1);
else
ISOweekStart.setDate(simple.getDate()+8-simple.getDay());

const start=new Date(ISOweekStart);
const end=new Date(start);
end.setDate(start.getDate()+6);

return {start,end};

}

function formatDate(d){
return d.getDate()+"/"+(d.getMonth()+1)+"/"+String(d.getFullYear()).slice(2);
}

/* LOAD */

async function loadPlanning(){

let week=String(currentWeek).padStart(2,"0");
let year=new Date().getFullYear();

const dates=getWeekDates(year,currentWeek);
const start=formatDate(dates.start);
const end=formatDate(dates.end);

document.getElementById("weekLabel").innerText=
"Semaine "+week+" • "+year+" • "+start+" → "+end;

const planningURL=`https://opensheet.elk.sh/${SHEET_PLANNING}/semaine_${week}`;
const validationURL=`https://opensheet.elk.sh/${SHEET_VALIDATIONS}/1`;

const res1=await fetch(planningURL);
planningData=await res1.json();

const res2=await fetch(validationURL);
validations=await res2.json();

if(viewMode==="week"){
buildPlanning();
}else{
buildDayView();
}

}

loadPlanning();

/* REFRESH FULLY */

setInterval(()=>{
location.reload();
},180000);

</script>

</body>
</html>
