<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Planning Écurie</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Montserrat',sans-serif;
background:#0f1115;
color:white;
}

h1{
text-align:center;
margin:10px 0;
}

/* barre semaine */

.topbar{
display:flex;
justify-content:center;
align-items:center;
gap:12px;
margin-bottom:10px;
}

.topbar button{
background:#1c1f26;
color:white;
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

.topbar button:hover{
background:#2a2f38;
}

/* scroll horizontal */

.wrapper{
overflow-x:auto;
padding:10px;
}

/* tableau */

table{
border-collapse:collapse;
width:100%;
min-width:900px;
}

th{
background:#1c1f26;
color:white;
padding:12px;
font-size:14px;
border:1px solid #333;
}

td{
background:#1c1f26;
border:1px solid #333;
vertical-align:top;
padding:8px;
width:140px;
}

/* colonne cheval */

.horse{
position:sticky;
left:0;
background:#181b21;
font-weight:700;
z-index:3;
box-shadow:8px 0 12px rgba(0,0,0,0.6);

/* largeur automatique selon le texte */
white-space:nowrap;
width:1%;
padding-right:20px;
}

/* colonne jour */

.today{
background:#2a2f38 !important;
}

/* tâches */

.task{
padding:4px 6px;
margin:4px 0;
border-radius:6px;
cursor:pointer;
font-size:13px;
}

/* couleurs */

.travail{ background:#fff3b0;color:#000; }
.paddock{ background:#b7e4c7;color:#000; }
.repos{ background:#cdb4db;color:#000; }
.proprio{ background:#cdb4db;color:#000; }
.longe{ background:#bde0fe;color:#000; }
.concours{ background:#ffb703;color:#000; }

/* validation */

.task.done{
background:#4caf50 !important;
color:white !important;
font-weight:600;
}

</style>
</head>

<body>

<h1>Planning Écurie</h1>

<div class="topbar">

<button onclick="changeWeek(-1)">←</button>

<div id="weekLabel"></div>

<button onclick="changeWeek(1)">→</button>

<button id="viewBtn" onclick="toggleView()">Vue jour</button>

</div>

<div class="wrapper">
<table id="planning"></table>
</div>

<script>

/* CONFIG SHEET */

const SHEET_ID="10oblXf2vLsgXWJba-hkuUlpOquFEoDHKXNJ0L1Wk_DE";

/* jours */

const days=[
"lundi",
"mardi",
"mercredi",
"jeudi",
"vendredi",
"samedi",
"dimanche"
];

/* semaine actuelle */

function getWeekNumber(){

const d=new Date();

d.setHours(0,0,0,0);

d.setDate(d.getDate()+3-(d.getDay()+6)%7);

const week1=new Date(d.getFullYear(),0,4);

return 1+Math.round(((d-week1)/86400000-3+(week1.getDay()+6)%7)/7);

}

let currentWeek=getWeekNumber();

let planningData=[];

let viewMode="week";

/* jour actuel */

const todayIndex=new Date().getDay();
const dayMap=[6,0,1,2,3,4,5];
const todayColumn=dayMap[todayIndex];

/* icones */

function taskIcon(text){

const t=text.toLowerCase();

if(t.includes("travail")) return {icon:"🐎 ",class:"travail"};
if(t.includes("paddock")) return {icon:"🌿 ",class:"paddock"};
if(t.includes("repos")) return {icon:"😴 ",class:"repos"};
if(t.includes("concours")) return {icon:"🏆 ",class:"concours"};
if(t.includes("propriétaire")) return {icon:"👤 ",class:"proprio"};
if(t.includes("longe")) return {icon:"🪢 ",class:"longe"};

return {icon:"",class:""};

}

/* format tâches */

function formatTasks(tasks){

if(!tasks) return "";

const list=tasks.split("/");

return list.map(t=>{

const text=t.trim();

const iconData=taskIcon(text);

return `<div class="task ${iconData.class}">
${iconData.icon}${text}
</div>`;

}).join("");

}

/* tableau semaine */

function buildPlanning(){

let html="<tr>";

html+="<th class='horse'>Cheval</th>";

days.forEach((d,i)=>{

let cls=i===todayColumn?"today":"";

html+=`<th class="${cls}">${d.toUpperCase()}</th>`;

});

html+="</tr>";

planningData.forEach(row=>{

html+="<tr>";

html+=`<td class="horse">${row.cheval}</td>`;

days.forEach((day,i)=>{

let cls=i===todayColumn?"today":"";

html+=`<td class="${cls}">
${formatTasks(row[day])}
</td>`;

});

html+="</tr>";

});

document.getElementById("planning").innerHTML=html;

addTaskEvents();

}

/* vue jour */

function buildDayView(){

const day=days[todayColumn];

let html="<tr>";

html+="<th class='horse'>Cheval</th>";
html+=`<th>${day.toUpperCase()}</th>`;

html+="</tr>";

planningData.forEach(row=>{

html+="<tr>";

html+=`<td class="horse">${row.cheval}</td>`;

html+=`<td>${formatTasks(row[day])}</td>`;

html+="</tr>";

});

document.getElementById("planning").innerHTML=html;

addTaskEvents();

}

/* validation tâche */

function addTaskEvents(){

document.querySelectorAll(".task").forEach(el=>{

el.onclick=()=>{

el.classList.toggle("done");

if(el.classList.contains("done")){

if(!el.innerHTML.startsWith("✔")){
el.innerHTML="✔ "+el.innerHTML;
}

}else{

el.innerHTML=el.innerHTML.replace("✔ ","");

}

};

});

}

/* navigation semaine */

function changeWeek(delta){

currentWeek+=delta;

loadPlanning();

}

/* toggle vue */

function toggleView(){

const btn=document.getElementById("viewBtn");

if(viewMode==="week"){

viewMode="day";
btn.innerText="Vue semaine";
buildDayView();

}else{

viewMode="week";
btn.innerText="Vue jour";
buildPlanning();

}

}

/* load sheet */

async function loadPlanning(){

let week=String(currentWeek).padStart(2,"0");

document.getElementById("weekLabel").innerText=
"Semaine "+week;

const url=
`https://opensheet.elk.sh/${SHEET_ID}/semaine_${week}`;

const res=await fetch(url);

planningData=await res.json();

if(viewMode==="week"){
buildPlanning();
}else{
buildDayView();
}

}

loadPlanning();

</script>

</body>
</html>
