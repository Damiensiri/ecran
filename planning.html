<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Planning Écurie</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Montserrat',sans-serif;
background:#f4f4f4;
}

h1{
text-align:center;
margin:15px 0;
}

.wrapper{
overflow-x:auto;
padding:10px;
}

table{
border-collapse:collapse;
width:100%;
min-width:900px;
}

th{
background:#181E3B;
color:white;
padding:10px;
font-size:14px;
}

td{
background:white;
border:1px solid #ddd;
vertical-align:top;
padding:8px;
width:120px;
}

.horse{
font-weight:700;
background:#fafafa;
}

.task{
padding:3px 4px;
margin:2px 0;
border-radius:4px;
cursor:pointer;
}

.task.done{
text-decoration:line-through;
opacity:0.5;
}

</style>
</head>

<body>

<h1>Planning Chevaux</h1>

<div class="wrapper">
<table id="planning"></table>
</div>

<script>

/* ===== DONNÉES MAQUETTE ===== */

const planningData = [

{
cheval:"Java",
lundi:"Travail / Maison 08:00-09:00 / Paddock",
mardi:"Repos",
mercredi:"Travail",
jeudi:"Paddock",
vendredi:"Propriétaire",
samedi:"Concours",
dimanche:"Repos"
},

{
cheval:"Oslo",
lundi:"Longe",
mardi:"Paddock",
mercredi:"Travail",
jeudi:"Travail",
vendredi:"Repos",
samedi:"Concours",
dimanche:"Paddock"
},

{
cheval:"Iris",
lundi:"Repos",
mardi:"Travail",
mercredi:"Paddock",
jeudi:"Travail",
vendredi:"Travail",
samedi:"Propriétaire",
dimanche:"Repos"
},

{
cheval:"Salsa",
lundi:"Travail",
mardi:"Travail",
mercredi:"Paddock",
jeudi:"Repos",
vendredi:"Paddock",
samedi:"Concours",
dimanche:"Repos"
}

];

const days=[
"lundi",
"mardi",
"mercredi",
"jeudi",
"vendredi",
"samedi",
"dimanche"
];

/* ===== ICONES ===== */

function taskIcon(text){

const t=text.toLowerCase();

if(t.includes("travail")) return "🐎 "+text;
if(t.includes("paddock")) return "🌿 "+text;
if(t.includes("repos")) return "😴 "+text;
if(t.includes("concours")) return "🏆 "+text;
if(t.includes("propriétaire")) return "👤 "+text;
if(t.includes("longe")) return "🪢 "+text;

return text;

}

/* ===== CRÉATION TABLEAU ===== */

function buildPlanning(){

let html="<tr>";
html+="<th>Cheval</th>";

days.forEach(d=>{
html+=`<th>${d.toUpperCase()}</th>`;
});

html+="</tr>";

planningData.forEach(row=>{

html+="<tr>";

html+=`<td class="horse">${row.cheval}</td>`;

days.forEach(day=>{

html+=`<td>${formatTasks(row[day])}</td>`;

});

html+="</tr>";

});

document.getElementById("planning").innerHTML=html;

addTaskEvents();

}

/* ===== FORMAT TACHES ===== */

function formatTasks(tasks){

if(!tasks) return "";

const list=tasks.split("/");

return list.map(t=>{

const text=taskIcon(t.trim());

return `<div class="task">${text}</div>`;

}).join("");

}

/* ===== CLIC VALIDATION ===== */

function addTaskEvents(){

document.querySelectorAll(".task").forEach(el=>{

el.onclick=()=>{
el.classList.toggle("done");
};

});

}

buildPlanning();

</script>

</body>
</html>
