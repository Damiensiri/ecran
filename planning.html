<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Planning Ecurie</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
--bg:#101215;
--panel:#181b20;
--panel2:#20242b;
--line:#303641;
--text:#f5f7fb;
--muted:#aab3c2;
--accent:#72d39f;
--accent2:#ffd166;
--danger:#ff7b7b;
--blue:#8ecae6;
--violet:#cdb4db;
--shadow:0 14px 34px rgba(0,0,0,0.34);
}

*{box-sizing:border-box}

body{
margin:0;
font-family:'Montserrat',sans-serif;
background:
radial-gradient(circle at top left,rgba(114,211,159,0.12),transparent 32rem),
linear-gradient(135deg,#101215 0%,#151920 55%,#111317 100%);
color:var(--text);
min-height:100vh;
}

button{
font:inherit;
color:inherit;
border:0;
cursor:pointer;
touch-action:manipulation;
}

.app{
height:100vh;
display:grid;
grid-template-rows:auto auto 1fr;
gap:12px;
padding:14px;
overflow:hidden;
}

.header{
display:grid;
grid-template-columns:1fr auto;
gap:14px;
align-items:center;
}

.titleblock h1{
margin:0;
font-size:clamp(24px,3.4vw,38px);
font-weight:800;
letter-spacing:0;
line-height:1.05;
}

.subtitle{
display:flex;
flex-wrap:wrap;
gap:8px 14px;
align-items:center;
margin-top:8px;
color:var(--muted);
font-size:13px;
font-weight:600;
}

.clock{
font-size:42px;
font-weight:800;
line-height:1;
font-variant-numeric:tabular-nums;
}

.statusdot{
width:9px;
height:9px;
border-radius:50%;
display:inline-block;
background:var(--accent);
box-shadow:0 0 0 5px rgba(114,211,159,0.12);
}

.headerActions{
display:flex;
justify-content:flex-end;
gap:8px;
}

.iconBtn,.modeBtn,.primaryBtn{
min-height:44px;
border-radius:8px;
background:var(--panel2);
border:1px solid var(--line);
display:inline-flex;
align-items:center;
justify-content:center;
gap:8px;
padding:0 13px;
font-weight:800;
box-shadow:0 8px 18px rgba(0,0,0,0.18);
}

.iconBtn{
width:48px;
padding:0;
font-size:22px;
}

.primaryBtn{
background:linear-gradient(135deg,#2f9e6f,#287d7a);
border-color:rgba(255,255,255,0.1);
}

.toolbar{
display:grid;
grid-template-columns:auto 1fr auto;
gap:12px;
align-items:center;
}

.weekline,.segmented{
display:flex;
align-items:center;
gap:8px;
}

.weekLabel{
min-width:150px;
text-align:center;
font-size:15px;
font-weight:800;
color:var(--text);
}

.segmented{
justify-content:center;
background:rgba(255,255,255,0.04);
border:1px solid var(--line);
border-radius:10px;
padding:4px;
}

.modeBtn{
box-shadow:none;
background:transparent;
border-color:transparent;
min-width:126px;
}

.modeBtn.active{
background:var(--panel2);
border-color:var(--line);
}

.dashboard{
min-height:0;
display:grid;
grid-template-columns:1fr;
gap:12px;
}

.dashboard.weekMode .cards{
display:none;
}

.main{
min-width:0;
display:grid;
grid-template-rows:auto 1fr;
gap:12px;
min-height:0;
}

.cards{
display:grid;
grid-template-columns:repeat(4,minmax(0,1fr));
gap:10px;
}

.stat{
--stat-progress:0%;
--stat-progress-color:rgba(245,165,36,0.22);
position:relative;
overflow:hidden;
background:rgba(24,27,32,0.92);
border:1px solid var(--line);
border-radius:8px;
padding:12px;
min-height:86px;
box-shadow:var(--shadow);
transition:border-color .55s ease,box-shadow .55s ease;
}

.stat::before{
content:"";
position:absolute;
inset:0;
width:var(--stat-progress);
background:linear-gradient(90deg,var(--stat-progress-color),rgba(255,255,255,0.05));
transition:width .8s cubic-bezier(.22,.8,.24,1),background-color .55s ease;
pointer-events:none;
}

.stat > *{
position:relative;
z-index:1;
}

.stat.progressing{
border-color:rgba(245,165,36,0.58);
box-shadow:inset 4px 0 0 #f5a524,var(--shadow);
}

.stat.complete{
border-color:rgba(114,211,159,0.72);
box-shadow:inset 4px 0 0 #4caf50,var(--shadow);
}

.statLabel{
color:var(--muted);
font-size:12px;
font-weight:800;
text-transform:uppercase;
}

.statValue{
font-size:30px;
font-weight:800;
margin-top:8px;
font-variant-numeric:tabular-nums;
}

.statNote{
font-size:12px;
color:var(--muted);
margin-top:3px;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.panel{
background:rgba(24,27,32,0.92);
border:1px solid var(--line);
border-radius:8px;
box-shadow:var(--shadow);
min-height:0;
overflow:hidden;
}

.panelHead{
height:46px;
display:flex;
align-items:center;
justify-content:space-between;
gap:12px;
padding:0 12px;
border-bottom:1px solid var(--line);
}

.panelTitle{
font-size:14px;
font-weight:800;
text-transform:uppercase;
}

.panelMeta{
font-size:12px;
font-weight:700;
color:var(--muted);
}

.tableWrap{
height:100%;
overflow:auto;
}

#planningSurface{
height:100%;
min-height:0;
}

table{
border-collapse:separate;
border-spacing:0;
width:100%;
min-width:900px;
}

th{
background:#20242b;
padding:12px 10px;
border-right:1px solid var(--line);
border-bottom:1px solid var(--line);
position:sticky;
top:0;
z-index:4;
font-size:12px;
text-transform:uppercase;
}

td{
background:#181b20;
border-right:1px solid var(--line);
border-bottom:1px solid var(--line);
vertical-align:top;
padding:8px;
width:140px;
min-height:72px;
}

.horse{
position:sticky;
left:0;
background:#15181d;
font-weight:800;
z-index:5;
box-shadow:8px 0 14px rgba(0,0,0,0.45);
white-space:nowrap;
width:1%;
min-width:128px;
max-width:178px;
}

.today{
background:#26313a !important;
box-shadow:inset 0 3px 0 var(--accent);
}

.past{
opacity:0.36;
}

.task{
padding:8px 9px;
margin:5px 0;
border-radius:7px;
font-size:12px;
line-height:1.2;
font-weight:800;
color:#0b0d0f;
min-height:34px;
display:flex;
align-items:center;
gap:5px;
outline:2px solid #f5a524;
outline-offset:0;
transition:outline-color .35s ease,box-shadow .35s ease,transform .2s ease;
}

.travail{background:#fff3b0;}
.paddock{background:#cfe7ff;}
.repos{background:#d7c5e3;}
.proprio{background:#d7c5e3;}
.longe{background:#bde0fe;}
.concours{background:#ffb703;}

.task.done{
outline:3px solid #4caf50;
box-shadow:inset 0 0 0 2px rgba(255,255,255,0.55);
}

.horseLine{
--progress:0%;
--progress-color:rgba(245,165,36,0.22);
position:relative;
overflow:hidden;
border:1px solid var(--line);
background:#20242b;
border-radius:8px;
padding:10px;
margin-bottom:8px;
transition:border-color .55s ease,box-shadow .55s ease;
animation:none !important;
-webkit-animation:none !important;
}

.horseLine::before{
content:"";
position:absolute;
inset:0;
width:var(--progress);
background:linear-gradient(90deg,var(--progress-color),rgba(255,255,255,0.06));
opacity:1;
transition:width .8s cubic-bezier(.22,.8,.24,1),background-color .55s ease;
pointer-events:none;
animation:none !important;
-webkit-animation:none !important;
}

.horseLine::after{
display:none;
content:none;
animation:none !important;
-webkit-animation:none !important;
}

.horseLine > *{
position:relative;
z-index:1;
}

.horseLine.inProgress{
border-color:rgba(245,165,36,0.58);
box-shadow:inset 4px 0 0 #f5a524;
}

.horseLine.completed{
--progress:100%;
--progress-color:rgba(76,175,80,0.25);
border-color:rgba(114,211,159,0.72);
box-shadow:inset 4px 0 0 #4caf50;
}

.horseLine.inProgress .badge{
background:#f5a524;
color:#111;
}

.horseLine.completed .badge{
background:#4caf50;
color:white;
}

.horseLineTop{
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
font-size:13px;
font-weight:800;
}

.horseName{
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.badge{
border-radius:999px;
padding:4px 8px;
font-size:11px;
font-weight:800;
background:rgba(255,255,255,0.08);
color:var(--muted);
white-space:nowrap;
}

.miniTasks{
display:flex;
flex-wrap:wrap;
gap:5px;
margin-top:8px;
}

.mini{
font-size:11px;
font-weight:800;
border-radius:999px;
padding:5px 7px;
color:#111;
background:#e8eef5;
max-width:100%;
overflow:hidden;
text-overflow:ellipsis;
white-space:nowrap;
}

.horseLine .task{
display:inline-flex;
width:auto;
max-width:100%;
min-height:32px;
margin:0;
padding:7px 9px;
}

.empty{
height:100%;
min-height:90px;
display:grid;
place-items:center;
text-align:center;
color:var(--muted);
font-weight:700;
font-size:13px;
padding:18px;
}

.loading{
height:100%;
display:grid;
place-items:center;
color:var(--muted);
font-weight:800;
}

.hidden{display:none !important}

.dayBoard{
height:100%;
display:grid;
grid-template-columns:minmax(360px,0.95fr) minmax(0,1.05fr);
gap:12px;
padding:12px;
min-height:0;
}

.dayTasks{
min-height:0;
overflow:auto;
border-right:1px solid var(--line);
padding:0 12px 84px 0;
scroll-padding-bottom:84px;
}

.dayTaskCard{
border:1px solid var(--line);
background:#20242b;
border-radius:8px;
padding:10px;
margin-bottom:8px;
}

.paddockBoard{
min-height:0;
overflow:auto;
display:grid;
grid-template-columns:repeat(3,minmax(0,1fr));
gap:8px;
}

.paddockColumn{
min-width:0;
border:1px solid var(--line);
border-radius:8px;
background:#141820;
overflow:hidden;
display:flex;
flex-direction:column;
min-height:0;
}

.paddockTop{
min-height:44px;
display:flex;
align-items:center;
justify-content:space-between;
gap:8px;
padding:8px;
background:#20242b;
border-bottom:1px solid var(--line);
}

.paddockTitle{
font-weight:800;
font-size:13px;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.paddockHours{
font-size:11px;
font-weight:800;
color:var(--muted);
white-space:nowrap;
}

.slotList{
padding:6px;
overflow:auto;
min-height:0;
}

.slotCard{
display:grid;
grid-template-columns:42px minmax(0,1fr) 30px;
align-items:center;
gap:6px;
min-height:42px;
margin-bottom:5px;
padding:6px;
border:1px solid var(--line);
border-radius:8px;
background:#20242b;
}

.slotCard.free{
opacity:0.68;
background:#171b21;
}

.slotCard.blocked{
background:rgba(255,123,123,0.13);
border-color:rgba(255,123,123,0.36);
}

.slotCard.booked{
background:rgba(114,211,159,0.12);
border-color:rgba(114,211,159,0.34);
}

.slotTime{
font-size:11px;
font-weight:800;
color:var(--muted);
font-variant-numeric:tabular-nums;
}

.slotTitle{
font-size:12px;
font-weight:800;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.slotMeta{
font-size:11px;
font-weight:700;
color:var(--muted);
margin-top:2px;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.cancelBtn{
width:28px;
height:28px;
min-height:28px;
padding:0;
border-radius:8px;
background:rgba(255,123,123,0.15);
border:1px solid rgba(255,123,123,0.42);
font-size:15px;
box-shadow:none;
}

.weekTable table{
height:100%;
}

@media (max-width:980px){
.app{padding:10px;gap:10px}
.header{grid-template-columns:1fr}
.headerActions{justify-content:stretch}
.headerActions button{flex:1}
.toolbar{grid-template-columns:1fr;gap:8px}
.weekline{justify-content:center}
.dashboard{grid-template-columns:1fr;grid-template-rows:auto 1fr}
.cards{grid-template-columns:repeat(2,minmax(0,1fr))}
.clock{font-size:34px}
.dayBoard{grid-template-columns:1fr;grid-template-rows:220px 1fr}
.dayTasks{border-right:0;border-bottom:1px solid var(--line);padding-right:0;padding-bottom:10px}
}

@media (max-width:720px){
.cards{grid-template-columns:repeat(2,minmax(0,1fr))}
.modeBtn{min-width:0;flex:1}
.paddockBoard{grid-template-columns:1fr}
}
</style>
</head>

<body>
<div class="app">

<header class="header">
<div class="titleblock">
<h1>Planning Ecurie</h1>
<div class="subtitle">
<span><span class="statusdot"></span> Donnees en direct</span>
<span id="dateLabel"></span>
<span id="returnLabel">Retour ecran info apres 60 s</span>
</div>
</div>
<div class="headerActions">
<div class="clock" id="clock">--:--</div>
<button class="primaryBtn" onclick="goEcran()">Fermer</button>
</div>
</header>

<section class="toolbar">
<div class="weekline">
<button class="iconBtn" onclick="changeWeek(-1)" title="Semaine precedente">‹</button>
<div class="weekLabel" id="weekLabel"></div>
<button class="iconBtn" onclick="changeWeek(1)" title="Semaine suivante">›</button>
</div>

<div class="segmented">
<button id="weekBtn" class="modeBtn" onclick="setView('week')">Semaine</button>
<button id="dayBtn" class="modeBtn active" onclick="setView('day')">Aujourd'hui</button>
<button id="paddockBtn" class="modeBtn" onclick="setView('paddock')">Paddocks</button>
</div>

<button class="iconBtn" onclick="loadPlanning()" title="Actualiser">↻</button>
</section>

<section class="dashboard">
<main class="main">
<div class="cards">
<div class="stat">
<div class="statLabel">Chevaux</div>
<div class="statValue" id="horseCount">--</div>
<div class="statNote">au planning</div>
</div>
<div class="stat">
<div class="statLabel">Aujourd'hui</div>
<div class="statValue" id="todayTaskCount">--</div>
<div class="statNote" id="todayName">taches prevues</div>
</div>
<div class="stat">
<div class="statLabel">Paddocks</div>
<div class="statValue" id="paddockCount">--</div>
<div class="statNote">sorties du jour</div>
</div>
<div class="stat" id="doneStat">
<div class="statLabel">Validees</div>
<div class="statValue" id="doneCount">--</div>
<div class="statNote" id="doneNote">cochees</div>
</div>
</div>

<section class="panel">
<div class="panelHead">
<div class="panelTitle" id="planningTitle">Planning semaine</div>
<div class="panelMeta" id="planningMeta"></div>
</div>
<div class="tableWrap">
<div id="planningSurface">
<div class="loading">Chargement du planning...</div>
</div>
</div>
</section>
</main>
</section>

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
const SHEET_PLANNING="10oblXf2vLsgXWJba-hkuUlpOquFEoDHKXNJ0L1Wk_DE";
const SHEET_VALIDATIONS="1YfrSDkB9E_SNA1ojqMuoUXBJt9vd_z40Kej3oyOXV7A";

const ENTRY_WEEK="entry.915711839";

const days=["lundi","mardi","mercredi","jeudi","vendredi","samedi","dimanche"];
const dayLabels=["Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi","Dimanche"];
const firebaseConfig={
apiKey:"AIzaSyBn6Hgu-xvsWqpwJ-i4lZyI0QjKMBvOeXA",

let horaires={
maison:{
lundi:{closed:false,open:"08:00",close:"21:00"},

let inactivityTimer;
let countdownTimer;
let secondsLeft=60;

function resetTimer(){
clearTimeout(inactivityTimer);
secondsLeft=60;
updateReturnLabel();
inactivityTimer=setTimeout(()=>{location.href="ecran.html";},60000);
}

["click","touchstart","mousemove","keydown","scroll"].forEach(evt=>{
document.addEventListener(evt,resetTimer,true);
});

function updateReturnLabel(){
document.getElementById("returnLabel").innerText=`Retour ecran info apres ${secondsLeft} s`;
}

countdownTimer=setInterval(()=>{
secondsLeft=Math.max(0,secondsLeft-1);
updateReturnLabel();
},1000);

resetTimer();

function goEcran(){location.href="ecran.html";}

function getWeekNumber(){
const d=new Date();
d.setHours(0,0,0,0);
d.setDate(d.getDate()+3-(d.getDay()+6)%7);
const week1=new Date(d.getFullYear(),0,4);
return 1+Math.round(((d-week1)/86400000-3+(week1.getDay()+6)%7)/7);
}

let currentWeek=getWeekNumber();
let planningData=[];
let validations=[];
let localValidations=[];
let reservations=[];
let blocages=[];
let db=null;
let viewMode="day";

const todayIndex=new Date().getDay();
const dayMap=[6,0,1,2,3,4,5];
const todayColumn=dayMap[todayIndex];

function updateClock(){
const now=new Date();
document.getElementById("clock").innerText=now.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});
document.getElementById("dateLabel").innerText=now.toLocaleDateString("fr-FR",{weekday:"long",day:"2-digit",month:"long"});
}

updateClock();
setInterval(updateClock,15000);

function taskIcon(text){
const t=text.toLowerCase();
if(t.includes("travail")) return {icon:"🐎",class:"travail"};
if(t.includes("paddock")) return {icon:"🌿",class:"paddock"};
if(t.includes("repos")) return {icon:"😴",class:"repos"};
if(t.includes("concours")) return {icon:"🏆",class:"concours"};
if(t.includes("propriétaire")) return {icon:"👤",class:"proprio"};
if(t.includes("proprietaire")) return {icon:"👤",class:"proprio"};
if(t.includes("longe")) return {icon:"🪢",class:"longe"};
return {icon:"",class:""};
}

function splitTasks(tasks){
if(!tasks) return [];
return String(tasks).split("/").map(t=>t.trim()).filter(Boolean);
}

function isRestTask(task){
return String(task || "").trim().toLowerCase()==="repos";
}

function visibleTasks(tasks){
return tasks.filter(task=>!isRestTask(task));
}

function normalizeText(value){
return String(value || "")
.normalize("NFD")
.replace(/[\u0300-\u036f]/g,"")
.replace(/\s+/g," ")
.trim()
.toLowerCase();
}

function validationMatches(v,cheval,jour,tache){
return normalizeText(v.Semaine)===normalizeText(currentWeek)
&& normalizeText(v.Cheval)===normalizeText(cheval)
&& normalizeText(v.Jour)===normalizeText(jour)
&& normalizeText(v["Tâche"] || v["Tache"])===normalizeText(tache);
}

function escapeHTML(value){
return String(value).replace(/[&<>"']/g,char=>({
"&":"&amp;",
"<":"&lt;",
">":"&gt;",
"\"":"&quot;",
"'":"&#39;"
}[char]));
}

function toIsoDate(date){
return date.getFullYear()+"-"+String(date.getMonth()+1).padStart(2,"0")+"-"+String(date.getDate()).padStart(2,"0");
}

function parseIsoDate(value){
const parts=String(value).split("-").map(Number);
return new Date(parts[0],parts[1]-1,parts[2]);
}

function dayName(value){
return firestoreDays[parseIsoDate(value).getDay()];
}

function minutes(time){
if(!time || !String(time).includes(":")) return 0;
const parts=String(time).split(":").map(Number);
return parts[0]*60+parts[1];
}

function timeFromMinutes(value){
const h=Math.floor(value/60);
const m=value%60;
return String(h).padStart(2,"0")+":"+String(m).padStart(2,"0");
}

function formatTimeRange(item){
const start=minutes(item.time);
const end=start+Number(item.duration || 60);
return `${timeFromMinutes(start)} - ${timeFromMinutes(end)}`;
}

function paddockLabel(id){
return paddockDefs.find(paddock=>paddock.id===id)?.label || id;
}

function todayIso(){
return toIsoDate(new Date());
}

function normalizeReservation(doc){
const data=doc.data();
return {
id:doc.id,
name:data.name || "",
email:data.email || "",
paddock:data.paddock || "",
date:data.date || "",
time:data.time || "",
duration:Number(data.duration || 60),
type:data.type || data.reservationType || ""
};
}

function getPaddockSlots(date){
const name=dayName(date);
const slotSet=new Set();
paddockDefs.forEach(paddock=>{
const config=horaires[paddock.id]?.[name];
if(!config || config.closed) return;
for(let t=minutes(config.open);t<minutes(config.close);t+=60){
slotSet.add(timeFromMinutes(t));
}
});
return [...slotSet].sort((a,b)=>minutes(a)-minutes(b));
}

function paddockItemAt(date,paddock,time){
return reservations.find(item=>item.date===date && item.paddock===paddock && item.time===time)
|| blocages.find(item=>item.date===date && item.paddock===paddock && item.time===time);
}

function isCoveredByBlockage(date,paddock,time){
const slotStart=minutes(time);
return blocages.some(item=>{
if(item.date!==date || item.paddock!==paddock || item.time===time) return false;
const blockStart=minutes(item.time);
const blockEnd=blockStart+Number(item.duration || 60);
return slotStart>blockStart && slotStart<blockEnd;
});
}

function isValidated(cheval,jour,tache){
return validations.some(v=>validationMatches(v,cheval,jour,tache))
|| localValidations.some(v=>validationMatches(v,cheval,jour,tache));
}

function sendToForm(cheval,jour,tache){
const data=new FormData();
data.append(ENTRY_WEEK,currentWeek);
data.append(ENTRY_HORSE,cheval);
data.append(ENTRY_DAY,jour);
data.append(ENTRY_TASK,tache);
localValidations.push({Semaine:String(currentWeek),Cheval:cheval,Jour:jour,"Tâche":tache});
return fetch(FORM_URL,{method:"POST",mode:"no-cors",body:data});
}

function formatTasks(tasks,cheval,jour){
const list=splitTasks(tasks);
if(!list.length) return "";
return list.map(text=>{
const iconData=taskIcon(text);
const done=isValidated(cheval,jour,text);
return `<button class="task ${iconData.class} ${done?"done":""}" data-cheval="${escapeHTML(cheval)}" data-jour="${escapeHTML(jour)}" data-task="${escapeHTML(text)}">
<span>${done?"✔":iconData.icon}</span><span>${escapeHTML(text)}</span>
</button>`;
}).join("");
}

function buildPlanning(){
let html="<tr><th class='horse'>Cheval</th>";
days.forEach((day,i)=>{
let cls="";
if(i < todayColumn) cls="past";
if(i === todayColumn) cls="today";
html+=`<th class="${cls}">${dayLabels[i]}</th>`;
});
html+="</tr>";

planningData.forEach(row=>{
html+="<tr>";
html+=`<td class="horse">${escapeHTML(row.cheval)}</td>`;
days.forEach((day,i)=>{
let cls="";
if(i < todayColumn) cls="past";
if(i === todayColumn) cls="today";
html+=`<td class="${cls}">${formatTasks(row[day],row.cheval,day)}</td>`;
});
html+="</tr>";
});

document.getElementById("planningSurface").innerHTML=`<div class="weekTable"><table>${html}</table></div>`;
document.getElementById("planningTitle").innerText="Planning semaine";
document.getElementById("planningMeta").innerText=`${planningData.length} chevaux`;
addTaskEvents();
}

function buildDayView(){
const day=days[todayColumn];
const todayRows=visibleRowsForDay(day);
const taskHtml=todayRows.length ? todayRows.map(renderLine).join("") : "<div class='empty'>Rien de prevu aujourd'hui.</div>";
document.getElementById("planningSurface").innerHTML=`
<div class="dayBoard">
<section class="dayTasks">${taskHtml}</section>
${renderPaddockBoard(todayIso())}
</div>`;
document.getElementById("planningTitle").innerText="Planning du jour";
document.getElementById("planningMeta").innerText=`${dayLabels[todayColumn]} - paddocks en direct`;
addTaskEvents();
addCancelEvents();
}

function buildPaddockView(){
document.getElementById("planningSurface").innerHTML=`<div class="dayBoard" style="grid-template-columns:1fr">${renderPaddockBoard(todayIso())}</div>`;
document.getElementById("planningTitle").innerText="Vue paddocks";
document.getElementById("planningMeta").innerText="reservations Firebase aujourd'hui";
addCancelEvents();
}

function renderPaddockBoard(date){
const slots=getPaddockSlots(date);
const currentDay=dayName(date);
const columns=paddockDefs.map(paddock=>{
const config=horaires[paddock.id]?.[currentDay];
const hours=config?.closed ? "Ferme" : `${config?.open || "--:--"} - ${config?.close || "--:--"}`;
const rows=slots.map(time=>renderPaddockSlot(date,paddock,config,time)).join("");
return `<article class="paddockColumn">
<div class="paddockTop"><div class="paddockTitle">${escapeHTML(paddock.label)}</div><div class="paddockHours">${escapeHTML(hours)}</div></div>
<div class="slotList">${rows || "<div class='empty'>Aucun creneau visible</div>"}</div>
</article>`;
}).join("");
return `<section class="paddockBoard">${columns}</section>`;
}

function renderPaddockSlot(date,paddock,config,time){
if(isCoveredByBlockage(date,paddock.id,time)) return "";
if(!config || config.closed || minutes(time)<minutes(config.open) || minutes(time)>=minutes(config.close)){
return `<div class="slotCard free"><div class="slotTime">${time}</div><div><div class="slotTitle">Ferme</div></div><div></div></div>`;
}
const item=paddockItemAt(date,paddock.id,time);
if(!item){
return `<div class="slotCard free"><div class="slotTime">${time}</div><div><div class="slotTitle">Libre</div><div class="slotMeta">Creneau disponible</div></div><div></div></div>`;
}
const isBlock=String(item.name).toLowerCase().startsWith("blocage");
const meta=isBlock ? formatTimeRange(item) : `${item.duration} min${item.type ? " - "+item.type : ""}`;
const cancel=isBlock ? "" : `<button class="cancelBtn" data-cancel-reservation="${escapeHTML(item.id)}" title="Annuler la reservation">❌</button>`;
return `<div class="slotCard ${isBlock ? "blocked" : "booked"}">
<div class="slotTime">${escapeHTML(time)}</div>
<div><div class="slotTitle">${escapeHTML(item.name)}</div><div class="slotMeta">${escapeHTML(meta)}</div></div>
<div>${cancel}</div>
</div>`;
}

function addTaskEvents(){
document.querySelectorAll(".task").forEach(el=>{
el.onclick=()=>{
const cheval=el.dataset.cheval;
const jour=el.dataset.jour;
const task=el.dataset.task;
if(!el.classList.contains("done")){
sendToForm(cheval,jour,task);
el.classList.add("done");
const first=el.querySelector("span");
if(first) first.innerText="✔";
updateHorseLineState(el.closest(".horseLine"));
updateStats();
}
};
});
}

function updateHorseLineState(line){
if(!line) return;
const tasks=[...line.querySelectorAll(".task")];
if(!tasks.length) return;
const done=tasks.filter(task=>task.classList.contains("done")).length;
const progress=Math.round(done*100/tasks.length);
line.style.setProperty("--progress",`${progress}%`);
line.style.setProperty("--progress-value",progress);
line.style.setProperty("--progress-color",progress===100 ? "rgba(76,175,80,0.25)" : "rgba(245,165,36,0.22)");
line.classList.toggle("inProgress",done>0 && done<tasks.length);
line.classList.toggle("completed",done===tasks.length);
const badge=line.querySelector(".badge");
if(badge) badge.innerText=`${done}/${tasks.length}`;
}

function taskCountForDay(day){
return planningData.reduce((total,row)=>total+visibleTasks(splitTasks(row[day])).length,0);
}

function visibleRowsForDay(day){
return planningData.map(row=>{
const tasks=visibleTasks(splitTasks(row[day]));
return {cheval:row.cheval,tasks};
}).filter(item=>item.tasks.length);
}

function horseCountForDay(day){
return visibleRowsForDay(day).length;
}

function paddockCountForDay(day){
return planningData.reduce((total,row)=>total+splitTasks(row[day]).filter(t=>t.toLowerCase().includes("paddock")).length,0);
}

function doneCountForDay(day){
return planningData.reduce((total,row)=>{
return total+visibleTasks(splitTasks(row[day])).filter(t=>isValidated(row.cheval,day,t)).length;
},0);
}

function dayProgress(day){
const rows=visibleRowsForDay(day);
const total=rows.reduce((sum,row)=>sum+row.tasks.length,0);
const done=rows.reduce((sum,row)=>sum+row.tasks.filter(t=>isValidated(row.cheval,day,t)).length,0);
const percent=total ? Math.round(done*100/total) : 0;
return {done,total,percent};
}

function renderLine(item){
const done=item.tasks.filter(t=>isValidated(item.cheval,days[todayColumn],t)).length;
const completed=item.tasks.length>0 && done===item.tasks.length;
const inProgress=done>0 && !completed;
const progress=item.tasks.length ? Math.round(done*100/item.tasks.length) : 0;
const progressColor=completed ? "rgba(76,175,80,0.25)" : "rgba(245,165,36,0.22)";
const chips=formatTasks(item.tasks.join(" / "),item.cheval,days[todayColumn]);
return `<div class="horseLine ${inProgress ? "inProgress" : ""} ${completed ? "completed" : ""}" style="--progress:${progress}%;--progress-value:${progress};--progress-color:${progressColor};">
<div class="horseLineTop"><span class="horseName">${escapeHTML(item.cheval)}</span><span class="badge">${done}/${item.tasks.length}</span></div>
<div class="miniTasks">${chips}</div>
</div>`;
}

function updateStats(){
const day=days[todayColumn];
const progress=dayProgress(day);
const paddocks=reservations.filter(item=>item.date===todayIso()).length || paddockCountForDay(day);
document.getElementById("horseCount").innerText=horseCountForDay(day);
document.getElementById("todayTaskCount").innerText=progress.total;
document.getElementById("paddockCount").innerText=paddocks;
document.getElementById("doneCount").innerText=`${progress.done}/${progress.total}`;
document.getElementById("doneNote").innerText=progress.total ? `${progress.percent}% du jour` : "aucune tache";
document.getElementById("todayName").innerText=dayLabels[todayColumn].toLowerCase();
updateStatProgress(document.getElementById("doneStat"),progress.percent);
}

function updateStatProgress(el,percent){
if(!el) return;
el.style.setProperty("--stat-progress",`${percent}%`);
el.style.setProperty("--stat-progress-color",percent===100 ? "rgba(76,175,80,0.25)" : "rgba(245,165,36,0.22)");
el.classList.toggle("progressing",percent>0 && percent<100);
el.classList.toggle("complete",percent===100);
}

function updateWeekLabel(){
document.getElementById("weekLabel").innerText=`Semaine ${String(currentWeek).padStart(2,"0")}`;
}

function setView(mode){
viewMode=mode;
document.getElementById("weekBtn").classList.toggle("active",mode==="week");
document.getElementById("dayBtn").classList.toggle("active",mode==="day");
document.getElementById("paddockBtn").classList.toggle("active",mode==="paddock");
document.querySelector(".dashboard").classList.toggle("weekMode",mode==="week");
if(mode==="week") buildPlanning();
if(mode==="day") buildDayView();
if(mode==="paddock") buildPaddockView();
}

function changeWeek(delta){
currentWeek+=delta;
loadPlanning();
}

async function loadPlanning(showLoading=false){
updateWeekLabel();
if(showLoading || !planningData.length){
document.getElementById("planningSurface").innerHTML="<div class='loading'>Chargement du planning...</div>";
}
try{
const week=String(currentWeek).padStart(2,"0");
const planningURL=`https://opensheet.elk.sh/${SHEET_PLANNING}/semaine_${week}`;
const validationURL=`https://opensheet.elk.sh/${SHEET_VALIDATIONS}/1`;
const [planningResult,validationResult]=await Promise.allSettled([
fetchJSON(planningURL),
fetchJSON(validationURL)
]);
if(planningResult.status!=="fulfilled") throw planningResult.reason;
planningData=planningResult.value;
if(validationResult.status==="fulfilled") validations=validationResult.value;
updateStats();
setView(viewMode);
}catch(error){
document.getElementById("planningSurface").innerHTML="<div class='empty'>Impossible de charger le planning. Verifie la connexion de la tablette.</div>";
}
}

async function fetchJSON(url){
const response=await fetch(url,{cache:"no-store"});
if(!response.ok) throw new Error(`Chargement impossible: ${response.status}`);
return response.json();
}

function addCancelEvents(){
document.querySelectorAll("[data-cancel-reservation]").forEach(button=>{
button.onclick=event=>{
event.stopPropagation();
cancelReservation(button.dataset.cancelReservation);
};
});
}

async function cancelReservation(id){
if(!db){
alert("Firebase n'est pas encore pret.");
return;
}
const item=reservations.find(reservation=>reservation.id===id);
if(!item){
alert("Reservation introuvable.");
return;
}
const label=`${item.name} - ${paddockLabel(item.paddock)} - ${item.time}`;
if(!confirm(`Annuler cette reservation ?\n\n${label}`)) return;
await db.collection("reservations").doc(id).delete();
}

function refreshFirebaseViews(){
updateStats();
if(viewMode==="paddock") buildPaddockView();
if(viewMode==="day") renderPaddockBoardIntoPage();
}

function renderPaddockBoardIntoPage(){
const target=document.querySelector(".dayBoard .paddockBoard");
if(!target) return;
const next=document.createElement("div");
next.innerHTML=renderPaddockBoard(todayIso());
const fresh=next.firstElementChild;
if(fresh) target.replaceWith(fresh);
addCancelEvents();
}

function subscribeFirebase(){
if(!window.firebase || !firebase.firestore) return;
if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
db=firebase.firestore();
db.collection("reservations").onSnapshot(snapshot=>{
const nextReservations=[];
const nextBlocages=[];
snapshot.forEach(doc=>{
const item=normalizeReservation(doc);
if(String(item.name).toLowerCase().startsWith("blocage")) nextBlocages.push(item);
else nextReservations.push(item);
});
reservations=nextReservations;
blocages=nextBlocages;
refreshFirebaseViews();
});
db.collection("horaires").onSnapshot(snapshot=>{
const nextHoraires={};
snapshot.forEach(doc=>{nextHoraires[doc.id]=doc.data();});
if(Object.keys(nextHoraires).length) horaires=nextHoraires;
refreshFirebaseViews();
});
}

subscribeFirebase();
loadPlanning(true);

setInterval(()=>{loadPlanning(false);},180000);
</script>
</body>
</html>
