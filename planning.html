<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planning Chevaux</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:'Montserrat',sans-serif;
  background:#000;
  color:white;
}

header{
  height:70px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#000;
  font-size:22px;
  font-weight:700;
}

table{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
}

th, td{
  border:1px solid rgba(255,255,255,0.1);
  text-align:center;
  vertical-align:middle;
}

th{
  height:60px;
  font-size:18px;
  background:#111;
}

td{
  height:120px;
  font-size:16px;
  padding:8px;
  position:relative;
  white-space:pre-line;
}

/* Colonne cheval */
td:first-child, th:first-child{
  width:220px;
  font-weight:700;
  background:#111;
}

/* ===== COULEURS ===== */

.paddock      { background:#4CAF50; }
.travail      { background:#ff9800; }
.longe        { background:#2196F3; }
.proprietaire { background:#e53935; }
.repos        { background:#e53935; }

</style>
</head>

<body>

<header>PLANNING SEMAINE</header>

<table id="planningTable"></table>

<script>

const SHEET_URL="https://opensheet.elk.sh/1-VbRioKfM6JHU-Oep0pa6H3S0VVuvYLyUMXTdSdRbzI/Semaine_2026-14";

const JOURS=["Cheval","Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi","Dimanche"];

function getClasse(texte){

  if(!texte) return "";

  const lignes = texte.split("\n");
  const type = lignes[0].toLowerCase();

  if(type.includes("paddock")) return "paddock";
  if(type.includes("travail")) return "travail";
  if(type.includes("longe")) return "longe";
  if(type.includes("propriétaire")) return "proprietaire";
  if(type.includes("repos")) return "repos";

  return "";
}

function buildTable(data){

  const table=document.getElementById("planningTable");
  table.innerHTML="";

  // Header
  const headerRow=document.createElement("tr");
  JOURS.forEach(j=>{
    const th=document.createElement("th");
    th.innerText=j;
    headerRow.appendChild(th);
  });
  table.appendChild(headerRow);

  // Lignes chevaux
  data.forEach(row=>{
    const tr=document.createElement("tr");

    JOURS.forEach(jour=>{
      const td=document.createElement("td");

      if(jour==="Cheval"){
        td.innerText=row["Cheval"];
      }else{
        const texte=row[jour] || "";
        td.innerText=texte;
        td.classList.add(getClasse(texte));
      }

      tr.appendChild(td);
    });

    table.appendChild(tr);
  });
}

fetch(SHEET_URL,{cache:"no-store"})
.then(r=>r.json())
.then(data=>{
  buildTable(data);
});

</script>

</body>
</html>
