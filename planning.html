<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Planning Écurie</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Montserrat',sans-serif;
background:#0f1115;
color:white;
}

/* TITRE */

.titleblock{
text-align:center;
margin-top:10px;
}

h1{
margin:0;
font-size:26px;
}

/* LIGNE SEMAINE */

.weekline{
display:flex;
justify-content:center;
align-items:center;
gap:10px;
margin-top:4px;
}

.weeknav{
background:#1c1f26;
color:white;
border:none;
padding:4px 8px;
border-radius:6px;
cursor:pointer;
}

.weeknav:hover{
background:#2a2f38;
}

#weekLabel{
font-size:14px;
font-weight:600;
opacity:0.9;
}

/* BARRE HAUT */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:0 10px;
margin-top:6px;
}

.topbar button{
background:#1c1f26;
color:white;
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

.topbar button:hover{
background:#2a2f38;
}

/* bouton central */

.centerBtn{
position:absolute;
left:50%;
transform:translateX(-50%);
}

/* WRAPPER */

.wrapper{
overflow:auto;
padding:10px;
max-height:calc(100vh - 160px);
}

/* TABLE */

table{
border-collapse:collapse;
width:100%;
min-width:900px;
}

/* HEADER JOURS GELÉ */

th{
background:#1c1f26;
padding:12px;
border:1px solid #333;
position:sticky;
top:0;
z-index:4;
}

/* CELLULES */

td{
background:#1c1f26;
border:1px solid #333;
vertical-align:top;
padding:8px;
width:140px;
}

/* COLONNE CHEVAL FIXE */

.horse{
position:sticky;
left:0;
background:#181b21;
font-weight:700;
z-index:5;
box-shadow:8px 0 12px rgba(0,0,0,0.6);
white-space:nowrap;
width:1%;
padding-right:20px;
}

/* AUJOURD'HUI */

.today{
background:#2a2f38 !important;
}

/* PASSÉ */

.past{
opacity:0.35;
}

/* TACHES */

.task{
padding:4px 6px;
margin:4px 0;
border-radius:6px;
cursor:pointer;
font-size:13px;
}

.travail{ background:#fff3b0;color:#000;}
.paddock{ background:#b7e4c7;color:#000;}
.repos{ background:#cdb4db;color:#000;}
.proprio{ background:#cdb4db;color:#000;}
.longe{ background:#bde0fe;color:#000;}
.concours{ background:#ffb703;color:#000;}

.task.done{
background:#4caf50 !important;
color:white !important;
font-weight:600;
}

</style>
</head>

<body>

<div class="titleblock">

<h1>Planning Écurie</h1>

<div class="weekline">
<button class="weeknav" onclick="changeWeek(-1)">←</button>
<div id="weekLabel"></div>
<button class="weeknav" onclick="changeWeek(1)">→</button>
</div>

</div>

<div class="topbar">

<button id="viewBtn" onclick="toggleView()">Vue jour</button>

<button class="centerBtn" onclick="openWix()">Agenda</button>

<button onclick="goEcran()">FERMER</button>

</div>

<div class="wrapper">
<table id="planning"></table>
</div>

<script>

/* OUVERTURE AGENDA WIX */

function openWix(){
window.location.href="https://manage.wix.com/dashboard/3cad6f3c-36bb-45f1-89f5-2db25e5f6107/bookings/calendar?referralInfo=sidebar";
}

/* CONFIG */

const SHEET_PLANNING="10oblXf2vLsgXWJba-hkuUlpOquFEoDHKXNJ0L1Wk_DE";
const SHEET_VALIDATIONS="1YfrSDkB9E_SNA1ojqMuoUXBJt9vd_z40Kej3oyOXV7A";

const FORM_URL="https://docs.google.com/forms/d/e/1FAIpQLSdsG-ErANYpSvtqj3QsHNuXj5tjSiK-IZB-nP__aSMz6iHV8w/formResponse";

const ENTRY_WEEK="entry.915711839";
const ENTRY_HORSE="entry.1929695140";
const ENTRY_DAY="entry.301329581";
const ENTRY_TASK="entry.450632275";

const days=["lundi","mardi","mercredi","jeudi","vendredi","samedi","dimanche"];

/* VEILLE 1 MIN */

let inactivityTimer;

function resetTimer(){
clearTimeout(inactivityTimer);
inactivityTimer=setTimeout(()=>{
location.href="ecran.html";
},60000);
}

["click","touchstart","mousemove","keydown"].forEach(evt=>{
document.addEventListener(evt,resetTimer,true);
});

resetTimer();

function goEcran(){
location.href="ecran.html";
}

/* ... le reste de ton code reste IDENTIQUE ... */

</script>
</body>
</html>
