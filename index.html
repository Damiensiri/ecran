<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Écran Informations - Écurie</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#000;
  --glass:rgba(255,255,255,0.08);
  --border:rgba(255,255,255,0.18);
  --accent:#ffb347;
}

html,body{
  margin:0;
  padding:0;
  height:100%;
  overflow:hidden;
  background:var(--bg);
  font-family:'Montserrat',sans-serif;
  color:white;
}

/* ===== LAYOUT GLOBAL ===== */

.wrapper{
  height:100%;
  display:flex;
  flex-direction:column;
}

/* ===== HEADER ===== */

header{
  flex:0 0 10%;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  padding:0 20px;
}

header img{
  position:absolute;
  left:20px;
  height:45%;
  filter:brightness(0) invert(1)
         drop-shadow(0 0 6px rgba(255,255,255,0.6));
}

header h1{
  margin:0;
  font-size:clamp(18px,2.2vw,28px);
  font-weight:700;
}

#clock{
  position:absolute;
  right:20px;
  font-weight:700;
  font-size:clamp(16px,2vw,24px);
}

/* ===== MAIN ===== */

.main{
  flex:1;
  display:flex;
  flex-direction:column;
}

/* ===== SECTION ===== */

.section{
  flex:1;
  display:flex;
  flex-direction:column;
  padding:0 20px;
}

.section-title{
  flex:0 0 12%;
  display:flex;
  align-items:center;
  font-weight:700;
  font-size:clamp(14px,1.6vw,20px);
}

/* ===== CARDS ZONE ===== */

.cards{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:space-evenly;
}

/* ===== CARD ===== */

.card{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:clamp(10px,1.5vw,18px);
  border-radius:18px;
  background:var(--glass);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border:1px solid var(--border);
  box-shadow:0 8px 26px rgba(0,0,0,0.6);
}

.card-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.title-wrap{
  display:flex;
  align-items:center;
  gap:10px;
}

.title-wrap img{
  width:clamp(18px,2vw,26px);
}

.card-title{
  font-size:clamp(16px,1.8vw,24px);
  font-weight:700;
}

.statut{
  width:clamp(18px,2vw,26px);
}

.card-middle{
  display:flex;
  align-items:center;
  gap:clamp(8px,1.2vw,16px);
  margin-top:6px;
  flex-wrap:wrap;
}

.badge{
  font-weight:700;
  font-size:clamp(12px,1.2vw,16px);
}

.badge.oui{ color:#4caf50; }
.badge.non{ color:#f44336; }

.horaire{
  margin-left:auto;
  font-weight:600;
  font-size:clamp(12px,1.2vw,16px);
}

.info{
  margin-top:6px;
  font-size:clamp(11px,1.1vw,14px);
  color:var(--accent);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

</style>
</head>

<body>

<div class="wrapper">

<header>
  <img src="image/logo.png">
  <h1>INFORMATIONS ÉCURIE</h1>
  <div id="clock">--:--</div>
</header>

<div class="main">

  <div class="section">
    <div class="section-title">ESPACES TRAVAIL</div>
    <div class="cards">
      <div class="card" id="carriere"></div>
      <div class="card" id="manege"></div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">PADDOCKS</div>
    <div class="cards">
      <div class="card" id="maison"></div>
      <div class="card" id="grande-voie"></div>
      <div class="card" id="beudot"></div>
    </div>
  </div>

</div>
</div>

<script>

const SHEET_URL="https://opensheet.elk.sh/1-VbRioKfM6JHU-Oep0pa6H3S0VVuvYLyUMXTdSdRbzI/statuts";
const REFRESH=60000;

const ICONS_STATUT={
  "ouvert":"image/ouvert.png",
  "ferme":"image/ferme.png",
  "prevision":"image/prevision.png",
  "hors-service":"image/horsservice.png"
};

const TITRES={
  "carriere":"Carrière",
  "manege":"Manège",
  "maison":"Maison",
  "grande-voie":"Grande voie",
  "beudot":"Beudot"
};

function badgeYN(v){
  if(v==="oui") return `<span class="badge oui">OUI</span>`;
  if(v==="non") return `<span class="badge non">NON</span>`;
  return "";
}

function buildCard(e){

  const isTravail=(e.espace==="carriere"||e.espace==="manege");

  return `
    <div class="card-top">
      <div class="title-wrap">
        <img src="image/travail.svg">
        <div class="card-title">${TITRES[e.espace]}</div>
      </div>
      <img class="statut" src="${ICONS_STATUT[e.statut_auto]}">
    </div>

    ${
      isTravail
      ? `
        <div class="card-middle">
          <div>Liberté</div>
          ${badgeYN(e.liberte)}
          <div>Longe</div>
          ${badgeYN(e.longe)}
          <div class="horaire" style="color:${e.horaire_special ? "#ffb347":"#fff"}">
            ${e.horaire_special || e.horaire_affiche || ""}
          </div>
        </div>
      `
      : `
        <div class="card-middle">
          <div class="horaire" style="color:${e.horaire_special ? "#ffb347":"#fff"}">
            ${e.horaire_special || e.horaire_affiche || ""}
          </div>
        </div>
      `
    }

    <div class="info">${e.info || ""}</div>
  `;
}

function loadData(){
fetch(SHEET_URL,{cache:"no-store"})
.then(r=>r.json())
.then(data=>{
  ["carriere","manege","maison","grande-voie","beudot"].forEach(espace=>{
    const row=data.find(e=>e.espace===espace);
    if(!row) return;
    document.getElementById(espace).innerHTML=buildCard(row);
  });
});
}

loadData();
setInterval(loadData,REFRESH);

function updateClock(){
  const d=new Date();
  const h=String(d.getHours()).padStart(2,"0");
  const m=String(d.getMinutes()).padStart(2,"0");
  document.getElementById("clock").innerText=h+":"+m;
}

updateClock();
setInterval(updateClock,1000);

</script>

</body>
</html>
