<style>

:root{
  --max-width:1400px;
}

/* ===== GLOBAL ===== */

body{
  margin:0;
  font-family:'Montserrat',sans-serif;
  background:#000;
  display:flex;
  justify-content:center;
}

.wrapper{
  width:100%;
  max-width:var(--max-width);
}

/* ===== HEADER ===== */

header{
  height:clamp(60px,8vw,90px);
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  padding:0 16px;
}

header img{
  position:absolute;
  left:16px;
  height:clamp(30px,4vw,50px);
  filter:brightness(0) invert(1)
         drop-shadow(0 0 6px rgba(255,255,255,0.6));
}

header h1{
  color:white;
  margin:0;
  font-size:clamp(16px,3vw,28px);
  font-weight:700;
  text-align:center;
}

#clock{
  position:absolute;
  right:16px;
  color:white;
  font-size:clamp(16px,3vw,24px);
  font-weight:700;
}

/* ===== SECTIONS ===== */

.section-title{
  color:white;
  margin:clamp(16px,3vw,28px) 16px 10px;
  font-size:clamp(14px,2.2vw,20px);
  font-weight:700;
}

/* ===== CARDS ===== */

.card{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.18);
  margin:0 16px clamp(14px,2.5vw,24px);
  padding:clamp(14px,2.5vw,22px);
  border-radius:18px;
  box-shadow:0 8px 26px rgba(0,0,0,0.7);
  color:white;
}

.card-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:nowrap;
}

.title-wrap{
  display:flex;
  align-items:center;
  gap:8px;
}

.title-wrap img{
  width:clamp(20px,3vw,30px);
}

.card-title{
  font-size:clamp(18px,3.5vw,26px);
  font-weight:700;
  color:white;
}

.card-top img.statut{
  width:clamp(20px,3vw,30px);
}

/* ===== LIGNE ===== */

.card-middle{
  display:flex;
  align-items:center;
  gap:clamp(8px,2vw,16px);
  margin-top:10px;
  flex-wrap:wrap;
}

.badge{
  font-weight:700;
  font-size:clamp(12px,2.2vw,16px);
}

.badge.oui{ color:#4caf50; }
.badge.non{ color:#f44336; }

.horaire{
  margin-left:auto;
  font-size:clamp(12px,2.2vw,16px);
  font-weight:600;
  color:#f5f5f5;
}

.info{
  margin-top:12px;
  font-size:clamp(12px,2.2vw,16px);
  font-weight:500;
  color:#ffb347;
  white-space:pre-line;
}

/* ===== LARGE SCREEN OPTIMISATION ===== */

@media (min-width:1200px){

  .section-title{
    margin-left:0;
  }

  .card{
    margin-left:0;
    margin-right:0;
  }

}

</style>
