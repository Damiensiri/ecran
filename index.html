<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Écran Informations - Écurie</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>

/* ================= ROOT VARIABLES ================= */

:root{
  --space-xs: clamp(6px, 0.8vh, 12px);
  --space-sm: clamp(10px, 1.2vh, 18px);
  --space-md: clamp(16px, 2vh, 32px);
  --space-lg: clamp(24px, 3vh, 48px);
}

/* ================= BASE ================= */

body{
  margin:0;
  font-family:'Montserrat',sans-serif;
  background:radial-gradient(circle at top,#111 0%,#000 60%);
  color:white;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  padding-bottom:var(--space-lg); /* respiration premium */
}

/* ================= HEADER ================= */

header{
  height:clamp(70px,8vh,100px);
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

header img{
  position:absolute;
  left:25px;
  height:clamp(30px,4vh,50px);
  filter:brightness(0) invert(1)
         drop-shadow(0 0 8px rgba(255,255,255,0.6));
}

header h1{
  margin:0;
  font-size:clamp(20px,2.4vw,34px);
  font-weight:700;
  letter-spacing:1px;
}

#clock{
  position:absolute;
  right:25px;
  font-size:clamp(18px,2.2vw,30px);
  font-weight:700;
}

/* ================= SECTION TITLES ================= */

.section-title{
  margin:var(--space-md) 30px var(--space-xs);
  font-size:clamp(16px,1.8vw,24px);
  font-weight:700;
  opacity:0.9;
  letter-spacing:0.5px;
}

/* ================= CARDS ================= */

.card{
  background:linear-gradient(
    145deg,
    rgba(255,255,255,0.08),
    rgba(255,255,255,0.03)
  );
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,0.15);
  margin:0 30px var(--space-md);
  padding:clamp(18px,1.5vw,28px);
  border-radius:22px;
  box-shadow:
    0 10px 30px rgba(0,0,0,0.7),
    inset 0 0 20px rgba(255,255,255,0.04);
  transition:transform 0.2s ease;
}

.card:hover{
  transform:scale(1.01);
}

/* ================= CARD HEADER ================= */

.card-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.title-wrap{
  display:flex;
  align-items:center;
  gap:clamp(10px,1vw,18px);
}

.title-wrap img{
  width:clamp(24px,2vw,34px);
}

.card-title{
  font-size:clamp(20px,2.2vw,30px);
  font-weight:700;
}

.card-top img.statut{
  width:clamp(24px,2vw,34px);
}

/* ================= CARD CONTENT ================= */

.card-middle{
  display:flex;
  align-items:center;
  gap:clamp(14px,1.5vw,26px);
  margin-top:var(--space-sm);
  flex-wrap:nowrap;
}

.badge{
  font-weight:700;
  font-size:clamp(16px,1.6vw,22px);
}

.badge.oui{ color:#4caf50; }
.badge.non{ color:#f44336; }

.horaire{
  margin-left:auto;
  font-size:clamp(16px,1.6vw,22px);
  font-weight:600;
  color:#f5f5f5;
}

.info{
  margin-top:var(--space-sm);
  font-size:clamp(15px,1.4vw,20px);
  color:#ffb347;
  white-space:pre-line;
}

/* ================= MOBILE ================= */

@media (max-width:768px){

  .card-middle{
    flex-wrap:wrap;
  }

  .horaire{
    width:100%;
    margin-left:0;
  }

  .card{
    margin:0 15px var(--space-md);
  }

  .section-title{
    margin-left:15px;
  }

}

</style>
</head>

<body>

<header>
  <img src="image/logo.png">
  <h1>INFORMATIONS ÉCURIE</h1>
  <div id="clock">--:--</div>
</header>

<div class="section-title">ESPACES TRAVAIL</div>

<div class="card" id="carriere"></div>
<div class="card" id="manege"></div>

<div class="section-title">PADDOCKS</div>

<div class="card" id="maison"></div>
<div class="card" id="grande-voie"></div>
<div class="card" id="beudot"></div>

<script>

const SHEET_URL="https://opensheet.elk.sh/1-VbRioKfM6JHU-Oep0pa6H3S0VVuvYLyUMXTdSdRbzI/statuts";
const REFRESH=60000;

const ICONS_STATUT={
  "ouvert":"image/ouvert.png",
  "ferme":"image/ferme.png",
  "prevision":"image/prevision.png",
  "hors-service":"image/horsservice.png"
};

const TITRES={
  "carriere":"Carrière",
  "manege":"Manège",
  "maison":"Maison",
  "grande-voie":"Grande voie",
  "beudot":"Beudot"
};

function badgeYN(v){
  if(v==="oui") return `<span class="badge oui">OUI</span>`;
  if(v==="non") return `<span class="badge non">NON</span>`;
  return "";
}

function buildCard(e){

  const isTravail = (e.espace==="carriere" || e.espace==="manege");

  return `
    <div class="card-top">
      <div class="title-wrap">
        <img src="image/travail.svg">
        <div class="card-title">${TITRES[e.espace]}</div>
      </div>
      <img class="statut" src="${ICONS_STATUT[e.statut_auto]}">
    </div>

    ${
      isTravail
      ? `
        <div class="card-middle">
          <div>Liberté</div>
          ${badgeYN(e.liberte)}
          <div>Longe</div>
          ${badgeYN(e.longe)}
          <div class="horaire" style="color:${e.horaire_special ? "#ffb347":"#f5f5f5"}">
            ${e.horaire_special || e.horaire_affiche || ""}
          </div>
        </div>
      `
      : `
        <div class="card-middle">
          <div class="horaire" style="color:${e.horaire_special ? "#ffb347":"#f5f5f5"}">
            ${e.horaire_special || e.horaire_affiche || ""}
          </div>
        </div>
      `
    }

    <div class="info">${e.info || ""}</div>
  `;
}

function loadData(){
fetch(SHEET_URL,{cache:"no-store"})
.then(r=>r.json())
.then(data=>{
  ["carriere","manege","maison","grande-voie","beudot"].forEach(espace=>{
    const row=data.find(e=>e.espace===espace);
    if(!row) return;
    document.getElementById(espace).innerHTML = buildCard(row);
  });
});
}

loadData();
setInterval(loadData,REFRESH);

function updateClock(){
  const d=new Date();
  const h=String(d.getHours()).padStart(2,"0");
  const m=String(d.getMinutes()).padStart(2,"0");
  document.getElementById("clock").innerText=h+":"+m;
}

updateClock();
setInterval(updateClock,1000);

</script>

</body>
</html>
