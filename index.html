<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, initial-scale=1.0">

<title>Écran Informations - Écurie</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>

html, body{
  margin:0;
  height:100vh;
  overflow:hidden;
  background:radial-gradient(circle at top,#111 0%,#000 70%);
  font-family:'Montserrat',sans-serif;
  color:white;
}

body{
  display:flex;
  flex-direction:column;
}

/* ===== HEADER ===== */

header{
  height:70px;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  flex-shrink:0;
}

header img{
  position:absolute;
  left:25px;
  height:38px;
  filter:brightness(0) invert(1);
}

header h1{
  margin:0;
  font-size:22px;
  font-weight:700;
  letter-spacing:1px;
}

#clock{
  position:absolute;
  right:25px;
  font-size:18px;
  font-weight:700;
}

/* ===== MAIN ===== */

.main{
  flex:1;
  display:grid;
  grid-template-rows:
    auto
    1.2fr
    auto
    1fr;
  gap:14px;
  padding:15px 30px 25px;
}

/* ===== TITRES ===== */

.section-title{
  font-size:15px;
  font-weight:700;
  opacity:0.9;
}

/* ===== GRIDS ===== */

.travail{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

.paddocks{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

.paddocks .card:last-child{
  grid-column:span 2;
}

/* ===== CARTES ===== */

.card{
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.15);
  padding:14px 16px;
  border-radius:16px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  box-shadow:0 6px 20px rgba(0,0,0,0.5);
}

.card-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.title-wrap{
  display:flex;
  align-items:center;
  gap:8px;
}

.title-wrap img{
  width:20px;
}

.card-title{
  font-size:16px;
  font-weight:700;
}

.card-top img.statut{
  width:20px;
}

.card-middle{
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:6px;
  font-size:13px;
}

.badge{
  font-weight:700;
  font-size:13px;
}

.badge.oui{ color:#4caf50; }
.badge.non{ color:#f44336; }

.horaire{
  margin-left:auto;
  font-size:13px;
  font-weight:600;
}

.info{
  margin-top:5px;
  font-size:12px;
  color:#ffb347;
  white-space:pre-line;
}

</style>
</head>

<body>

<header>
  <img src="image/logo.png">
  <h1>INFORMATIONS ÉCURIE</h1>
  <div id="clock">--:--</div>
</header>

<div class="main">

<div class="section-title">ESPACES TRAVAIL</div>

<div class="travail">
  <div class="card" id="carriere"></div>
  <div class="card" id="manege"></div>
</div>

<div class="section-title">PADDOCKS</div>

<div class="paddocks">
  <div class="card" id="maison"></div>
  <div class="card" id="grande-voie"></div>
  <div class="card" id="beudot"></div>
</div>

</div>

<script>

const SHEET_URL="https://opensheet.elk.sh/1-VbRioKfM6JHU-Oep0pa6H3S0VVuvYLyUMXTdSdRbzI/statuts";
const REFRESH=60000;

const ICONS_STATUT={
  "ouvert":"image/ouvert.png",
  "ferme":"image/ferme.png",
  "prevision":"image/prevision.png",
  "hors-service":"image/horsservice.png"
};

const TITRES={
  "carriere":"Carrière",
  "manege":"Manège",
  "maison":"Maison",
  "grande-voie":"Grande voie",
  "beudot":"Beudot"
};

function badgeYN(v){
  if(v==="oui") return `<span class="badge oui">OUI</span>`;
  if(v==="non") return `<span class="badge non">NON</span>`;
  return "";
}

function buildCard(e){

  const isTravail = (e.espace==="carriere" || e.espace==="manege");

  return `
    <div class="card-top">
      <div class="title-wrap">
        <img src="image/travail.svg">
        <div class="card-title">${TITRES[e.espace]}</div>
      </div>
      <img class="statut" src="${ICONS_STATUT[e.statut_auto]}">
    </div>

    ${
      isTravail
      ? `
        <div class="card-middle">
          <div>Liberté</div>
          ${badgeYN(e.liberte)}
          <div>Longe</div>
          ${badgeYN(e.longe)}
          <div class="horaire" style="color:${e.horaire_special ? "#ffb347":"#f5f5f5"}">
            ${e.horaire_special || e.horaire_affiche || ""}
          </div>
        </div>
      `
      : `
        <div class="card-middle">
          <div class="horaire" style="color:${e.horaire_special ? "#ffb347":"#f5f5f5"}">
            ${e.horaire_special || e.horaire_affiche || ""}
          </div>
        </div>
      `
    }

    <div class="info">${e.info || ""}</div>
  `;
}

function loadData(){
fetch(SHEET_URL,{cache:"no-store"})
.then(r=>r.json())
.then(data=>{
  ["carriere","manege","maison","grande-voie","beudot"].forEach(espace=>{
    const row=data.find(e=>e.espace===espace);
    if(!row) return;
    document.getElementById(espace).innerHTML = buildCard(row);
  });
});
}

loadData();
setInterval(loadData,REFRESH);

function updateClock(){
  const d=new Date();
  const h=String(d.getHours()).padStart(2,"0");
  const m=String(d.getMinutes()).padStart(2,"0");
  document.getElementById("clock").innerText=h+":"+m;
}

updateClock();
setInterval(updateClock,1000);

</script>

</body>
</html>
