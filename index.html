<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Écran Informations - Écurie</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>

/* ================= BASE ================= */

body{
  margin:0;
  font-family:'Montserrat',sans-serif;
  background:#000;
  color:white;
  min-height:100vh;
}

/* ================= HEADER ================= */

header{
  height:clamp(60px,7vh,90px);
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

header img{
  position:absolute;
  left:15px;
  height:clamp(28px,4vh,45px);
  filter:brightness(0) invert(1)
         drop-shadow(0 0 6px rgba(255,255,255,0.6));
}

header h1{
  margin:0;
  font-size:clamp(16px,2.2vw,28px);
  font-weight:700;
}

#clock{
  position:absolute;
  right:18px;
  font-size:clamp(14px,2vw,24px);
  font-weight:700;
}

/* ================= TITRES ================= */

.section-title{
  margin:clamp(10px,1.5vh,25px) 15px clamp(6px,1vh,15px);
  font-size:clamp(14px,1.5vw,20px);
  font-weight:700;
}

/* ================= CARTES ================= */

.card{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.18);
  margin:0 15px clamp(10px,1.5vh,25px);
  padding:clamp(12px,1.2vw,22px);
  border-radius:18px;
  box-shadow:0 8px 26px rgba(0,0,0,0.7);
}

.card-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.title-wrap{
  display:flex;
  align-items:center;
  gap:clamp(6px,0.8vw,14px);
}

.title-wrap img{
  width:clamp(20px,1.8vw,30px);
}

.card-title{
  font-size:clamp(16px,2vw,26px);
  font-weight:700;
}

.card-top img.statut{
  width:clamp(20px,1.8vw,30px);
}

/* ================= LIGNE CENTRALE ================= */

.card-middle{
  display:flex;
  align-items:center;
  gap:clamp(8px,1vw,18px);
  margin-top:clamp(6px,0.8vh,14px);
  flex-wrap:nowrap;
}

.badge{
  font-weight:700;
  font-size:clamp(12px,1.2vw,18px);
}

.badge.oui{ color:#4caf50; }
.badge.non{ color:#f44336; }

.horaire{
  margin-left:auto;
  font-size:clamp(12px,1.2vw,18px);
  font-weight:600;
  color:#f5f5f5;
}

.info{
  margin-top:clamp(6px,0.8vh,14px);
  font-size:clamp(12px,1.2vw,18px);
  font-weight:500;
  color:#ffb347;
  white-space:pre-line;
}

/* ================= MOBILE ================= */

@media (max-width:768px){

  .card-middle{
    flex-wrap:wrap;
  }

  .horaire{
    width:100%;
    margin-left:0;
  }

}

</style>
</head>

<body>

<header>
  <img src="image/logo.png">
  <h1>INFORMATIONS ÉCURIE</h1>
  <div id="clock">--:--</div>
</header>

<div class="section-title">ESPACES TRAVAIL</div>

<div class="card" id="carriere"></div>
<div class="card" id="manege"></div>

<div class="section-title">PADDOCKS</div>

<div class="card" id="maison"></div>
<div class="card" id="grande-voie"></div>
<div class="card" id="beudot"></div>

<script>

const SHEET_URL="https://opensheet.elk.sh/1-VbRioKfM6JHU-Oep0pa6H3S0VVuvYLyUMXTdSdRbzI/statuts";
const REFRESH=60000;

const ICONS_STATUT={
  "ouvert":"image/ouvert.png",
  "ferme":"image/ferme.png",
  "prevision":"image/prevision.png",
  "hors-service":"image/horsservice.png"
};

const TITRES={
  "carriere":"Carrière",
  "manege":"Manège",
  "maison":"Maison",
  "grande-voie":"Grande voie",
  "beudot":"Beudot"
};

function badgeYN(v){
  if(v==="oui") return `<span class="badge oui">OUI</span>`;
  if(v==="non") return `<span class="badge non">NON</span>`;
  return "";
}

function buildCard(e){

  const isTravail = (e.espace==="carriere" || e.espace==="manege");

  return `
    <div class="card-top">
      <div class="title-wrap">
        <img src="image/travail.svg">
        <div class="card-title">${TITRES[e.espace]}</div>
      </div>
      <img class="statut" src="${ICONS_STATUT[e.statut_auto]}">
    </div>

    ${
      isTravail
      ? `
        <div class="card-middle">
          <div>Liberté</div>
          ${badgeYN(e.liberte)}
          <div>Longe</div>
          ${badgeYN(e.longe)}
          <div class="horaire" style="color:${e.horaire_special ? "#ffb347":"#f5f5f5"}">
            ${e.horaire_special || e.horaire_affiche || ""}
          </div>
        </div>
      `
      : `
        <div class="card-middle">
          <div class="horaire" style="color:${e.horaire_special ? "#ffb347":"#f5f5f5"}">
            ${e.horaire_special || e.horaire_affiche || ""}
          </div>
        </div>
      `
    }

    <div class="info">${e.info || ""}</div>
  `;
}

function loadData(){
fetch(SHEET_URL,{cache:"no-store"})
.then(r=>r.json())
.then(data=>{
  ["carriere","manege","maison","grande-voie","beudot"].forEach(espace=>{
    const row=data.find(e=>e.espace===espace);
    if(!row) return;
    document.getElementById(espace).innerHTML = buildCard(row);
  });
});
}

loadData();
setInterval(loadData,REFRESH);

function updateClock(){
  const d=new Date();
  const h=String(d.getHours()).padStart(2,"0");
  const m=String(d.getMinutes()).padStart(2,"0");
  document.getElementById("clock").innerText=h+":"+m;
}

updateClock();
setInterval(updateClock,1000);

</script>

</body>
</html>
