<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ecran Informations - Ecurie</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="prefetch" href="planning.html">

<style>
:root{
  --bg:#07090d;
  --panel:rgba(255,255,255,0.075);
  --panel-strong:rgba(255,255,255,0.11);
  --line:rgba(255,255,255,0.18);
  --text:#f7f8fb;
  --muted:#aeb6c4;
  --green:#66dd8b;
  --red:#ff7676;
  --amber:#ffbd66;
  --blue:#9bc7ff;
  --shadow:0 16px 34px rgba(0,0,0,0.48);
}

*{box-sizing:border-box}

html,body{
  margin:0;
  width:100%;
  min-height:100%;
}

body{
  font-family:'Montserrat',sans-serif;
  background:
    radial-gradient(circle at top left,rgba(76,175,80,0.12),transparent 34rem),
    linear-gradient(135deg,#07090d 0%,#12161d 58%,#080a0f 100%);
  color:var(--text);
  overflow:hidden;
  user-select:none;
  -webkit-user-select:none;
  touch-action:manipulation;
}

.screen{
  height:100vh;
  display:grid;
  grid-template-rows:auto 1fr;
  gap:12px;
  padding:14px;
}

header{
  min-height:74px;
  display:grid;
  grid-template-columns:auto 1fr auto;
  align-items:center;
  gap:16px;
  padding:0 6px;
}

.brand{
  display:flex;
  align-items:center;
  gap:14px;
  min-width:0;
}

.brand img{
  height:44px;
  filter:brightness(0) invert(1) drop-shadow(0 0 8px rgba(255,255,255,0.52));
}

.brandText{
  min-width:0;
}

h1{
  margin:0;
  font-size:clamp(26px,4vw,48px);
  line-height:1;
  font-weight:800;
  letter-spacing:0;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.subline{
  margin-top:8px;
  display:flex;
  gap:12px;
  align-items:center;
  color:var(--muted);
  font-size:13px;
  font-weight:700;
}

.liveDot{
  width:9px;
  height:9px;
  border-radius:50%;
  background:var(--green);
  box-shadow:0 0 0 5px rgba(102,221,139,0.12);
}

#clock{
  font-size:clamp(38px,6vw,74px);
  font-weight:800;
  line-height:1;
  min-width:154px;
  text-align:right;
  font-variant-numeric:tabular-nums;
}

.content{
  min-height:0;
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:12px;
}

.group{
  min-height:0;
  display:grid;
  grid-template-rows:auto 1fr;
  gap:10px;
}

.sectionTitle{
  height:34px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  color:#dbe1ec;
  font-size:14px;
  font-weight:800;
  text-transform:uppercase;
  letter-spacing:0.04em;
}

.sectionTitle span:last-child{
  color:var(--muted);
  font-size:12px;
  letter-spacing:0;
  text-transform:none;
}

.cards{
  min-height:0;
  display:grid;
  gap:10px;
}

.workCards,
.paddockCards{
  grid-template-rows:repeat(3,minmax(0,1fr));
}

.card{
  min-height:0;
  display:grid;
  grid-template-rows:auto 1fr auto;
  gap:10px;
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:8px;
  padding:14px;
  box-shadow:var(--shadow);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  overflow:hidden;
}

.card.is-open{
  border-color:rgba(102,221,139,0.42);
}

.card.is-closed,
.card.is-hors-service{
  border-color:rgba(255,118,118,0.42);
}

.card.is-prevision{
  border-color:rgba(255,189,102,0.46);
}

.cardTop{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
}

.titleWrap{
  display:flex;
  align-items:center;
  gap:10px;
  min-width:0;
}

.titleWrap img{
  width:30px;
  height:30px;
  object-fit:contain;
}

.cardTitle{
  font-size:clamp(22px,2.6vw,34px);
  font-weight:800;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.statusText{
  min-width:116px;
  border-radius:999px;
  padding:8px 11px;
  text-align:center;
  font-size:12px;
  font-weight:800;
  color:white;
  background:#dfe6ef;
  flex:0 0 auto;
  text-shadow:0 1px 2px rgba(0,0,0,0.36);
}

.statusText.open{background:var(--green)}
.statusText.closed{background:var(--red)}
.statusText.prevision{background:var(--amber)}
.statusText.hors-service{background:#8d97a6}

.cardMiddle{
  min-height:0;
  display:flex;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
}

.metric{
  display:flex;
  align-items:center;
  gap:7px;
  min-height:36px;
  padding:0 10px;
  border:1px solid rgba(255,255,255,0.13);
  border-radius:8px;
  background:rgba(255,255,255,0.06);
  color:#e8edf5;
  font-size:13px;
  font-weight:800;
}

.badge{
  display:inline-flex;
  align-items:center;
  min-height:22px;
  border-radius:999px;
  padding:0 8px;
  font-size:12px;
  font-weight:800;
  color:#111;
}

.badge.oui{background:var(--green)}
.badge.non{background:var(--red);color:white}

.stableCard{
  grid-template-rows:42px minmax(0,1fr);
  gap:8px;
  padding:12px;
}

.stableCard .cardTop{
  min-height:0;
}

.stableCard .titleWrap img{
  width:26px;
  height:26px;
}

.stableCard .cardTitle{
  font-size:clamp(20px,2.2vw,30px);
}

.stableBody{
  min-height:0;
  display:grid;
  grid-template-rows:minmax(0,1fr) 54px;
  gap:8px;
}

.stableHours{
  min-height:0;
  display:grid;
  place-items:center;
  text-align:center;
}

.todayText{
  color:white;
  text-align:right;
  font-size:14px;
  font-weight:800;
  flex:0 0 auto;
  white-space:nowrap;
}

.stableMeta{
  margin-top:4px;
  color:var(--muted);
  font-size:11px;
  font-weight:800;
  text-transform:uppercase;
}

.stableTime{
  font-size:clamp(24px,2.8vw,38px);
  font-weight:800;
  color:#f5f7fb;
  font-variant-numeric:tabular-nums;
  white-space:nowrap;
}

.alertBox{
  min-height:0;
  height:54px;
  overflow:auto;
  display:flex;
  gap:9px;
  align-items:flex-start;
  padding:8px 10px;
  border:1px solid rgba(255,255,255,0.2);
  border-radius:8px;
  background:linear-gradient(135deg,#f29f31,#c77416);
  color:white;
  font-size:12px;
  font-weight:800;
  line-height:1.25;
  text-shadow:0 1px 2px rgba(0,0,0,0.35);
}

.alertBox span:last-child{
  min-width:0;
}

.alertBox.urgent{
  background:linear-gradient(135deg,#e1000f,#b70015);
  box-shadow:0 10px 24px rgba(130,0,15,0.24);
}

.alertBox.is-empty{
  color:var(--muted);
  border-color:rgba(255,255,255,0.12);
  background:rgba(255,255,255,0.04);
}

.alertTag{
  flex:0 0 auto;
  border-radius:999px;
  padding:3px 8px;
  background:rgba(255,255,255,0.22);
  color:white;
  font-size:11px;
  font-weight:800;
  border:1px solid rgba(255,255,255,0.22);
  text-shadow:none;
}

.horaire{
  margin-left:auto;
  font-size:clamp(17px,2vw,27px);
  font-weight:800;
  color:#f5f7fb;
  font-variant-numeric:tabular-nums;
  white-space:nowrap;
}

.horaire.special{
  color:var(--amber);
}

.info{
  min-height:42px;
  max-height:42px;
  color:var(--amber);
  font-size:14px;
  font-weight:700;
  line-height:1.35;
  white-space:pre-line;
  overflow:auto;
}

.info:empty{
  display:none;
}

.loading{
  height:100%;
  display:grid;
  place-items:center;
  color:var(--muted);
  font-weight:800;
  text-align:center;
}

@media (max-width:900px){
  body{overflow:auto}
  .screen{
    min-height:100vh;
    height:auto;
    padding:10px;
  }
  header{
    grid-template-columns:1fr auto;
  }
  .brand img{height:38px}
  #clock{min-width:104px}
  .content{
    grid-template-columns:1fr;
  }
  .workCards,.paddockCards{
    grid-template-rows:none;
  }
  .cards{
    grid-auto-rows:minmax(132px,auto);
  }
}
</style>
</head>

<body>
<div class="screen">
  <header>
    <div class="brand">
      <img src="image/logo.png" alt="">
      <div class="brandText">
        <h1>Informations Ecurie</h1>
        <div class="subline"><span class="liveDot"></span><span id="dateLabel">Donnees en direct</span></div>
      </div>
    </div>
    <div></div>
    <div id="clock">--:--</div>
  </header>

  <main class="content">
    <section class="group">
      <div class="sectionTitle"><span>Espaces travail</span><span id="workMeta"></span></div>
      <div class="cards workCards">
        <article class="card" id="carriere"><div class="loading">Chargement...</div></article>
        <article class="card" id="manege"><div class="loading">Chargement...</div></article>
        <article class="card stableCard" id="ecurie-hours"><div class="loading">Chargement...</div></article>
      </div>
    </section>

    <section class="group">
      <div class="sectionTitle"><span>Paddocks</span><span id="paddockMeta"></span></div>
      <div class="cards paddockCards">
        <article class="card" id="maison"><div class="loading">Chargement...</div></article>
        <article class="card" id="grande-voie"><div class="loading">Chargement...</div></article>
        <article class="card" id="beudot"><div class="loading">Chargement...</div></article>
      </div>
    </section>
  </main>
</div>

<script>
const BASE_URL="https://script.google.com/macros/s/AKfycbzWEB8PPqSQ4rinnTbh4414U3QPX836XtPOPBmKr0Bw2W4mRFWAl7Chv6WKHOjrcWoZew/exec";
const STATUTS_URL=`${BASE_URL}?sheet=statuts`;
const HORAIRES_URL=`${BASE_URL}?sheet=horaires`;
const EXCEPTIONS_URL=`${BASE_URL}?sheet=exceptions`;
const REFRESH=10000;

const TITRES={
  "carriere":"Carriere",
  "manege":"Manege",
  "maison":"Maison",
  "grande-voie":"Grande voie",
  "beudot":"Beudot"
};

const ORDER=["carriere","manege","maison","grande-voie","beudot"];
const WORK=["carriere","manege"];
const PADDOCKS=["maison","grande-voie","beudot"];

let lastPayload="";

function escapeHTML(value){
  return String(value || "").replace(/[&<>"']/g,char=>({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    "\"":"&quot;",
    "'":"&#39;"
  }[char]));
}

function statusLabel(status){
  if(status==="ouvert") return "Ouvert";
  if(status==="ferme") return "Fermé";
  if(status==="prevision") return "Prévu";
  if(status==="hors-service") return "H. service";
  return "";
}

function statusClass(status){
  if(status==="ouvert") return "open";
  if(status==="ferme") return "closed";
  if(status==="prevision") return "prevision";
  if(status==="hors-service") return "hors-service";
  return "";
}

function badgeYN(v){
  if(v==="oui") return `<span class="badge oui">OUI</span>`;
  if(v==="non") return `<span class="badge non">NON</span>`;
  return "";
}

function timeFromMinutes(value){
  if(value===null || value===undefined) return "";
  const hours=Math.floor(value/60);
  const minutes=value%60;
  return String(hours).padStart(2,"0")+":"+String(minutes).padStart(2,"0");
}

function formatSheetTime(value){
  if(!value) return "";
  const date=new Date(value);
  if(Number.isNaN(date.getTime())) return String(value);
  const totalMinutes=date.getUTCHours()*60+date.getUTCMinutes()+date.getUTCSeconds()/60;
  const rounded=Math.round(totalMinutes/30)*30;
  const hours=String(Math.floor(rounded/60)%24).padStart(2,"0");
  const minutes=String(rounded%60).padStart(2,"0");
  return `${hours}:${minutes}`;
}

function localIsoDate(date){
  return date.getFullYear()+"-"+String(date.getMonth()+1).padStart(2,"0")+"-"+String(date.getDate()).padStart(2,"0");
}

function localIsoFromSheetDate(value){
  if(!value) return "";
  const date=new Date(value);
  if(Number.isNaN(date.getTime())) return "";
  return localIsoDate(date);
}

function todayDayName(){
  return new Date().toLocaleDateString("fr-FR",{weekday:"long"}).toLowerCase();
}

function displayHours(value){
  return String(value || "").replace(/\s*-\s*/g," - ");
}

function buildCard(e){
  const isTravail=(e.espace==="carriere" || e.espace==="manege");
  const icon=isTravail ? "image/travail.svg" : "image/paddock.svg";
  const horaire=e.horaire_special || e.horaire_affiche || "";
  const status=e.statut_auto || "";
  const label=statusLabel(status);
  const klass=statusClass(status);

  return `
    <div class="cardTop">
      <div class="titleWrap">
        <img src="${icon}" alt="">
        <div class="cardTitle">${escapeHTML(TITRES[e.espace] || e.espace)}</div>
      </div>
      <span class="statusText ${klass}">${escapeHTML(label)}</span>
    </div>

    ${
      isTravail
      ? `
        <div class="cardMiddle">
          <div class="metric"><span>Liberté</span>${badgeYN(e.liberte)}</div>
          <div class="metric"><span>Longe</span>${badgeYN(e.longe)}</div>
          <div class="horaire ${e.horaire_special ? "special" : ""}">${escapeHTML(horaire)}</div>
        </div>
      `
      : `
        <div class="cardMiddle">
          <div class="horaire ${e.horaire_special ? "special" : ""}">${escapeHTML(horaire)}</div>
        </div>
      `
    }

    <div class="info">${escapeHTML(e.info || "")}</div>
  `;
}

function buildStableCard(data,horaires,exceptions){
  const today=localIsoDate(new Date());
  const exception=exceptions.find(row=>localIsoFromSheetDate(row.date)===today && row.message);
  const dayRow=horaires.find(row=>String(row.jour || "").toLowerCase()===todayDayName());
  const hours=displayHours(exception?.message || (dayRow ? `${formatSheetTime(dayRow.ouvert)} - ${formatSheetTime(dayRow.ferme)}` : "Horaires non definis"));
  const alertRow=data.find(row=>row.espace==="accueil");
  const alertText=alertRow?.alerte || "";
  const alertIsUrgent=String(alertRow?.urgent || "").trim().toLowerCase()==="oui";
  const sourceLabel=exception ? "Horaires adaptes" : "Horaires habituels";

  return `
    <div class="cardTop">
      <div class="titleWrap">
        <img src="image/time.svg" alt="">
        <div class="cardTitle">Horaires Ecurie</div>
      </div>
      <span class="todayText">Aujourd'hui</span>
    </div>
    <div class="stableBody">
      <div class="stableHours">
        <div class="stableTime">${escapeHTML(hours)}</div>
        <div class="stableMeta">${escapeHTML(sourceLabel)}</div>
      </div>
      <div class="alertBox ${alertText ? (alertIsUrgent ? "urgent" : "") : "is-empty"}">
        ${alertText ? `<span class="alertTag">Alerte</span><span>${escapeHTML(alertText)}</span>` : "<span>Aucune alerte</span>"}
      </div>
    </div>
  `;
}

function applyCardState(el,status){
  el.classList.remove("is-open","is-closed","is-prevision","is-hors-service");
  if(status==="ouvert") el.classList.add("is-open");
  if(status==="ferme") el.classList.add("is-closed");
  if(status==="prevision") el.classList.add("is-prevision");
  if(status==="hors-service") el.classList.add("is-hors-service");
}

function renderData(data,horaires=[],exceptions=[]){
  ORDER.forEach(espace=>{
    const row=data.find(e=>e.espace===espace);
    const el=document.getElementById(espace);
    if(!row || !el) return;
    el.innerHTML=buildCard(row);
    applyCardState(el,row.statut_auto);
  });

  const openWork=WORK.filter(espace=>data.find(e=>e.espace===espace)?.statut_auto==="ouvert").length;
  const openPaddocks=PADDOCKS.filter(espace=>data.find(e=>e.espace===espace)?.statut_auto==="ouvert").length;
  document.getElementById("workMeta").innerText=`${openWork}/${WORK.length} ouverts`;
  document.getElementById("paddockMeta").innerText=`${openPaddocks}/${PADDOCKS.length} ouverts`;

  const stable=document.getElementById("ecurie-hours");
  if(stable) stable.innerHTML=buildStableCard(data,horaires,exceptions);
}

function loadData(){
  Promise.all([
    fetch(STATUTS_URL,{cache:"no-store"}).then(r=>r.json()),
    fetch(HORAIRES_URL,{cache:"no-store"}).then(r=>r.json()),
    fetch(EXCEPTIONS_URL,{cache:"no-store"}).then(r=>r.json())
  ])
  .then(([data,horaires,exceptions])=>{
    const payload=JSON.stringify({data,horaires,exceptions});
    if(payload===lastPayload) return;
    lastPayload=payload;
    renderData(data,horaires,exceptions);
  })
  .catch(()=>{
    document.getElementById("dateLabel").innerText="Connexion aux donnees en attente";
  });
}

loadData();
setInterval(loadData,REFRESH);

function updateClock(){
  const d=new Date();
  const h=String(d.getHours()).padStart(2,"0");
  const m=String(d.getMinutes()).padStart(2,"0");
  document.getElementById("clock").innerText=h+":"+m;
  document.getElementById("dateLabel").innerText=d.toLocaleDateString("fr-FR",{weekday:"long",day:"2-digit",month:"long"});
}

updateClock();
setInterval(updateClock,1000);

/* DOUBLE TAP -> PLANNING */

let lastTap=0;

document.addEventListener("touchend",function(){
  const now=new Date().getTime();
  if(now-lastTap<300){
    window.location.href="planning.html";
  }
  lastTap=now;
});

document.addEventListener("click",function(){
  const now=new Date().getTime();
  if(now-lastTap<300){
    window.location.href="planning.html";
  }
  lastTap=now;
});
</script>
</body>
</html>
