<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Écran Informations - Écurie</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:'Montserrat',sans-serif;
  background:#000;
  color:white;
}

/* ===== HEADER ===== */

header{
  min-height:70px;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  padding:10px;
}

header img{
  position:absolute;
  left:15px;
  height:clamp(30px,4vw,50px);
  filter:brightness(0) invert(1)
         drop-shadow(0 0 6px rgba(255,255,255,0.6));
}

header h1{
  margin:0;
  font-size:clamp(18px,2.2vw,32px);
  font-weight:700;
  text-align:center;
}

#clock{
  position:absolute;
  right:18px;
  font-size:clamp(16px,2vw,28px);
  font-weight:700;
}

/* ===== SECTIONS ===== */

.section-title{
  margin:clamp(15px,2vw,30px) clamp(15px,3vw,40px) 10px;
  font-size:clamp(14px,1.6vw,22px);
  font-weight:700;
}

/* ===== GRID ===== */

.grid{
  display:grid;
  grid-template-columns:1fr;
  gap:clamp(12px,2vw,25px);
  padding:0 clamp(15px,3vw,40px);
}

/* tablette */

@media(min-width:700px){
.grid{
  grid-template-columns:1fr 1fr;
}
}

/* écran large */

@media(min-width:1200px){
.grid{
  grid-template-columns:1fr 1fr 1fr;
}
}

/* ===== CARDS ===== */

.card{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.18);
  padding:clamp(14px,2vw,22px);
  border-radius:18px;
  box-shadow:0 8px 26px rgba(0,0,0,0.7);
}

.card-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.title-wrap{
  display:flex;
  align-items:center;
  gap:10px;
}

.title-wrap img{
  width:clamp(22px,2vw,32px);
}

.card-title{
  font-size:clamp(18px,2vw,28px);
  font-weight:700;
}

.card-top img.statut{
  width:clamp(22px,2vw,32px);
}

/* ===== LIGNE ===== */

.card-middle{
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:8px;
  flex-wrap:wrap;
}

.badge{
  font-weight:700;
  font-size:clamp(12px,1.2vw,16px);
}

.badge.oui{ color:#4caf50; }
.badge.non{ color:#f44336; }

.horaire{
  margin-left:auto;
  font-size:clamp(13px,1.2vw,18px);
  font-weight:600;
  color:#f5f5f5;
}

.info{
  margin-top:10px;
  font-size:clamp(13px,1.3vw,18px);
  font-weight:500;
  color:#ffb347;
  white-space:pre-line;
}

</style>
</head>

<body>

<header>
  <img src="image/logo.png">
  <h1>INFORMATIONS ÉCURIE</h1>
  <div id="clock">--:--</div>
</header>

<div class="section-title">ESPACES TRAVAIL</div>

<div class="grid">
  <div class="card" id="carriere"></div>
  <div class="card" id="manege"></div>
</div>

<div class="section-title">PADDOCKS</div>

<div class="grid">
  <div class="card" id="maison"></div>
  <div class="card" id="grande-voie"></div>
  <div class="card" id="beudot"></div>
</div>

<script>

const SHEET_URL="https://opensheet.elk.sh/1-VbRioKfM6JHU-Oep0pa6H3S0VVuvYLyUMXTdSdRbzI/statuts";
const REFRESH=60000;

const ICONS_STATUT={
  "ouvert":"image/ouvert.png",
  "ferme":"image/ferme.png",
  "prevision":"image/prevision.png",
  "hors-service":"image/horsservice.png"
};

const TITRES={
  "carriere":"Carrière",
  "manege":"Manège",
  "maison":"Maison",
  "grande-voie":"Grande voie",
  "beudot":"Beudot"
};

function badgeYN(v){
  if(v==="oui") return `<span class="badge oui">OUI</span>`;
  if(v==="non") return `<span class="badge non">NON</span>`;
  return "";
}

function buildCard(e){

  const isTravail = (e.espace==="carriere" || e.espace==="manege");

  return `
    <div class="card-top">
      <div class="title-wrap">
        <img src="image/travail.svg">
        <div class="card-title">${TITRES[e.espace]}</div>
      </div>
      <img class="statut" src="${ICONS_STATUT[e.statut_auto]}">
    </div>

    ${
      isTravail
      ? `
        <div class="card-middle">
          <div>Liberté</div>
          ${badgeYN(e.liberte)}
          <div>Longe</div>
          ${badgeYN(e.longe)}
          <div class="horaire" style="color:${e.horaire_special ? "#ffb347":"#f5f5f5"}">
            ${e.horaire_special || e.horaire_affiche || ""}
          </div>
        </div>
      `
      : `
        <div class="card-middle">
          <div class="horaire" style="color:${e.horaire_special ? "#ffb347":"#f5f5f5"}">
            ${e.horaire_special || e.horaire_affiche || ""}
          </div>
        </div>
      `
    }

    <div class="info">${e.info || ""}</div>
  `;
}

function loadData(){
fetch(SHEET_URL,{cache:"no-store"})
.then(r=>r.json())
.then(data=>{
  ["carriere","manege","maison","grande-voie","beudot"].forEach(espace=>{
    const row=data.find(e=>e.espace===espace);
    if(!row) return;
    document.getElementById(espace).innerHTML = buildCard(row);
  });
});
}

loadData();
setInterval(loadData,REFRESH);

function updateClock(){
  const d=new Date();
  const h=String(d.getHours()).padStart(2,"0");
  const m=String(d.getMinutes()).padStart(2,"0");
  document.getElementById("clock").innerText=h+":"+m;
}

updateClock();
setInterval(updateClock,1000);

</script>
