<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paddocks</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>

/* BASE */

body{
margin:0;
background:#f4f4f4;
font-family:'Montserrat',sans-serif;
color:#000;
transition:background .3s ease,color .3s ease;
}

/* PAGE */

.page{
min-height:100vh;
transform:translateX(100%);
transition:0.35s;
}

.page.active{ transform:translateX(0); }
.page.exit{ transform:translateX(100%); }

/* HEADER */

header{
position:relative;
height:70px;
}

#backBtn{
position:absolute;
left:15px;
top:50%;
transform:translateY(-50%);
width:42px;
height:42px;
border-radius:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 3px 8px rgba(0,0,0,0.15);
cursor:pointer;
}

#backBtn img{
width:22px;
}

header h1{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
margin:0;
font-size:18px;
font-weight:700;
}

/* CARD */

.card{
background:white;
margin:20px;
padding:22px;
border-radius:22px;
box-shadow:0 5px 12px rgba(0,0,0,0.12);
}

/* SELECT */

.selectors{
display:grid;
gap:12px;
margin-bottom:20px;
}

select{
padding:12px;
border-radius:10px;
border:1px solid #ccc;
font-family:'Montserrat';
}

/* SLOT */

.slot{
background:#f4f4f4;
padding:12px;
border-radius:10px;
margin-bottom:8px;
display:flex;
justify-content:space-between;
align-items:center;
}

.free{color:#4caf50;}
.booked{color:#f44336;}

button{
border:none;
padding:6px 10px;
border-radius:8px;
font-weight:600;
cursor:pointer;
font-family:'Montserrat';
}

.reserve{background:#4caf50;color:white;}
.cancel{background:#f44336;color:white;}

/* DARK MODE */

@media (prefers-color-scheme: dark){

body{
background:#0f1115;
color:white;
}

header h1{
color:white;
}

#backBtn{
background:#1c1f26;
box-shadow:0 12px 30px rgba(0,0,0,0.6);
}

#backBtn img{
filter:brightness(0) invert(1);
}

.card{
background:#1c1f26;
box-shadow:0 25px 60px rgba(0,0,0,0.75);
}

.slot{
background:#252a33;
}

}

</style>
</head>

<body>

<div class="page" id="page">

<header>
<div id="backBtn" onclick="goBack()">
<img src="image/back.svg">
</div>
<h1>PADDOCKS</h1>
</header>

<div class="card">

<div class="selectors">

<select id="paddock">
<option value="maison">Maison</option>
<option value="grande">Grande voie</option>
<option value="beudot">Beudot</option>
</select>

<select id="day"></select>

<select id="duration">
<option value="60">1h</option>
<option value="90">1h30</option>
</select>

</div>

<div id="slots"></div>

</div>

</div>

<script>

/* PAGE ANIMATION */

window.addEventListener("DOMContentLoaded",()=>{
requestAnimationFrame(()=>{
document.getElementById("page").classList.add("active");
});
});

/* CONFIG */

const OPEN="08:30";
const CLOSE="19:00";

let reservations=[];

const paddockSelect=document.getElementById("paddock");
const daySelect=document.getElementById("day");
const durationSelect=document.getElementById("duration");
const slotsContainer=document.getElementById("slots");

/* DAYS */

for(let i=0;i<3;i++){

const d=new Date();
d.setDate(d.getDate()+i);

const label=d.toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"short"});
const value=d.toISOString().slice(0,10);

const opt=document.createElement("option");
opt.value=value;
opt.textContent=label;

daySelect.appendChild(opt);

}

/* TIME */

function addMinutes(time,min){

const [h,m]=time.split(":").map(Number);

const d=new Date();
d.setHours(h);
d.setMinutes(m+min);

return d;

}

function timeStr(d){

return String(d.getHours()).padStart(2,"0")+":"+
String(d.getMinutes()).padStart(2,"0");

}

/* BUILD PLANNING */

function buildPlanning(){

let current=addMinutes(OPEN,0);
const close=addMinutes(CLOSE,0);

let slots=[];

while(current < close){

slots.push(timeStr(current));
current.setMinutes(current.getMinutes()+60);

}

reservations.forEach(r=>{

const start=r.time;
const end=timeStr(addMinutes(r.time,r.duration));

const index=slots.indexOf(start);

if(index!==-1){

slots[index]=start+"|reserved";

if(slots[index+1]) slots[index+1]=end;

}

});

return slots;

}

/* RENDER */

function render(){

slotsContainer.innerHTML="";

const slots=buildPlanning();

const paddock=paddockSelect.value;
const day=daySelect.value;

slots.forEach(t=>{

const slot=document.createElement("div");
slot.className="slot";

if(t.includes("|reserved")){

const time=t.split("|")[0];

slot.innerHTML=`
<div>${time}</div>
<div class="booked">Réservé</div>
`;

}else{

slot.innerHTML=`
<div>${t}</div>
<div class="free">Libre</div>
<button class="reserve">Réserver</button>
`;

slot.querySelector("button").onclick=()=>reserve(paddock,day,t);

}

slotsContainer.appendChild(slot);

});

}

/* RESERVE */

function reserve(paddock,day,time){

const name=prompt("Votre prénom");

if(!name) return;

const duration=parseInt(durationSelect.value);

const id=Math.random().toString(36).substring(2,8);

localStorage.setItem("reservation_id",id);

reservations.push({
id,
name,
paddock,
day,
time,
duration
});

render();

}

/* EVENTS */

paddockSelect.onchange=render;
daySelect.onchange=render;
durationSelect.onchange=render;

render();

/* BACK */

function goBack(){
const p=document.getElementById("page");
p.classList.remove("active");
p.classList.add("exit");
setTimeout(()=>{ location.href="index.html"; },300);
}

</script>

</body>
</html>
