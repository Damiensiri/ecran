<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Réservation paddock</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#f4f4f4;
font-family:'Montserrat',sans-serif;
}

.page{
min-height:100vh;
transform:translateX(100%);
transition:.35s;
}

.page.active{transform:translateX(0);}
.page.exit{transform:translateX(100%);}

header{
position:relative;
height:70px;
}

#backBtn{
position:absolute;
left:15px;
top:50%;
transform:translateY(-50%);
width:42px;
height:42px;
border-radius:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 3px 8px rgba(0,0,0,0.15);
cursor:pointer;
}

#backBtn img{width:22px;}

header h1{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
margin:0;
font-size:18px;
font-weight:700;
}

.card{
background:white;
margin:20px;
padding:22px;
border-radius:22px;
box-shadow:0 5px 12px rgba(0,0,0,0.12);
}

select,input{
width:100%;
padding:12px;
margin-top:8px;
margin-bottom:16px;
border-radius:10px;
border:none;
background:#f0f0f0;
font-family:inherit;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#181E3B;
color:white;
font-weight:700;
cursor:pointer;
}

.slots{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:15px;
}

.slot{
background:#eee;
padding:10px;
border-radius:10px;
text-align:center;
cursor:pointer;
}

.slot.booked{
background:#ddd;
cursor:default;
}

.booked{
font-size:12px;
color:#555;
}

.cancel{
margin-top:6px;
background:#c0392b;
padding:6px;
font-size:12px;
border-radius:6px;
}

@media(prefers-color-scheme:dark){

body{background:#0f1115;color:white}

.card{background:#1c1f26}

select,input{background:#252a33;color:white}

.slot{background:#252a33}

.slot.booked{background:#333}

}

</style>
</head>

<body>

<div class="page" id="page">

<header>
<div id="backBtn" onclick="goBack()">
<img src="image/back.svg">
</div>
<h1>PADDOCK</h1>
</header>

<div class="card">

<label>Durée</label>
<select id="duration">
<option value="60">1h</option>
<option value="90">1h30</option>
</select>

<label>Paddock</label>
<select id="paddock">
<option value="maison">Maison</option>
<option value="grande">Grande voie</option>
<option value="beudot">Beudot</option>
</select>

<label>Jour</label>
<input type="date" id="date">

<label>Prénom</label>
<input id="name">

<label>Email (confirmation optionnelle)</label>
<input id="email">

<button onclick="book()">Réserver</button>

<div class="slots" id="slots"></div>

</div>

</div>

<script>

window.addEventListener("DOMContentLoaded",()=>{
requestAnimationFrame(()=>{
document.getElementById("page").classList.add("active");
});
});

let reservations = JSON.parse(localStorage.getItem("paddock_reservations")||"[]");

const horaires={
maison:{open:"08:30",close:"19:00"},
grande:{open:"08:30",close:"19:00"},
beudot:{open:"08:30",close:"19:00"}
};

function generateSlots(){

const paddock=document.getElementById("paddock").value;
const duration=parseInt(document.getElementById("duration").value);
const date=document.getElementById("date").value;

const slots=document.getElementById("slots");
slots.innerHTML="";

if(!date)return;

const h=horaires[paddock];

let start=h.open.split(":");
let end=h.close.split(":");

let current=new Date(date+"T"+start[0]+":"+start[1]);
let close=new Date(date+"T"+end[0]+":"+end[1]);

while(true){

let next=new Date(current.getTime()+duration*60000);
if(next>close)break;

const now=new Date();

if(date===now.toISOString().slice(0,10) && current<now){
current=next;
continue;
}

let time=current.toTimeString().slice(0,5);

let r=reservations.find(r=>r.date===date && r.time===time && r.paddock===paddock);

const slot=document.createElement("div");
slot.className="slot";

if(!r){

slot.innerHTML=time;

slot.onclick=()=>{
document.getElementById("selectedTime").value=time;
};

}else{

slot.classList.add("booked");

const myId=localStorage.getItem("reservation_id");

slot.innerHTML=`
<div>${time}</div>
<div class="booked">${r.name}</div>
`;

if(myId===r.id){

const btn=document.createElement("button");
btn.className="cancel";
btn.textContent="Annuler";

btn.onclick=()=>cancelReservation(r.id);

slot.appendChild(btn);

}

}

slots.appendChild(slot);

current=next;

}

}

function book(){

const name=document.getElementById("name").value.trim();
if(!name){alert("Prénom obligatoire");return;}

const paddock=document.getElementById("paddock").value;
const duration=parseInt(document.getElementById("duration").value);
const date=document.getElementById("date").value;

const slots=document.querySelectorAll(".slot");
let time=null;

slots.forEach(s=>{
if(s.style.border==="2px solid green")time=s.innerText;
});

if(!time){alert("Choisissez un créneau");return;}

const id=Date.now().toString();

reservations.push({id,name,paddock,date,time,duration});

localStorage.setItem("reservation_id",id);
localStorage.setItem("paddock_reservations",JSON.stringify(reservations));

generateSlots();

}

function cancelReservation(id){

if(!confirm("Annuler votre réservation ?"))return;

reservations=reservations.filter(r=>r.id!==id);

localStorage.removeItem("reservation_id");
localStorage.setItem("paddock_reservations",JSON.stringify(reservations));

generateSlots();

}

document.getElementById("paddock").onchange=generateSlots;
document.getElementById("duration").onchange=generateSlots;
document.getElementById("date").onchange=generateSlots;

function goBack(){
const p=document.getElementById("page");
p.classList.remove("active");
p.classList.add("exit");
setTimeout(()=>{location.href="index.html"},300);
}

</script>

</body>
</html>
