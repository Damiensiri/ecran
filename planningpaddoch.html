<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Réservation paddock</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#f4f4f4;
font-family:'Montserrat',sans-serif;
transition:.3s;
}

.page{
min-height:100vh;
transform:translateX(100%);
transition:.35s;
}

.page.active{transform:translateX(0);}
.page.exit{transform:translateX(100%);}

header{
position:relative;
height:70px;
}

#backBtn{
position:absolute;
left:15px;
top:50%;
transform:translateY(-50%);
width:42px;
height:42px;
border-radius:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 3px 8px rgba(0,0,0,0.15);
cursor:pointer;
}

#backBtn img{width:22px}

header h1{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
margin:0;
font-size:18px;
font-weight:700;
}

.card{
background:white;
margin:20px;
padding:22px;
border-radius:22px;
box-shadow:0 5px 12px rgba(0,0,0,0.12);
}

label{
font-weight:600;
font-size:14px;
}

select,input{
width:100%;
padding:12px;
margin-top:6px;
margin-bottom:16px;
border-radius:10px;
border:none;
background:#f4f4f4;
}

button{
width:100%;
padding:14px;
border-radius:12px;
border:none;
background:#181E3B;
color:white;
font-weight:700;
cursor:pointer;
margin-top:20px;
}

.dayBtn{
padding:10px;
margin-bottom:8px;
border-radius:10px;
background:#f4f4f4;
text-align:center;
cursor:pointer;
font-weight:600;
}

.dayBtn.active{
background:#181E3B;
color:white;
}

.row{
display:flex;
justify-content:space-between;
padding:10px;
border-bottom:1px solid #eee;
}

.row.free{cursor:pointer}

.row.free:hover{
background:#f0f0f0;
}

.row.booked{color:#777}

.row.selected{
background:#c9d7ff;
border-left:4px solid #181E3B;
}

.freeText{
color:#2ecc71;
font-weight:600;
}

.cancel{
font-size:12px;
background:#c0392b;
padding:4px 6px;
border-radius:6px;
color:white;
cursor:pointer;
}

.fullMessage{
text-align:center;
padding:15px;
font-weight:600;
color:#999;
}

/* DARK MODE */

@media(prefers-color-scheme:dark){

body{background:#0f1115;color:white}

.card{background:#1c1f26}

select,input{background:#252a33;color:white}

.row.free:hover{background:#252a33}

.dayBtn{background:#252a33}

.row.selected{
background:#2b3560;
border-left:4px solid #5f7cff;
}

.row.selected .freeText{
color:#00ff88;
}

.fullMessage{
color:#aaa;
}

}

</style>
</head>

<body>

<div class="page" id="page">

<header>
<div id="backBtn" onclick="goBack()">
<img src="image/back.svg">
</div>
<h1>PADDOCK</h1>
</header>

<div class="card">

<label>Durée</label>
<select id="duration">
<option value="60">1h</option>
<option value="90">1h30</option>
</select>

<label>Paddock</label>
<select id="paddock">
<option value="maison">Maison</option>
<option value="grande">Grande voie</option>
<option value="beudot">Beudot</option>
</select>

<label>Jour</label>
<div id="days"></div>

<label>Prénom</label>
<input id="name">

<label>Email (optionnel)</label>
<input id="email">

<div id="planning"></div>

<button onclick="book()">Réserver</button>

</div>

</div>

<script>

window.addEventListener("DOMContentLoaded",()=>{
document.getElementById("page").classList.add("active");
buildDays();
});

let reservations=JSON.parse(localStorage.getItem("paddock_reservations")||"[]");

let selectedDate=null;
let selected=null;

const horaires={
maison:{open:"08:30",close:"19:00"},
grande:{open:"08:30",close:"19:00"},
beudot:{open:"08:30",close:"19:00"}
};

function buildDays(){

const names=["dimanche","lundi","mardi","mercredi","jeudi","vendredi","samedi"];

const container=document.getElementById("days");
container.innerHTML="";

for(let i=0;i<3;i++){

let d=new Date();
d.setDate(d.getDate()+i);

let label=i===0?"Aujourd’hui":i===1?"Demain":"Après-demain";

let btn=document.createElement("div");
btn.className="dayBtn";

btn.innerText=
label+" - "+
names[d.getDay()].charAt(0).toUpperCase()+
names[d.getDay()].slice(1)+" "+
d.getDate();

btn.onclick=()=>{

selectedDate=d.toISOString().slice(0,10);

document.querySelectorAll(".dayBtn").forEach(b=>b.classList.remove("active"));

btn.classList.add("active");

generate();

};

container.appendChild(btn);

if(i===0){
btn.classList.add("active");
selectedDate=d.toISOString().slice(0,10);
}

}

generate();

}

function generate(){

const duration=parseInt(document.getElementById("duration").value);
const paddock=document.getElementById("paddock").value;

const now=new Date();

const container=document.getElementById("planning");
container.innerHTML="";

let freeFound=false;

let start=horaires[paddock].open.split(":");
let end=horaires[paddock].close.split(":");

let current=new Date(selectedDate+"T"+start[0]+":"+start[1]);
let close=new Date(selectedDate+"T"+end[0]+":"+end[1]);

while(true){

let next=new Date(current.getTime()+duration*60000);
if(next>close)break;

let time=current.toTimeString().slice(0,5);

if(selectedDate===now.toISOString().slice(0,10) && current<now){
current=next;
continue;
}

let r=reservations.find(r=>r.date===selectedDate && r.time===time && r.paddock===paddock);

let row=document.createElement("div");

if(!r){

freeFound=true;

row.className="row free";
row.innerHTML=`<div>${time}</div><div class="freeText">libre</div>`;

row.onclick=()=>{

selected={time,paddock,date:selectedDate,duration};

document.querySelectorAll(".row").forEach(r=>r.classList.remove("selected"));

row.classList.add("selected");

};

}else{

row.className="row booked";
row.innerHTML=`<div>${time}</div><div>${r.name}</div>`;

const myId=localStorage.getItem("reservation_id");

if(myId===r.id){

const btn=document.createElement("div");
btn.className="cancel";
btn.innerText="Annuler";

btn.onclick=(e)=>{
e.stopPropagation();
cancelReservation(r.id);
};

row.appendChild(btn);

}

}

container.appendChild(row);

current=next;

}

if(!freeFound){

const msg=document.createElement("div");
msg.className="fullMessage";
msg.innerText="Complet aujourd’hui";

container.appendChild(msg);

}

}

function book(){

const name=document.getElementById("name").value.trim();

if(!name){
alert("Prénom obligatoire");
return;
}

if(!selected){
alert("Choisissez un créneau");
return;
}

if(reservations.find(r=>r.date===selected.date && r.time===selected.time && r.paddock===selected.paddock)){
alert("Créneau déjà réservé");
return;
}

const id=Date.now().toString();

reservations.push({
id,
name,
email:document.getElementById("email").value,
paddock:selected.paddock,
date:selected.date,
time:selected.time,
duration:selected.duration
});

localStorage.setItem("reservation_id",id);
localStorage.setItem("paddock_reservations",JSON.stringify(reservations));

generate();

}

function cancelReservation(id){

if(!confirm("Annuler votre réservation ?"))return;

reservations=reservations.filter(r=>r.id!==id);

localStorage.removeItem("reservation_id");
localStorage.setItem("paddock_reservations",JSON.stringify(reservations));

generate();

}

document.getElementById("duration").onchange=generate;
document.getElementById("paddock").onchange=generate;

function goBack(){

const p=document.getElementById("page");

p.classList.remove("active");
p.classList.add("exit");

setTimeout(()=>{
location.href="index.html";
},300);

}

</script>

</body>
</html>
