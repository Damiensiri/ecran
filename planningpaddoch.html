<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paddocks</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#f4f4f4;
font-family:'Montserrat',sans-serif;
color:#000;
transition:background .3s ease,color .3s ease;
}

/* PAGE */

.page{
min-height:100vh;
transform:translateX(100%);
transition:.35s;
}

.page.active{transform:translateX(0);}
.page.exit{transform:translateX(100%);}

/* HEADER */

header{
position:relative;
height:70px;
}

#backBtn{
position:absolute;
left:15px;
top:50%;
transform:translateY(-50%);
width:42px;
height:42px;
border-radius:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 3px 8px rgba(0,0,0,0.15);
cursor:pointer;
}

#backBtn img{width:22px;}

header h1{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
margin:0;
font-size:18px;
font-weight:700;
}

/* CARD */

.card{
background:white;
margin:20px;
padding:22px;
border-radius:22px;
box-shadow:0 5px 12px rgba(0,0,0,0.12);
}

/* SELECT */

.selectors{
display:grid;
gap:12px;
margin-bottom:20px;
}

select{
padding:12px;
border-radius:10px;
border:1px solid #ccc;
font-family:'Montserrat';
}

/* SLOT */

.slot{
background:#f4f4f4;
padding:12px;
border-radius:10px;
margin-bottom:8px;
display:flex;
justify-content:space-between;
align-items:center;
}

.free{color:#4caf50;}
.booked{color:#f44336;}

button{
border:none;
padding:6px 10px;
border-radius:8px;
font-weight:600;
cursor:pointer;
font-family:'Montserrat';
}

.reserve{background:#4caf50;color:white;}
.cancel{background:#f44336;color:white;}

.closed{
text-align:center;
padding:20px;
font-weight:600;
}

/* DARK */

@media (prefers-color-scheme: dark){

body{background:#0f1115;color:white;}

header h1{color:white;}

#backBtn{
background:#1c1f26;
box-shadow:0 12px 30px rgba(0,0,0,0.6);
}

#backBtn img{
filter:brightness(0) invert(1);
}

.card{
background:#1c1f26;
box-shadow:0 25px 60px rgba(0,0,0,0.75);
}

.slot{
background:#252a33;
}

}

</style>
</head>

<body>

<div class="page" id="page">

<header>
<div id="backBtn" onclick="goBack()">
<img src="image/back.svg">
</div>
<h1>PADDOCKS</h1>
</header>

<div class="card">

<div class="selectors">

<select id="paddock">
<option value="maison">Maison</option>
<option value="grande">Grande voie</option>
<option value="beudot">Beudot</option>
</select>

<select id="day"></select>

<select id="duration"></select>

</div>

<div id="slots"></div>

</div>

</div>

<script>

/* PAGE ANIMATION */

window.addEventListener("DOMContentLoaded",()=>{
requestAnimationFrame(()=>{
document.getElementById("page").classList.add("active");
});
});

/* HORAIRES (temporaire avant Sheet) */

const horaires={
maison:{
lundi:["08:30","19:00"],
mardi:["08:30","19:00"],
mercredi:["08:30","19:00"],
jeudi:["08:30","19:00"],
vendredi:["08:30","19:00"],
samedi:["09:00","18:00"],
dimanche:null
},
grande:{
lundi:["09:00","18:00"],
mardi:["09:00","18:00"],
mercredi:["09:00","18:00"],
jeudi:["09:00","18:00"],
vendredi:["09:00","18:00"],
samedi:["09:00","17:00"],
dimanche:["09:00","17:00"]
},
beudot:{
lundi:null,
mardi:["10:00","17:00"],
mercredi:["10:00","17:00"],
jeudi:["10:00","17:00"],
vendredi:["10:00","17:00"],
samedi:["10:00","16:00"],
dimanche:null
}
};

/* DURÉE PAR PADDOCK */

const durees={
maison:[60],
grande:[60,90],
beudot:[60,90]
};

let reservations=[];

const paddockSelect=document.getElementById("paddock");
const daySelect=document.getElementById("day");
const durationSelect=document.getElementById("duration");
const slotsContainer=document.getElementById("slots");

/* JOURS */

for(let i=0;i<3;i++){

const d=new Date();
d.setDate(d.getDate()+i);

const label=d.toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"short"});
const value=d.toISOString().slice(0,10);

const opt=document.createElement("option");
opt.value=value;
opt.textContent=label;

daySelect.appendChild(opt);

}

/* DURÉES */

function updateDurations(){

const p=paddockSelect.value;

durationSelect.innerHTML="";

durees[p].forEach(d=>{

const opt=document.createElement("option");

opt.value=d;
opt.textContent=(d==60?"1h":"1h30");

durationSelect.appendChild(opt);

});

}

/* TIME */

function addMinutes(time,min){

const [h,m]=time.split(":").map(Number);

const d=new Date();
d.setHours(h);
d.setMinutes(m+min);

return d;

}

function timeStr(d){

return String(d.getHours()).padStart(2,"0")+":"+
String(d.getMinutes()).padStart(2,"0");

}

/* SLOTS */

function buildSlots(open,close){

const duration=parseInt(durationSelect.value);

let slots=[];

let current=addMinutes(open,0);
const end=addMinutes(close,0);

while(current < end){

const endSlot=new Date(current);
endSlot.setMinutes(endSlot.getMinutes()+duration);

if(endSlot <= end){
slots.push(timeStr(current));
}

current.setMinutes(current.getMinutes()+60);

}

return slots;

}

/* OVERLAP */

function overlap(s1,d1,s2,d2){

const start1=addMinutes(s1,0);
const end1=addMinutes(s1,d1);

const start2=addMinutes(s2,0);
const end2=addMinutes(s2,d2);

return(start1 < end2 && end1 > start2);

}

/* RENDER */

function render(){

slotsContainer.innerHTML="";

const paddock=paddockSelect.value;

const jour=["dimanche","lundi","mardi","mercredi","jeudi","vendredi","samedi"][new Date(daySelect.value).getDay()];

const h=horaires[paddock][jour];

if(!h){
slotsContainer.innerHTML=`<div class="closed">Paddock fermé aujourd'hui</div>`;
return;
}

let slots=buildSlots(h[0],h[1]);

const now=new Date();
const today=new Date().toISOString().slice(0,10);

slots.forEach(t=>{

if(daySelect.value===today){

const slotTime=addMinutes(t,0);

if(slotTime <= now){
return;
}

}

const slot=document.createElement("div");
slot.className="slot";

const r=reservations.find(e=>e.time===t && e.day===daySelect.value && e.paddock===paddock);

if(!r){

slot.innerHTML=`
<div>${t}</div>
<div class="free">Libre</div>
<button class="reserve">Réserver</button>
`;

slot.querySelector("button").onclick=()=>reserve(paddock,daySelect.value,t);

}else{

slot.innerHTML=`
<div>${t}</div>
<div class="booked">${r.name}</div>
`;

}

slotsContainer.appendChild(slot);

});

}

/* RESERVE */

function reserve(paddock,day,time){

let name=prompt("Votre prénom (obligatoire)");

if(!name || name.trim()===""){
alert("Le prénom est obligatoire");
return;
}

let email=prompt("Email confirmation (facultatif)");

const duration=parseInt(durationSelect.value);

/* anti chevauchement */

const conflict=reservations.find(r=>{

if(r.day!==day) return false;

return overlap(time,duration,r.time,r.duration);

});

if(conflict){

alert("Vous avez déjà une réservation sur ce créneau");
return;

}

const id=Math.random().toString(36).substring(2,8);

localStorage.setItem("reservation_id",id);

reservations.push({
id,
name,
email:email||"",
paddock,
day,
time,
duration
});

render();

}

/* EVENTS */

paddockSelect.onchange=()=>{
updateDurations();
render();
};

daySelect.onchange=render;
durationSelect.onchange=render;

updateDurations();
render();

/* BACK */

function goBack(){

const p=document.getElementById("page");

p.classList.remove("active");
p.classList.add("exit");

setTimeout(()=>{location.href="index.html"},300);

}

</script>

</body>
</html>
