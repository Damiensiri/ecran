<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Planning Paddocks</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Montserrat',sans-serif;
background:#f4f4f4;
}

/* HEADER */

header{
height:70px;
display:flex;
align-items:center;
justify-content:center;
font-weight:700;
font-size:20px;
background:#fff;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

/* SELECTORS */

.selectors{
display:flex;
gap:10px;
padding:15px;
}

select{
flex:1;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;
}

/* SLOTS */

.slots{
padding:15px;
}

.slot{
background:white;
padding:14px;
border-radius:12px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

.time{
font-weight:700;
}

.free{
color:#4caf50;
}

.booked{
color:#f44336;
}

button{
border:none;
padding:8px 12px;
border-radius:8px;
font-weight:600;
cursor:pointer;
}

.reserve{
background:#4caf50;
color:white;
}

.cancel{
background:#f44336;
color:white;
}

</style>
</head>

<body>

<header>PLANNING PADDOCKS</header>

<div class="selectors">

<select id="paddock">
<option value="maison">Maison</option>
<option value="grande-voie">Grande voie</option>
<option value="beudot">Beudot</option>
</select>

<select id="day"></select>

</div>

<div class="slots" id="slots"></div>

<script>

const slotsContainer=document.getElementById("slots");

const times=[
"08:30","09:30","10:30","11:30",
"12:30","13:30","14:30","15:30",
"16:30","17:30","18:30"
];

let reservations=[];

/* DAYS */

const daySelect=document.getElementById("day");

for(let i=0;i<3;i++){

const d=new Date();
d.setDate(d.getDate()+i);

const label=d.toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"short"});

const value=d.toISOString().slice(0,10);

const opt=document.createElement("option");
opt.value=value;
opt.textContent=label;

daySelect.appendChild(opt);

}

/* RENDER */

function render(){

slotsContainer.innerHTML="";

const paddock=document.getElementById("paddock").value;
const day=document.getElementById("day").value;

times.forEach(t=>{

const slot=document.createElement("div");
slot.className="slot";

const r=reservations.find(e=>e.paddock===paddock && e.day===day && e.time===t);

if(!r){

slot.innerHTML=`
<div class="time">${t}</div>
<div class="free">Libre</div>
<button class="reserve">Réserver</button>
`;

slot.querySelector("button").onclick=()=>reserve(paddock,day,t);

}else{

const myId=localStorage.getItem("reservation_id");

slot.innerHTML=`
<div class="time">${t}</div>
<div class="booked">${r.name}</div>
`;

if(myId===r.id){

const btn=document.createElement("button");
btn.textContent="Annuler";
btn.className="cancel";
btn.onclick=()=>cancel(r.id);
slot.appendChild(btn);

}

}

slotsContainer.appendChild(slot);

});

}

/* RESERVE */

function reserve(paddock,day,time){

const name=prompt("Votre prénom");

if(!name)return;

const id=Math.random().toString(36).substring(2,8);

localStorage.setItem("reservation_id",id);

reservations.push({
id,
name,
paddock,
day,
time
});

render();

}

/* CANCEL */

function cancel(id){

reservations=reservations.filter(r=>r.id!==id);

render();

}

/* EVENTS */

document.getElementById("paddock").onchange=render;
document.getElementById("day").onchange=render;

render();

</script>

</body>
</html>
